<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSphere - Premium Fashion Store</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --bg-light: #f9fafb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --red: #dc2626;
            --red-light: #fef2f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
        }

        /* Promotional Banner */
        .promo-banner {
            background: var(--red);
            color: var(--white);
            padding: 0.5rem;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            overflow: hidden;
            cursor: pointer;
        }

        .promo-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-text 15s linear infinite;
            font-size: 0.875rem;
            font-weight: 500;
        }

        @keyframes scroll-text {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* Navbar Styles */
        .navbar {
            position: fixed;
            top: 32px;
            left: 0;
            width: 100%;
            background: var(--white);
            box-shadow: var(--shadow);
            z-index: 1000;
            padding: 1rem;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Desktop Nav */
        .desktop-nav {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .nav-logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary);
            margin-right: 2rem;
            display: flex;
            align-items: center;
        }

        .nav-logo img {
            height: 40px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            margin-right: auto;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-search {
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin-right: 1rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            width: 300px;
        }

        .nav-search:focus-within {
            border-color: var(--primary);
            background: var(--white);
        }

        .nav-search input {
            border: none;
            background: transparent;
            outline: none;
            padding: 0 0.5rem;
            width: 100%;
        }

        .nav-icons {
            display: flex;
            gap: 0.5rem;
        }

        .nav-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            position: relative;
        }

        .nav-icon:hover {
            background: var(--bg-light);
        }

        .cart-count {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--red);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile Nav */
        .mobile-nav {
            display: none;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .mobile-nav-left, .mobile-nav-right {
            display: flex;
            gap: 0.5rem;
        }

        .mobile-nav-center {
            flex: 1;
            text-align: center;
        }

        .mobile-logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-logo img {
            height: 35px;
            width: auto;
        }

        .hamburger {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .hamburger:hover {
            background: var(--bg-light);
        }

        .hamburger span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--text);
            margin: 4px 0;
            transition: all 0.3s ease;
        }

        /* Search Overlay */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            display: none;
            flex-direction: column;
        }

        .search-header {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .search-input {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin: 0 1rem;
        }

        .search-input input {
            border: none;
            background: transparent;
            outline: none;
            padding: 0 0.5rem;
            width: 100%;
            font-size: 1rem;
        }

        .close-search {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .mobile-menu.active {
            transform: translateX(0);
        }

        .mobile-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .mobile-menu-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-menu {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .close-menu:hover {
            background: var(--bg-light);
        }

        .mobile-menu-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .mobile-menu-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 1.125rem;
            font-weight: 500;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--bg-light);
            transition: color 0.3s ease;
        }

        .mobile-menu-links a:hover {
            color: var(--primary);
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 80%;
            max-width: 400px;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .cart-sidebar.active {
            transform: translateX(0);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .cart-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-cart {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .close-cart:hover {
            background: var(--bg-light);
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--bg-light);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 600;
        }

        .cart-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--bg-light);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .checkout-btn:hover {
            background: var(--primary-dark);
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            max-height: 800px;
            overflow: hidden;
            background-color: var(--bg-light);
            margin-top: 110px;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .carousel-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateX(100%) scale(0.9);
        }

        .carousel-slide.active {
            opacity: 1;
            transform: translateX(0) scale(1);
            z-index: 1;
        }

        .carousel-slide.prev {
            opacity: 0.7;
            transform: translateX(-100%) scale(0.9);
            z-index: 0;
        }

        .carousel-slide.next {
            opacity: 0.7;
            transform: translateX(100%) scale(0.9);
            z-index: 0;
        }

        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .mobile-image {
            display: none;
        }

        .carousel-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 3;
        }

        .carousel-indicator {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .carousel-indicator.active {
            background-color: rgba(255, 255, 255, 0.8);
        }

        .carousel-indicator.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: var(--white);
            animation: loading 5s linear;
            transform-origin: left;
        }

        @keyframes loading {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 3;
        }

        .carousel-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.8);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: var(--shadow);
        }

        .carousel-button:hover {
            background-color: var(--white);
        }

        .carousel-button svg {
            width: 24px;
            height: 24px;
            fill: var(--text);
        }

        /* Category Section */
        .category-section {
            padding: 3rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--text);
        }

        .category-wrapper {
            position: relative;
            max-width: 100%;
            overflow: hidden;
        }

        .category-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            transition: transform 0.3s ease;
        }

        .category {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .category:hover {
            transform: scale(1.05);
        }

        .category img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            transition: 0.3s;
            border: 2px solid var(--bg-light);
        }

        .category:hover img {
            border-color: var(--primary);
        }

        .category span {
            display: block;
            margin-top: 0.75rem;
            font-size: 1rem;
            color: var(--text);
            font-weight: 500;
        }

        /* Mobile view: horizontal scroll */
        @media (max-width: 768px) {
            .desktop-nav {
                display: none;
            }
            
            .mobile-nav {
                display: flex;
            }
            
            .desktop-image {
                display: none;
            }
            
            .mobile-image {
                display: block;
            }
            
            .carousel-nav {
                padding: 0 1rem;
            }
            
            .carousel-button {
                width: 40px;
                height: 40px;
            }

            .hero {
                margin-top: 110px;
            }

            .category-wrapper {
                padding: 0;
            }

            .category-container {
                flex-wrap: nowrap;
                overflow-x: auto;
                scroll-behavior: smooth;
                gap: 1.5rem;
                justify-content: flex-start;
                padding: 0 1.5rem;
            }

            .category-container::-webkit-scrollbar {
                display: none;
            }

            .category img {
                width: 90px;
                height: 90px;
            }

            .category span {
                font-size: 0.875rem;
            }

            .arrow {
                display: flex;
            }
        }

        /* Arrow buttons - Fixed positioning */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--white);
            border: 1px solid var(--bg-light);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            display: none;
            z-index: 10;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .arrow:hover {
            background: var(--primary);
            color: var(--white);
        }

        .arrow.left {
            left: 10px;
        }

        .arrow.right {
            right: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .arrow {
                display: flex;
            }
        }

        /* Overlay for menus */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1100;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* Make hero and category images clickable */
        .slide-link {
            display: block;
            width: 100%;
            height: 100%;
        }

        .category-link {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        /* Best Sellers Section */
        .bestsellers-section {
            padding: 3rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--white);
        }

        .heading-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .heading-row h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }
        
        .heading-row a {
            text-decoration: none;
            font-weight: 600;
            color: var(--primary);
            transition: color 0.2s;
        }
        
        .heading-row a:hover {
            color: var(--red);
        }
        
        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        /* Product Card */
        .product-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .product-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-5px);
        }
        
        /* Image Container */
        .image-container {
            position: relative;
            width: 100%;
            padding-top: 125%; /* 4:5 aspect ratio */
            overflow: hidden;
            background-color: #f8f9fa;
        }
        
        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .product-card:hover .product-image {
            transform: scale(1.05);
        }
        
        /* Badges */
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 1;
            letter-spacing: 0.5px;
        }
        
        .badge.sale {
            background-color: var(--red);
        }
        
        .badge.new {
            background-color: #2ecc71;
        }
        
        /* Wishlist Button */
        .wishlist-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 1;
        }
        
        .wishlist-btn:hover {
            background-color: var(--bg-light);
            transform: scale(1.1);
        }
        
        .wishlist-btn i {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .wishlist-btn.active i {
            color: var(--red);
        }
        
        /* Product Info */
        .product-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .product-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }
        
        .product-price {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .current-price {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }
        
        .original-price {
            font-size: 13px;
            color: var(--text-light);
            text-decoration: line-through;
            margin-left: 6px;
        }
        
        .discount {
            font-size: 11px;
            color: var(--red);
            font-weight: 700;
            margin-left: 6px;
            background-color: rgba(220, 38, 38, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .rating {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .stars {
            color: #ffb300;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .rating-count {
            font-size: 11px;
            color: var(--text-light);
        }
        
        .stock {
            font-size: 11px;
            color: var(--text-light);
            display: flex;
            align-items: center;
        }
        
        .stock i {
            margin-right: 4px;
            font-size: 10px;
        }
        
        .stock.in-stock {
            color: #2ecc71;
        }
        
        .stock.low-stock {
            color: #f39c12;
        }

        /* Mobile Styling for Best Sellers */
        @media (max-width: 768px) {
            .heading-row {
                margin-bottom: 20px;
            }
            
            .heading-row h2 {
                font-size: 22px;
            }
            
            .heading-row a {
                font-size: 14px;
            }
            
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .product-card {
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            }
            
            .image-container {
                padding-top: 130%;
            }
            
            .product-info {
                padding: 12px;
            }
            
            .product-title {
                font-size: 13px;
                margin-bottom: 6px;
            }
            
            .current-price {
                font-size: 15px;
            }
            
            .original-price {
                font-size: 12px;
            }
            
            .discount {
                font-size: 10px;
            }
            
            .rating {
                margin-bottom: 4px;
            }
            
            .stars {
                font-size: 11px;
            }
            
            .rating-count {
                font-size: 10px;
            }
            
            .stock {
                font-size: 10px;
            }
        }

        /* Category Products Sections */
        .category-products-section {
            padding: 3rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--white);
        }

        .scroll-container {
            position: relative;
            overflow: hidden;
        }

        .scroll-products {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 10px 0;
            scrollbar-width: none;
        }

        .scroll-product {
            flex: 0 0 280px;

            left: 0;
            width: 100%;

        }

        .scroll-product:hover .scroll-product-image {

        .scroll-product-info {

        .scroll-current-price {

        .category-products-section .arrow {

        @media (max-width: 768px) {
            .scroll-product {
                flex: 0 0 220px;

            .scroll-product-info {

            .scroll-product-title {

            .scroll-current-price {

        /* Loading States */

            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }

        }

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Firebase data
            let promoBannerData = null;
            let heroImages = [];
            let categories = [];
            let bestSellers = [];
            let allProducts = [];

            // Initialize the page
            initializePage();

            async function initializePage() {
                try {
                    await loadAllData();
                    setupEventListeners();
                    renderAllSections();
                } catch (error) {
                    console.error('Error initializing page:', error);
                }
            }

            async function loadAllData() {
                try {
                    // Load promo banner
                    const promoDoc = await db.collection('landingPage').doc('promoBanner').get();
                    if (promoDoc.exists) {
                        promoBannerData = promoDoc.data();
                    }

                    // Load hero images
                    const heroDoc = await db.collection('landingPage').doc('heroImages').get();
                    if (heroDoc.exists) {
                        heroImages = heroDoc.data().images || [];
                    }

                    // Load categories
                    const categoriesSnapshot = await db.collection('categories').orderBy('name').get();
                    categories = categoriesSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                    // Load best sellers
                    const bestSellersDoc = await db.collection('landingPage').doc('bestSellers').get();
                    if (bestSellersDoc.exists) {
                        bestSellers = bestSellersDoc.data().products || [];
                    }

                    // Load all products
                    const productsSnapshot = await db.collection('products').get();
                    allProducts = productsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                } catch (error) {
                    console.error('Error loading data:', error);
                }
            }

            function renderAllSections() {
                renderPromoBanner();
                renderHeroSection();
                renderCategories();
                renderBestSellers();
                renderCategoryProducts();
            }

            function renderPromoBanner() {
                const promoBanner = document.getElementById('promoBanner');
                const promoText = document.getElementById('promoText');

                if (promoBannerData && promoBannerData.active && promoBannerData.text) {
                    promoText.textContent = promoBannerData.text;
                    promoBanner.style.display = 'block';

                    // Make banner clickable if link exists
                    if (promoBannerData.link) {
                        promoBanner.addEventListener('click', () => {
                            window.location.href = promoBannerData.link;
                        });
                    }
                }
            }

            function renderHeroSection() {
                const heroCarousel = document.getElementById('heroCarousel');
                
                if (heroImages.length === 0) {
                    heroCarousel.innerHTML = `
                        <div class="loading">
                            <div class="loading-spinner"></div>
                            No hero images available
                        </div>
                    `;
                    return;
                }

                let heroHTML = '';
                
                heroImages.forEach((image, index) => {
                    heroHTML += `
                        <div class="carousel-slide ${index === 0 ? 'active' : ''}" role="group" aria-roledescription="slide" aria-label="${index + 1} of ${heroImages.length}">
                            <a href="${image.link || '#'}" class="slide-link">
                                <img 
                                    src="${image.desktop}" 
                                    alt="Hero image ${index + 1}"
                                    class="slide-image desktop-image"
                                    loading="lazy"
                                    onerror="this.src='https://via.placeholder.com/1920x800?text=Hero+Image'"
                                >
                                <img 
                                    src="${image.mobile}" 
                                    alt="Hero image ${index + 1}"
                                    class="slide-image mobile-image"
                                    loading="lazy"
                                    onerror="this.src='https://via.placeholder.com/600x800?text=Hero+Image'"
                                >
                            </a>
                        </div>
                    `;
                });

                // Add navigation controls
                heroHTML += `
                    <div class="carousel-nav">
                        <button class="carousel-button prev" aria-label="Previous slide">
                            <svg viewBox="0 0 24 24">
                                <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                            </svg>
                        </button>
                        <button class="carousel-button next" aria-label="Next slide">
                            <svg viewBox="0 0 24 24">
                                <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                            </svg>
                        </button>
                    </div>

                    <div class="carousel-controls">
                        ${heroImages.map((_, index) => `
                            <button class="carousel-indicator ${index === 0 ? 'active' : ''}" aria-label="Show slide ${index + 1}"></button>
                        `).join('')}
                    </div>
                `;

                heroCarousel.innerHTML = heroHTML;
                initializeCarousel();
            }

            function renderCategories() {
                const scrollContainer = document.getElementById('scrollContainer');
                
                if (categories.length === 0) {
                    scrollContainer.innerHTML = `
                        <div class="loading">
                            <div class="loading-spinner"></div>
                            No categories available
                        </div>
                    `;
                    return;
                }

                const categoriesHTML = categories.map(category => `
                    <div class="category">
                        <a href="/products?category=${encodeURIComponent(category.name)}" class="category-link">
                            <img src="${category.imageUrl || 'https://via.placeholder.com/120?text=Category'}" 
                                 alt="${category.name}" 
                                 loading="lazy"
                                 onerror="this.src='https://via.placeholder.com/120?text=Category'">
                            <span>${category.name}</span>
                        </a>
                    </div>
                `).join('');

                scrollContainer.innerHTML = categoriesHTML;
                initializeCategoryScroll();
            }

            function renderBestSellers() {
                const bestSellersGrid = document.getElementById('bestSellersGrid');
                
                if (bestSellers.length === 0) {
                    bestSellersGrid.innerHTML = `
                        <div class="loading" style="grid-column: 1 / -1;">
                            <div class="loading-spinner"></div>
                            No best sellers available
                        </div>
                    `;
                    return;
                }

                const bestSellersHTML = bestSellers.map(product => {
                    const imageUrl = product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/300x400?text=Product';
                    const oldPrice = product.oldPrice || product.price * 1.3;
                    const discount = Math.round(((oldPrice - product.price) / oldPrice) * 100);
                    
                    return `
                        <div class="product-card" data-product-id="${product.id}">
                            <div class="image-container">
                                <img src="${imageUrl}" alt="${product.name}" class="product-image"
                                     onerror="this.src='https://via.placeholder.com/300x400?text=Product'">
                                ${discount > 0 ? `<div class="badge sale">${discount}% OFF</div>` : ''}
                                <button class="wishlist-btn">
                                    <i class="far fa-heart"></i>
                                </button>
                            </div>
                            <div class="product-info">
                                <div class="product-title">${product.name}</div>
                                <div class="product-price">
                                    <span class="current-price">$${product.price.toFixed(2)}</span>
                                    ${oldPrice > product.price ? `<span class="original-price">$${oldPrice.toFixed(2)}</span>` : ''}
                                </div>
                                <div class="rating">
                                    <div class="stars">${getRandomStars()}</div>
                                    <span class="rating-count">${getRandomRating()}</span>
                                </div>
                                <div class="stock in-stock">
                                    <i class="fas fa-check-circle"></i>
                                    In stock
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                bestSellersGrid.innerHTML = bestSellersHTML;
                initializeProductInteractions();
            }

            function renderCategoryProducts() {
                const container = document.getElementById('categoryProductsContainer');
                
                // Group products by category
                const productsByCategory = {};
                allProducts.forEach(product => {
                    if (product.category) {
                        if (!productsByCategory[product.category]) {
                            productsByCategory[product.category] = [];
                        }
                        productsByCategory[product.category].push(product);
                    }
                });

                // Create sections for each category with products
                let categorySectionsHTML = '';
                
                Object.keys(productsByCategory).forEach(categoryName => {
                    const categoryProducts = productsByCategory[categoryName];
                    if (categoryProducts.length > 0) {
                        categorySectionsHTML += `
                            <section class="category-products-section">
                                <div class="heading-row">
                                    <h2>${categoryName}</h2>
                                    <a href="/products?category=${encodeURIComponent(categoryName)}">View All</a>
                                </div>
                                <div class="scroll-container">
                                    <div class="arrow left">&#10094;</div>
                                    <div class="arrow right">&#10095;</div>
                                    <div class="scroll-products">
                                        ${categoryProducts.map(product => {
                                            const imageUrl = product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/300x400?text=Product';
                                            const oldPrice = product.oldPrice || product.price * 1.3;
                                            const discount = Math.round(((oldPrice - product.price) / oldPrice) * 100);
                                            
                                            return `
                                                <div class="scroll-product" data-product-id="${product.id}">
                                                    <div class="scroll-image-container">
                                                        <img src="${imageUrl}" alt="${product.name}" class="scroll-product-image"
                                                             onerror="this.src='https://via.placeholder.com/300x400?text=Product'">
                                                        ${discount > 0 ? `<div class="badge sale">${discount}% OFF</div>` : ''}
                                                    </div>
                                                    <div class="scroll-product-info">
                                                        <div class="scroll-product-title">${product.name}</div>
                                                        <div class="scroll-product-price">
                                                            <span class="scroll-current-price">$${product.price.toFixed(2)}</span>
                                                            ${oldPrice > product.price ? `<span class="scroll-original-price">$${oldPrice.toFixed(2)}</span>` : ''}
                                                        </div>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            </section>
                        `;
                    }
                });

                container.innerHTML = categorySectionsHTML;
                initializeScrollSections();
                initializeProductInteractions();
            }

            // Helper functions
            function getRandomStars() {
                const ratings = ['★★★★★', '★★★★☆', '★★★☆☆'];
                return ratings[Math.floor(Math.random() * ratings.length)];
            }

            function getRandomRating() {
                return (4 + Math.random()).toFixed(1) + ' (' + Math.floor(Math.random() * 100 + 50) + ')';
            }

            // Carousel functionality
            function initializeCarousel() {
                const slides = Array.from(document.querySelectorAll('.carousel-slide'));
                const indicators = Array.from(document.querySelectorAll('.carousel-indicator'));
                const prevButton = document.querySelector('.carousel-button.prev');
                const nextButton = document.querySelector('.carousel-button.next');
                
                let currentIndex = 0;
                let autoScrollInterval;
                let isTransitioning = false;
                const transitionDuration = 800;
                const autoScrollDelay = 5000;
                
                function updateCarousel() {
                    slides.forEach((slide, index) => {
                        slide.classList.remove('active', 'prev', 'next');
                        
                        if (index === currentIndex) {
                            slide.classList.add('active');
                        } else if (index === (currentIndex - 1 + slides.length) % slides.length) {
                            slide.classList.add('prev');
                        } else if (index === (currentIndex + 1) % slides.length) {
                            slide.classList.add('next');
                        }
                    });
                    
                    indicators.forEach((indicator, index) => {
                        indicator.classList.toggle('active', index === currentIndex);
                        
                        if (index === currentIndex) {
                            indicator.style.animation = 'none';
                            void indicator.offsetWidth;
                            indicator.style.animation = `loading ${autoScrollDelay}ms linear`;
                        }
                    });
                }
                
                function goToSlide(index) {
                    if (isTransitioning || index === currentIndex) return;
                    
                    isTransitioning = true;
                    currentIndex = index;
                    updateCarousel();
                    
                    setTimeout(() => {
                        isTransitioning = false;
                    }, transitionDuration);
                }
                
                function nextSlide() {
                    goToSlide((currentIndex + 1) % slides.length);
                }
                
                function prevSlide() {
                    goToSlide((currentIndex - 1 + slides.length) % slides.length);
                }
                
                function startAutoScroll() {
                    stopAutoScroll();
                    autoScrollInterval = setInterval(nextSlide, autoScrollDelay);
                }
                
                function stopAutoScroll() {
                    clearInterval(autoScrollInterval);
                }
                
                prevButton.addEventListener('click', prevSlide);
                nextButton.addEventListener('click', nextSlide);
                
                indicators.forEach((indicator, index) => {
                    indicator.addEventListener('click', () => goToSlide(index));
                });
                
                const carousel = document.querySelector('.carousel');
                carousel.addEventListener('mouseenter', stopAutoScroll);
                carousel.addEventListener('mouseleave', startAutoScroll);
                
                let touchStartX = 0;
                let touchEndX = 0;
                
                carousel.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                
                carousel.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    const diff = touchStartX - touchEndX;
                    
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) nextSlide();
                        else prevSlide();
                    }
                }, { passive: true });
                
                updateCarousel();
                startAutoScroll();
            }

            function initializeCategoryScroll() {
                const scrollContainer = document.getElementById('scrollContainer');
                const leftArrow = document.getElementById('leftArrow');
                const rightArrow = document.getElementById('rightArrow');

                function updateArrowVisibility() {
                    if (window.innerWidth <= 768) {
                        if (scrollContainer.scrollLeft <= 10) {
                            leftArrow.style.display = 'none';
                        } else {
                            leftArrow.style.display = 'flex';
                        }
                        
                        if (scrollContainer.scrollLeft + scrollContainer.clientWidth >= scrollContainer.scrollWidth - 10) {
                            rightArrow.style.display = 'none';
                        } else {
                            rightArrow.style.display = 'flex';
                        }
                    } else {
                        leftArrow.style.display = 'none';
                        rightArrow.style.display = 'none';
                    }
                }

                rightArrow.addEventListener('click', () => {
                    scrollContainer.scrollBy({ left: 200, behavior: 'smooth' });
                    setTimeout(updateArrowVisibility, 300);
                });

                leftArrow.addEventListener('click', () => {
                    scrollContainer.scrollBy({ left: -200, behavior: 'smooth' });
                    setTimeout(updateArrowVisibility, 300);
                });

                scrollContainer.addEventListener('scroll', updateArrowVisibility);
                window.addEventListener('resize', updateArrowVisibility);
                updateArrowVisibility();
            }

            function initializeScrollSections() {
                const scrollSections = document.querySelectorAll('.category-products-section');
                
                scrollSections.forEach(section => {
                    const scrollContainer = section.querySelector('.scroll-products');
                    const leftArrow = section.querySelector('.arrow.left');
                    const rightArrow = section.querySelector('.arrow.right');
                    
                    function updateArrows() {
                        if (scrollContainer.scrollLeft <= 10) {
                            leftArrow.style.display = 'none';
                        } else {
                            leftArrow.style.display = 'flex';
                        }
                        
                        if (scrollContainer.scrollLeft + scrollContainer.clientWidth >= scrollContainer.scrollWidth - 10) {
                            rightArrow.style.display = 'none';
                        } else {
                            rightArrow.style.display = 'flex';
                        }
                    }
                    
                    rightArrow.addEventListener('click', () => {
                        scrollContainer.scrollBy({ left: 300, behavior: 'smooth' });
                        setTimeout(updateArrows, 300);
                    });
                    
                    leftArrow.addEventListener('click', () => {
                        scrollContainer.scrollBy({ left: -300, behavior: 'smooth' });
                        setTimeout(updateArrows, 300);
                    });
                    
                    scrollContainer.addEventListener('scroll', updateArrows);
                    updateArrows();
                });
            }

            function initializeProductInteractions() {
                // Wishlist functionality
                const wishlistButtons = document.querySelectorAll('.wishlist-btn');
                wishlistButtons.forEach(button => {
                    button.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const icon = this.querySelector('i');
                        if (icon.classList.contains('far')) {
                            icon.classList.remove('far');
                            icon.classList.add('fas', 'active');
                            this.classList.add('active');
                        } else {
                            icon.classList.remove('fas', 'active');
                            icon.classList.add('far');
                            this.classList.remove('active');
                        }
                    });
                });
                
                // Product click functionality
                const productCards = document.querySelectorAll('.product-card, .scroll-product');
                productCards.forEach(card => {
                    card.addEventListener('click', function() {
                        const productId = this.getAttribute('data-product-id');
                        if (productId) {
                            window.location.href = `/product.html?id=${productId}`;
                        }
                    });
                });
            }

            // Navigation functionality
            function setupEventListeners() {
                const mobileMenuBtn = document.getElementById('mobileMenuBtn');
                const closeMenu = document.getElementById('closeMenu');
                const mobileMenu = document.getElementById('mobileMenu');
                const mobileSearchBtn = document.getElementById('mobileSearchBtn');
                const desktopSearchBtn = document.getElementById('desktopSearchBtn');
                const closeSearch = document.getElementById('closeSearch');
                const searchOverlay = document.getElementById('searchOverlay');
                const mobileCartBtn = document.getElementById('mobileCartBtn');
                const desktopCartBtn = document.getElementById('desktopCartBtn');
                const closeCart = document.getElementById('closeCart');
                const cartSidebar = document.getElementById('cartSidebar');
                const overlay = document.getElementById('overlay');

                // Mobile menu functionality
                function openMobileMenu() {
                    mobileMenu.classList.add('active');
                    overlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }

                function closeMobileMenu() {
                    mobileMenu.classList.remove('active');
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }

                mobileMenuBtn.addEventListener('click', openMobileMenu);
                closeMenu.addEventListener('click', closeMobileMenu);

                // Search functionality
                function openSearch() {
                    searchOverlay.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                }

                function closeSearchOverlay() {
                    searchOverlay.style.display = 'none';
                    document.body.style.overflow = '';
                }

                mobileSearchBtn.addEventListener('click', openSearch);
                desktopSearchBtn.addEventListener('click', openSearch);
                closeSearch.addEventListener('click', closeSearchOverlay);

                // Cart functionality
                function openCart() {
                    cartSidebar.classList.add('active');
                    overlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }

                function closeCartSidebar() {
                    cartSidebar.classList.remove('active');
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }

                mobileCartBtn.addEventListener('click', openCart);
                desktopCartBtn.addEventListener('click', openCart);
                closeCart.addEventListener('click', closeCartSidebar);

                // Close overlays when clicking on overlay
                overlay.addEventListener('click', function() {
                    closeMobileMenu();
                    closeCartSidebar();
                    closeSearchOverlay();
                });
            }
        });
    </script>
</body>
</html>
