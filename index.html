<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSphere - Premium Fashion Store</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --bg-light: #f9fafb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --red: #dc2626;
            --red-light: #fef2f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
        }

        /* Promotional Banner */
        .promo-banner {
            background: var(--red);
            color: var(--white);
            padding: 0.5rem;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            overflow: hidden;
            cursor: pointer;
        }

        .promo-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-text 15s linear infinite;
            font-size: 0.875rem;
            font-weight: 500;
        }

        @keyframes scroll-text {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* Navbar Styles */
        .navbar {
            position: fixed;
            top: 32px;
            left: 0;
            width: 100%;
            background: var(--white);
            box-shadow: var(--shadow);
            z-index: 1000;
            padding: 1rem;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Desktop Nav */
        .desktop-nav {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .nav-logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary);
            margin-right: 2rem;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .nav-logo img {
            height: 40px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            margin-right: auto;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-search {
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin-right: 1rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            width: 300px;
        }

        .nav-search:focus-within {
            border-color: var(--primary);
            background: var(--white);
        }

        .nav-search input {
            border: none;
            background: transparent;
            outline: none;
            padding: 0 0.5rem;
            width: 100%;
        }

        .nav-icons {
            display: flex;
            gap: 0.5rem;
        }

        .nav-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            position: relative;
        }

        .nav-icon:hover {
            background: var(--bg-light);
        }

        .cart-count {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--red);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile Nav */
        .mobile-nav {
            display: none;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .mobile-nav-left, .mobile-nav-right {
            display: flex;
            gap: 0.5rem;
        }

        .mobile-nav-center {
            flex: 1;
            text-align: center;
        }

        .mobile-logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .mobile-logo img {
            height: 35px;
            width: auto;
        }

        .hamburger {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .hamburger:hover {
            background: var(--bg-light);
        }

        .hamburger span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--text);
            margin: 4px 0;
            transition: all 0.3s ease;
        }

        /* Search Overlay */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            display: none;
            flex-direction: column;
        }

        .search-header {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .search-input {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin: 0 1rem;
        }

        .search-input input {
            border: none;
            background: transparent;
            outline: none;
            padding: 0 0.5rem;
            width: 100%;
            font-size: 1rem;
        }

        .close-search {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .mobile-menu.active {
            transform: translateX(0);
        }

        .mobile-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .mobile-menu-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-menu {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .close-menu:hover {
            background: var(--bg-light);
        }

        .mobile-menu-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .mobile-menu-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 1.125rem;
            font-weight: 500;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--bg-light);
            transition: color 0.3s ease;
        }

        .mobile-menu-links a:hover {
            color: var(--primary);
        }

        .mobile-menu-about {
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid var(--bg-light);
        }

        .mobile-menu-about a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            display: block;
            padding: 0.75rem 0;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 80%;
            max-width: 400px;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .cart-sidebar.active {
            transform: translateX(0);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .cart-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-cart {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .close-cart:hover {
            background: var(--bg-light);
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--bg-light);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 600;
        }

        .cart-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--bg-light);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .checkout-btn:hover {
            background: var(--primary-dark);
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            max-height: 800px;
            overflow: hidden;
            background-color: var(--bg-light);
            margin-top: 110px;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .carousel-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateX(100%) scale(0.9);
        }

        .carousel-slide.active {
            opacity: 1;
            transform: translateX(0) scale(1);
            z-index: 1;
        }

        .carousel-slide.prev {
            opacity: 0.7;
            transform: translateX(-100%) scale(0.9);
            z-index: 0;
        }

        .carousel-slide.next {
            opacity: 0.7;
            transform: translateX(100%) scale(0.9);
            z-index: 0;
        }

        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .mobile-image {
            display: none;
        }

        .carousel-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 3;
        }

        .carousel-indicator {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .carousel-indicator.active {
            background-color: rgba(255, 255, 255, 0.8);
        }

        .carousel-indicator.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: var(--white);
            animation: loading 5s linear;
            transform-origin: left;
        }

        @keyframes loading {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 3;
        }

        .carousel-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.8);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: var(--shadow);
        }

        .carousel-button:hover {
            background-color: var(--white);
        }

        .carousel-button svg {
            width: 24px;
            height: 24px;
            fill: var(--text);
        }

        /* Category Section */
        .category-section {
            padding: 3rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--text);
        }

        .category-wrapper {
            position: relative;
            max-width: 100%;
            overflow: hidden;
        }

        .category-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            transition: transform 0.3s ease;
        }

        .category {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .category:hover {
            transform: scale(1.05);
        }

        .category img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            transition: 0.3s;
            border: 2px solid var(--bg-light);
        }

        .category:hover img {
            border-color: var(--primary);
        }

        .category span {
            display: block;
            margin-top: 0.75rem;
            font-size: 1rem;
            color: var(--text);
            font-weight: 500;
        }

        /* Mobile view: horizontal scroll */
        @media (max-width: 768px) {
            .desktop-nav {
                display: none;
            }
            
            .mobile-nav {
                display: flex;
            }
            
            .desktop-image {
                display: none;
            }
            
            .mobile-image {
                display: block;
            }
            
            .carousel-nav {
                padding: 0 1rem;
            }
            
            .carousel-button {
                width: 40px;
                height: 40px;
            }

            .hero {
                margin-top: 110px;
            }

            .category-wrapper {
                padding: 0;
            }

            .category-container {
                flex-wrap: nowrap;
                overflow-x: auto;
                scroll-behavior: smooth;
                gap: 1.5rem;
                justify-content: flex-start;
                padding: 0 1.5rem;
            }

            .category-container::-webkit-scrollbar {
                display: none;
            }

            .category img {
                width: 90px;
                height: 90px;
            }

            .category span {
                font-size: 0.875rem;
            }

            .arrow {
                display: flex;
            }
        }

        /* Arrow buttons - Fixed positioning */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--white);
            border: 1px solid var(--bg-light);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            display: none;
            z-index: 10;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .arrow:hover {
            background: var(--primary);
            color: var(--white);
        }

        .arrow.left {
            left: 10px;
        }

        .arrow.right {
            right: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .arrow {
                display: flex;
            }
        }

        /* Overlay for menus */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1100;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* Make hero and category images clickable */
        .slide-link {
            display: block;
            width: 100%;
            height: 100%;
        }

        .category-link {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        /* Best Sellers Section */
        .bestsellers-section {
            padding: 3rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--white);
        }

        .heading-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .heading-row h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }
        
        .heading-row a {
            text-decoration: none;
            font-weight: 600;
            color: var(--primary);
            transition: color 0.2s;
        }
        
        .heading-row a:hover {
            color: var(--red);
        }
        
        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        /* Product Card */
        .product-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        
        .product-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-5px);
        }
        
        /* Image Container */
        .image-container {
            position: relative;
            width: 100%;
            padding-top: 125%; /* 4:5 aspect ratio */
            overflow: hidden;
            background-color: #f8f9fa;
        }
        
        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .product-card:hover .product-image {
            transform: scale(1.05);
        }
        
        /* Badges */
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 1;
            letter-spacing: 0.5px;
        }
        
        .badge.sale {
            background-color: var(--red);
        }
        
        .badge.new {
            background-color: #2ecc71;
        }
        
        /* Wishlist Button */
        .wishlist-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 1;
        }
        
        .wishlist-btn:hover {
            background-color: var(--bg-light);
            transform: scale(1.1);
        }
        
        .wishlist-btn i {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .wishlist-btn.active i {
            color: var(--red);
        }
        
        /* Product Info */
        .product-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .product-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }
        
        .product-price {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .current-price {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }
        
        .original-price {
            font-size: 13px;
            color: var(--text-light);
            text-decoration: line-through;
            margin-left: 6px;
        }
        
        .discount {
            font-size: 11px;
            color: var(--red);
            font-weight: 700;
            margin-left: 6px;
            background-color: rgba(220, 38, 38, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .rating {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .stars {
            color: #ffb300;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .rating-count {
            font-size: 11px;
            color: var(--text-light);
        }
        
        .stock {
            font-size: 11px;
            color: var(--text-light);
            display: flex;
            align-items: center;
        }
        
        .stock i {
            margin-right: 4px;
            font-size: 10px;
        }
        
        .stock.in-stock {
            color: #2ecc71;
        }
        
        .stock.low-stock {
            color: #f39c12;
        }

        /* Mobile Styling for Best Sellers */
        @media (max-width: 768px) {
            .heading-row {
                margin-bottom: 20px;
            }
            
            .heading-row h2 {
                font-size: 22px;
            }
            
            .heading-row a {
                font-size: 14px;
            }
            
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .product-card {
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            }
            
            .image-container {
                padding-top: 130%;
            }
            
            .product-info {
                padding: 12px;
            }
            
            .product-title {
                font-size: 13px;
                margin-bottom: 6px;
            }
            
            .current-price {
                font-size: 15px;
            }
            
            .original-price {
                font-size: 12px;
            }
            
            .discount {
                font-size: 10px;
            }
            
            .rating {
                margin-bottom: 4px;
            }
            
            .stars {
                font-size: 11px;
            }
            
            .rating-count {
                font-size: 10px;
            }
            
            .stock {
                font-size: 10px;
            }
        }

        /* Category Products Sections */
        .category-products-section {
            padding: 3rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--white);
        }

        .scroll-container {
            position: relative;
            overflow: hidden;
        }

        .scroll-products {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 10px 0;
            scrollbar-width: none;
        }

        .scroll-products::-webkit-scrollbar {
            display: none;
        }

        .scroll-product {
            flex: 0 0 280px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .scroll-product:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-5px);
        }

        .scroll-image-container {
            position: relative;
            width: 100%;
            padding-top: 125%;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .scroll-product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .scroll-product:hover .scroll-product-image {
            transform: scale(1.05);
        }

        .scroll-product-info {
            padding: 15px;
        }

        .scroll-product-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .scroll-product-price {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .scroll-current-price {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }

        .scroll-original-price {
            font-size: 13px;
            color: var(--text-light);
            text-decoration: line-through;
            margin-left: 6px;
        }

        .scroll-discount {
            font-size: 11px;
            color: var(--red);
            font-weight: 700;
            margin-left: 6px;
            background-color: rgba(220, 38, 38, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
        }

        .category-products-section .arrow {
            display: flex;
            top: 50%;
            transform: translateY(-50%);
        }

        @media (max-width: 768px) {
            .scroll-product {
                flex: 0 0 220px;
            }
            
            .scroll-product-info {
                padding: 12px;
            }
            
            .scroll-product-title {
                font-size: 13px;
            }
            
            .scroll-current-price {
                font-size: 15px;
            }
            
            .scroll-original-price {
                font-size: 12px;
            }
        }

        /* Loading States */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: var(--text-light);
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #e5e7eb;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-state h3 {
            margin-bottom: 1rem;
            color: var(--text);
        }
    </style>
</head>

    <script>

            const closeCart = document.getElementById('closeCart');
            const cartSidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');

            // Mobile menu functionality

                mobileMenu.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeMobileMenu() {
                mobileMenu.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            mobileMenuBtn.addEventListener('click', openMobileMenu);
            closeMenu.addEventListener('click', closeMobileMenu);

            // Search functionality

                searchOverlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }

            function closeSearchOverlay() {

            }

            mobileSearchBtn.addEventListener('click', openSearch);
            desktopSearchBtn.addEventListener('click', openSearch);
            closeSearch.addEventListener('click', closeSearchOverlay);

            // Cart functionality
            function openCart() {
                cartSidebar.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                renderCart();
            }

            function closeCartSidebar() {
                cartSidebar.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            mobileCartBtn.addEventListener('click', openCart);
            desktopCartBtn.addEventListener('click', openCart);
            closeCart.addEventListener('click', closeCartSidebar);

            // Close overlays when clicking on overlay
            overlay.addEventListener('click', function() {
                closeMobileMenu();
                closeCartSidebar();
                closeSearchOverlay();
            });

            // Search functionality
            const searchInput = document.querySelector('.search-input input');
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const query = this.value.trim();
                    if (query) {
                        window.location.href = `search.html?q=${encodeURIComponent(query)}`;
                    }
                }
            });
        }

        // Load landing page data from Firebase
        async function loadLandingPageData() {
            try {
                await Promise.all([
                    loadPromoBanner(),
                    loadHeroImages(),
                    loadCategories(),
                    loadBestSellers(),
                    loadAllProducts()
                ]);
                
                // After loading all data, create category sections
                createCategorySections();
                
            } catch (error) {
                console.error("Error loading landing page data:", error);
                showError("Failed to load page content");
            }
        }

        // Load promo banner
        async function loadPromoBanner() {
            try {
                const doc = await db.collection('landingPage').doc('promoBanner').get();
                if (doc.exists) {
                    const promoData = doc.data();
                    if (promoData.active && promoData.text) {
                        const promoBanner = document.getElementById('promoBanner');
                        const promoText = document.getElementById('promoText');
                        
                        promoText.textContent = promoData.text;
                        promoBanner.style.display = 'block';
                        
                        // Make banner clickable if link exists
                        if (promoData.link) {
                            promoBanner.addEventListener('click', function() {
                                window.location.href = promoData.link;
                            });
                        }
                    }
                }
            } catch (error) {
                console.error("Error loading promo banner:", error);
            }
        }

        // Load hero images
        async function loadHeroImages() {
            try {
                const doc = await db.collection('landingPage').doc('heroImages').get();
                const carousel = document.getElementById('heroCarousel');
                
                if (doc.exists) {
                    const heroData = doc.data();
                    const images = heroData.images || [];
                    
                    if (images.length > 0) {
                        carousel.innerHTML = '';
                        
                        // Create slides
                        images.forEach((image, index) => {
                            const slide = document.createElement('div');
                            slide.className = `carousel-slide ${index === 0 ? 'active' : ''}`;
                            slide.setAttribute('role', 'group');
                            slide.setAttribute('aria-roledescription', 'slide');
                            slide.setAttribute('aria-label', `${index + 1} of ${images.length}`);
                            
                            const link = document.createElement('a');
                            link.className = 'slide-link';
                            link.href = image.link || '#';
                            
                            // Desktop image
                            const desktopImg = document.createElement('img');
                            desktopImg.src = image.desktop;
                            desktopImg.alt = `Hero image ${index + 1}`;
                            desktopImg.className = 'slide-image desktop-image';
                            desktopImg.loading = 'lazy';
                            
                            // Mobile image
                            const mobileImg = document.createElement('img');
                            mobileImg.src = image.mobile || image.desktop;
                            mobileImg.alt = `Hero image ${index + 1}`;
                            mobileImg.className = 'slide-image mobile-image';
                            mobileImg.loading = 'lazy';
                            
                            link.appendChild(desktopImg);
                            link.appendChild(mobileImg);
                            slide.appendChild(link);
                            carousel.appendChild(slide);
                        });
                        
                        // Add navigation controls if there are multiple images
                        if (images.length > 1) {
                            addCarouselControls(carousel, images.length);
                        }
                        
                        initializeCarousel();
                    } else {
                        carousel.innerHTML = `
                            <div class="empty-state">
                                <h3>No Hero Images</h3>
                                <p>Check back soon for featured products</p>
                            </div>
                        `;
                    }
                } else {
                    carousel.innerHTML = `
                        <div class="empty-state">
                            <h3>No Hero Images</h3>
                            <p>Check back soon for featured products</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("Error loading hero images:", error);
                document.getElementById('heroCarousel').innerHTML = `
                    <div class="empty-state">
                        <h3>Error Loading Images</h3>
                        <p>Please try refreshing the page</p>
                    </div>
                `;
            }
        }

        // Add carousel controls
        function addCarouselControls(carousel, slideCount) {
            // Navigation buttons
            const nav = document.createElement('div');
            nav.className = 'carousel-nav';
            
            const prevButton = document.createElement('button');
            prevButton.className = 'carousel-button prev';
            prevButton.setAttribute('aria-label', 'Previous slide');
            prevButton.innerHTML = `
                <svg viewBox="0 0 24 24">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
            `;
            
            const nextButton = document.createElement('button');
            nextButton.className = 'carousel-button next';
            nextButton.setAttribute('aria-label', 'Next slide');
            nextButton.innerHTML = `
                <svg viewBox="0 0 24 24">
                    <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                </svg>
            `;
            
            nav.appendChild(prevButton);
            nav.appendChild(nextButton);
            carousel.appendChild(nav);
            
            // Indicators
            const controls = document.createElement('div');
            controls.className = 'carousel-controls';
            
            for (let i = 0; i < slideCount; i++) {
                const indicator = document.createElement('button');
                indicator.className = `carousel-indicator ${i === 0 ? 'active' : ''}`;
                indicator.setAttribute('aria-label', `Show slide ${i + 1}`);
                controls.appendChild(indicator);
            }
            
            carousel.appendChild(controls);
        }

        // Initialize carousel functionality
        function initializeCarousel() {
            const slides = Array.from(document.querySelectorAll('.carousel-slide'));
            const indicators = Array.from(document.querySelectorAll('.carousel-indicator'));
            const prevButton = document.querySelector('.carousel-button.prev');
            const nextButton = document.querySelector('.carousel-button.next');
            
            if (!slides.length || !prevButton || !nextButton) return;
            
            let currentIndex = 0;
            let autoScrollInterval;
            let isTransitioning = false;
            const transitionDuration = 800;
            const autoScrollDelay = 5000;
            
            function updateCarousel() {
                slides.forEach((slide, index) => {
                    slide.classList.remove('active', 'prev', 'next');
                    
                    if (index === currentIndex) {
                        slide.classList.add('active');
                    } else if (index === (currentIndex - 1 + slides.length) % slides.length) {
                        slide.classList.add('prev');
                    } else if (index === (currentIndex + 1) % slides.length) {
                        slide.classList.add('next');
                    }
                });
                
                indicators.forEach((indicator, index) => {
                    indicator.classList.toggle('active', index === currentIndex);
                    
                    if (index === currentIndex) {
                        indicator.style.animation = 'none';
                        void indicator.offsetWidth;
                        indicator.style.animation = `loading ${autoScrollDelay}ms linear`;
                    }
                });
            }
            
            function goToSlide(index) {
                if (isTransitioning || index === currentIndex) return;
                
                isTransitioning = true;
                currentIndex = index;
                updateCarousel();
                
                setTimeout(() => {
                    isTransitioning = false;
                }, transitionDuration);
            }
            
            function nextSlide() {
                goToSlide((currentIndex + 1) % slides.length);
            }
            
            function prevSlide() {
                goToSlide((currentIndex - 1 + slides.length) % slides.length);
            }
            
            function startAutoScroll() {
                stopAutoScroll();
                autoScrollInterval = setInterval(nextSlide, autoScrollDelay);
            }
            
            function stopAutoScroll() {
                clearInterval(autoScrollInterval);
            }
            
            prevButton.addEventListener('click', prevSlide);
            nextButton.addEventListener('click', nextSlide);
            
            indicators.forEach((indicator, index) => {
                indicator.addEventListener('click', () => goToSlide(index));
            });
            
            const carousel = document.querySelector('.carousel');
            carousel.addEventListener('mouseenter', stopAutoScroll);
            carousel.addEventListener('mouseleave', startAutoScroll);
            
            updateCarousel();
            startAutoScroll();
        }

        // Load categories
        async function loadCategories() {
            try {
                const snapshot = await db.collection('categories').orderBy('name').get();
                categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                renderCategories();
                renderMobileMenuCategories();
            } catch (error) {
                console.error("Error loading categories:", error);
                document.getElementById('categoryContainer').innerHTML = `
                    <div class="empty-state">
                        <h3>Error Loading Categories</h3>
                        <p>Please try refreshing the page</p>
                    </div>
                `;
            }
        }

        // Render categories
        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            
            if (categories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Categories Available</h3>
                        <p>Check back soon for new categories</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = categories.map(category => `
                <div class="category">
                    <a href="manage-products.html?category=${encodeURIComponent(category.name)}" class="category-link">
                        <img src="${category.imageUrl || 'https://via.placeholder.com/120?text=No+Image'}" 
                             alt="${category.name}" 
                             loading="lazy"
                             onerror="this.src='https://via.placeholder.com/120?text=Error'">
                        <span>${category.name}</span>
                    </a>
                </div>
            `).join('');
            
            // Initialize category scrolling on mobile
            initializeCategoryScrolling();
        }

        // Render mobile menu categories
        function renderMobileMenuCategories() {
            const container = document.getElementById('mobileMenuLinks');
            
            if (categories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Categories</h3>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = categories.map(category => `
                <a href="manage-products.html?category=${encodeURIComponent(category.name)}">${category.name}</a>
            `).join('');
        }

        // Initialize category scrolling
        function initializeCategoryScrolling() {
            const scrollContainer = document.getElementById('categoryContainer');
            const leftArrow = document.getElementById('leftArrow');
            const rightArrow = document.getElementById('rightArrow');
            
            if (!scrollContainer || window.innerWidth > 768) return;
            
            function updateArrowVisibility() {
                if (scrollContainer.scrollLeft <= 10) {
                    leftArrow.style.display = 'none';
                } else {
                    leftArrow.style.display = 'flex';
                }
                
                if (scrollContainer.scrollLeft + scrollContainer.clientWidth >= scrollContainer.scrollWidth - 10) {
                    rightArrow.style.display = 'none';
                } else {
                    rightArrow.style.display = 'flex';
                }
            }
            
            rightArrow.addEventListener('click', () => {
                scrollContainer.scrollBy({ left: 200, behavior: 'smooth' });
                setTimeout(updateArrowVisibility, 300);
            });
            
            leftArrow.addEventListener('click', () => {
                scrollContainer.scrollBy({ left: -200, behavior: 'smooth' });
                setTimeout(updateArrowVisibility, 300);
            });
            
            scrollContainer.addEventListener('scroll', updateArrowVisibility);
            updateArrowVisibility();
            
            // Hide arrows on desktop
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) {
                    leftArrow.style.display = 'none';
                    rightArrow.style.display = 'none';
                } else {
                    updateArrowVisibility();
                }
            });
        }

        // Load best sellers
        async function loadBestSellers() {
            try {
                const doc = await db.collection('landingPage').doc('bestSellers').get();
                const container = document.getElementById('bestSellersGrid');
                
                if (doc.exists) {
                    const bestSellersData = doc.data();
                    const bestSellers = bestSellersData.products || [];
                    
                    if (bestSellers.length > 0) {
                        renderProducts(container, bestSellers, 'bestSellers');
                    } else {
                        container.innerHTML = `
                            <div class="empty-state" style="grid-column: 1 / -1;">
                                <h3>No Best Sellers</h3>
                                <p>Check back soon for popular products</p>
                            </div>
                        `;
                    }
                } else {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <h3>No Best Sellers</h3>
                            <p>Check back soon for popular products</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("Error loading best sellers:", error);
                document.getElementById('bestSellersGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>Error Loading Best Sellers</h3>
                        <p>Please try refreshing the page</p>
                    </div>
                `;
            }
        }

        // Load all products
        async function loadAllProducts() {
            try {
                const snapshot = await db.collection('products').get();
                products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (error) {
                console.error("Error loading products:", error);
            }
        }

        // Create category sections
        function createCategorySections() {
            const container = document.getElementById('categoryProductsSections');
            
            if (categories.length === 0 || products.length === 0) return;
            
            container.innerHTML = categories.map(category => {
                const categoryProducts = products.filter(product => product.category === category.name);
                
                if (categoryProducts.length === 0) return '';
                
                return `
                    <section class="category-products-section">
                        <div class="heading-row">
                            <h2>${category.name}</h2>
                            <a href="manage-products.html?category=${encodeURIComponent(category.name)}">View All</a>
                        </div>
                        <div class="scroll-container">
                            <div class="arrow left" onclick="scrollCategoryLeft('${category.id}')">&#10094;</div>
                            <div class="arrow right" onclick="scrollCategoryRight('${category.id}')">&#10095;</div>
                            <div class="scroll-products" id="category-${category.id}">
                                ${categoryProducts.map(product => `
                                    <div class="scroll-product" onclick="viewProduct('${product.id}')">
                                        <div class="scroll-image-container">
                                            <img src="${product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/280?text=No+Image'}" 
                                                 alt="${product.name}" 
                                                 class="scroll-product-image"
                                                 onerror="this.src='https://via.placeholder.com/280?text=Error'">
                                            ${product.oldPrice && product.oldPrice > product.price ? 
                                                `<div class="badge sale">SALE</div>` : ''}
                                        </div>
                                        <div class="scroll-product-info">
                                            <div class="scroll-product-title">${product.name}</div>
                                            <div class="scroll-product-price">
                                                <span class="scroll-current-price">$${product.price?.toFixed(2) || '0.00'}</span>
                                                ${product.oldPrice && product.oldPrice > product.price ? 
                                                    `<span class="scroll-original-price">$${product.oldPrice.toFixed(2)}</span>
                                                     <span class="scroll-discount">${Math.round((1 - product.price / product.oldPrice) * 100)}% OFF</span>` : ''}
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </section>
                `;
            }).join('');
            
            // Initialize scrolling for category sections
            initializeCategoryProductScrolling();
        }

        // Initialize category product scrolling
        function initializeCategoryProductScrolling() {
            categories.forEach(category => {
                const scrollContainer = document.getElementById(`category-${category.id}`);
                if (scrollContainer) {
                    const leftArrow = scrollContainer.parentElement.querySelector('.arrow.left');
                    const rightArrow = scrollContainer.parentElement.querySelector('.arrow.right');
                    
                    function updateArrowVisibility() {
                        if (scrollContainer.scrollLeft <= 10) {
                            leftArrow.style.display = 'none';
                        } else {
                            leftArrow.style.display = 'flex';
                        }
                        
                        if (scrollContainer.scrollLeft + scrollContainer.clientWidth >= scrollContainer.scrollWidth - 10) {
                            rightArrow.style.display = 'none';
                        } else {
                            rightArrow.style.display = 'flex';
                        }
                    }
                    
                    scrollContainer.addEventListener('scroll', updateArrowVisibility);
                    updateArrowVisibility();
                }
            });
        }

        // Scroll functions for category products
        function scrollCategoryLeft(categoryId) {
            const container = document.getElementById(`category-${categoryId}`);
            if (container) {
                container.scrollBy({ left: -300, behavior: 'smooth' });
            }
        }

        function scrollCategoryRight(categoryId) {
            const container = document.getElementById(`category-${categoryId}`);
            if (container) {
                container.scrollBy({ left: 300, behavior: 'smooth' });
            }
        }

        // Render products in a grid
        function renderProducts(container, products, type) {
            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>No Products Found</h3>
                        <p>Check back soon for new arrivals</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = products.map(product => `
                <div class="product-card" onclick="viewProduct('${product.id}')">
                    <div class="image-container">
                        <img src="${product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/300?text=No+Image'}" 
                             alt="${product.name}" 
                             class="product-image"
                             onerror="this.src='https://via.placeholder.com/300?text=Error'">
                        ${product.oldPrice && product.oldPrice > product.price ? 
                            `<div class="badge sale">SALE</div>` : ''}
                        <button class="wishlist-btn" onclick="event.stopPropagation(); toggleWishlist('${product.id}')">
                            <i class="far fa-heart"></i>
                        </button>
                    </div>
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">
                            <span class="current-price">$${product.price?.toFixed(2) || '0.00'}</span>
                            ${product.oldPrice && product.oldPrice > product.price ? 
                                `<span class="original-price">$${product.oldPrice.toFixed(2)}</span>
                                 <span class="discount">${Math.round((1 - product.price / product.oldPrice) * 100)}% OFF</span>` : ''}
                        </div>
                        <div class="rating">
                            <div class="stars">${generateRandomStars()}</div>
                            <span class="rating-count">${generateRandomRating()}</span>
                        </div>
                        <div class="stock ${product.isAvailable ? 'in-stock' : 'low-stock'}">
                            <i class="fas ${product.isAvailable ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                            ${product.isAvailable ? 'In stock' : 'Out of stock'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Generate random stars for demo
        function generateRandomStars() {
            const rating = Math.random() * 2 + 3; // 3-5 stars
            const fullStars = Math.floor(rating);
            const halfStar = rating - fullStars >= 0.5;
            const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);
            
            return '★'.repeat(fullStars) + (halfStar ? '½' : '') + '☆'.repeat(emptyStars);
        }

        // Generate random rating count
        function generateRandomRating() {
            const rating = (Math.random() * 1.5 + 3.5).toFixed(1); // 3.5-5.0
            const count = Math.floor(Math.random() * 500 + 50); // 50-550
            return `${rating} (${count})`;
        }

        // View product
        function viewProduct(productId) {
            window.location.href = `view.html?id=${productId}`;
        }

        // Toggle wishlist
        function toggleWishlist(productId) {
            // For demo purposes - in a real app, this would save to Firebase
            const wishlistBtn = event.target.closest('.wishlist-btn');
            const icon = wishlistBtn.querySelector('i');
            
            if (icon.classList.contains('far')) {
                icon.classList.remove('far');
                icon.classList.add('fas', 'active');
                wishlistBtn.classList.add('active');
                showToast('Added to wishlist');
            } else {
                icon.classList.remove('fas', 'active');
                icon.classList.add('far');
                wishlistBtn.classList.remove('active');
                showToast('Removed from wishlist');
            }
        }

        // Cart functionality
        function loadCartFromStorage() {
            const savedCart = localStorage.getItem('shopsphere_cart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
                updateCartCount();
            }
        }

        function saveCartToStorage() {
            localStorage.setItem('shopsphere_cart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('mobileCartCount').textContent = count;
        }

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            const cartTotal = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-state">
                        <h3>Your cart is empty</h3>
                        <p>Add some products to get started</p>
                    </div>
                `;
                cartFooter.style.display = 'none';
                return;
            }
            
            let total = 0;
            cartItems.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                return `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-details">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-price">$${itemTotal.toFixed(2)}</div>
                            <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                                <button onclick="updateCartQuantity('${item.id}', ${item.quantity - 1})">-</button>
                                <span>${item.quantity}</span>
                                <button onclick="updateCartQuantity('${item.id}', ${item.quantity + 1})">+</button>
                                <button onclick="removeFromCart('${item.id}')" style="margin-left: auto; color: var(--red);">Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            cartTotal.textContent = `$${total.toFixed(2)}`;
            cartFooter.style.display = 'block';
        }

        function addToCart(product) {
            const existingItem = cart.find(item => item.id === product.id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/80?text=No+Image',
                    quantity: 1
                });
            }
            
            saveCartToStorage();
            showToast('Added to cart');
        }

        function updateCartQuantity(productId, newQuantity) {
            if (newQuantity < 1) {
                removeFromCart(productId);
                return;
            }
            
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity = newQuantity;
                saveCartToStorage();
                renderCart();
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCartToStorage();
            renderCart();
            showToast('Removed from cart');
        }

        // Utility functions
        function showToast(message) {
            // Simple toast notification
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: var(--primary);
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                z-index: 1300;
                box-shadow: var(--shadow);
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                document.body.removeChild(toast);
            }, 3000);
        }

        function showError(message) {
            // Simple error notification
            const error = document.createElement('div');
            error.textContent = message;
            error.style.cssText = `
                position: fixed;
                top: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--red);
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                z-index: 1300;
                box-shadow: var(--shadow);
            `;
            
            document.body.appendChild(error);
            
            setTimeout(() => {
                document.body.removeChild(error);
            }, 5000);
        }
    </script>
</body>
</html>
