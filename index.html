<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --bg-light: #f9fafb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --red: #dc2626;
            --red-light: #fef2f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
        }

        /* Promotional Banner */
        .promo-banner {
            background: var(--red);
            color: var(--white);
            padding: 0.5rem;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            overflow: hidden;
        }

        .promo-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-text 15s linear infinite;
            font-size: 0.875rem;
            font-weight: 500;
        }

        @keyframes scroll-text {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* Navbar Styles */
        .navbar {
            position: fixed;
            top: 32px; /* Adjusted to account for promo banner */
            left: 0;
            width: 100%;
            background: var(--white);
            box-shadow: var(--shadow);
            z-index: 1000;
            padding: 1rem;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Desktop Nav */
        .desktop-nav {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .nav-logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary);
            margin-right: 2rem;
            display: flex;
            align-items: center;
        }

        .nav-logo img {
            height: 40px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            margin-right: auto;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-search {
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin-right: 1rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            width: 300px;
        }

        .nav-search:focus-within {
            border-color: var(--primary);
            background: var(--white);
        }

        .nav-search input {
            border: none;
            background: transparent;
            outline: none;
            padding: 0 0.5rem;
            width: 100%;
        }

        .nav-icons {
            display: flex;
            gap: 0.5rem;
        }

        .nav-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            position: relative;
        }

        .nav-icon:hover {
            background: var(--bg-light);
        }

        .cart-count {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--red);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile Nav */
        .mobile-nav {
            display: none;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .mobile-nav-left, .mobile-nav-right {
            display: flex;
            gap: 0.5rem;
        }

        .mobile-nav-center {
            flex: 1;
            text-align: center;
        }

        .mobile-logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-logo img {
            height: 35px;
            width: auto;
        }

        .hamburger {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .hamburger:hover {
            background: var(--bg-light);
        }

        .hamburger span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--text);
            margin: 4px 0;
            transition: all 0.3s ease;
        }

        /* Search Overlay */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            display: none;
            flex-direction: column;
        }

        .search-header {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .search-input {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin: 0 1rem;
        }

        .search-input input {
            border: none;
            background: transparent;
            outline: none;
            padding: 0 0.5rem;
            width: 100%;
            font-size: 1rem;
        }

        .close-search {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .mobile-menu.active {
            transform: translateX(0);
        }

        .mobile-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .mobile-menu-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-menu {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .close-menu:hover {
            background: var(--bg-light);
        }

        .mobile-menu-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .mobile-menu-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 1.125rem;
            font-weight: 500;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--bg-light);
            transition: color 0.3s ease;
        }

        .mobile-menu-links a:hover {
            color: var(--primary);
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 80%;
            max-width: 400px;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .cart-sidebar.active {
            transform: translateX(0);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .cart-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-cart {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .close-cart:hover {
            background: var(--bg-light);
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--bg-light);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 600;
        }

        .cart-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--bg-light);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .checkout-btn:hover {
            background: var(--primary-dark);
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            max-height: 800px;
            overflow: hidden;
            background-color: var(--bg-light);
            margin-top: 110px; /* Space for promo banner + navbar */
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .carousel-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateX(100%) scale(0.9);
        }

        .carousel-slide.active {
            opacity: 1;
            transform: translateX(0) scale(1);
            z-index: 1;
        }

        .carousel-slide.prev {
            opacity: 0.7;
            transform: translateX(-100%) scale(0.9);
            z-index: 0;
        }

        .carousel-slide.next {
            opacity: 0.7;
            transform: translateX(100%) scale(0.9);
            z-index: 0;
        }

        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .mobile-image {
            display: none;
        }

        .carousel-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 3;
        }

        .carousel-indicator {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .carousel-indicator.active {
            background-color: rgba(255, 255, 255, 0.8);
        }

        .carousel-indicator.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: var(--white);
            animation: loading 5s linear;
            transform-origin: left;
        }

        @keyframes loading {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 3;
        }

        .carousel-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.8);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: var(--shadow);
        }

        .carousel-button:hover {
            background-color: var(--white);
        }

        .carousel-button svg {
            width: 24px;
            height: 24px;
            fill: var(--text);
        }

        /* Category Section */
        .category-section {
            padding: 3rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--text);
        }

        .category-wrapper {
            position: relative;
            max-width: 100%;
            overflow: hidden;
        }

        .category-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            transition: transform 0.3s ease;
        }

        .category {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .category:hover {
            transform: scale(1.05);
        }

        .category img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            transition: 0.3s;
            border: 2px solid var(--bg-light);
        }

        .category:hover img {
            border-color: var(--primary);
        }

        .category span {
            display: block;
            margin-top: 0.75rem;
            font-size: 1rem;
            color: var(--text);
            font-weight: 500;
        }

        /* Mobile view: horizontal scroll */
        @media (max-width: 768px) {
            .desktop-nav {
                display: none;
            }
            
            .mobile-nav {
                display: flex;
            }
            
            .desktop-image {
                display: none;
            }
            
            .mobile-image {
                display: block;
            }
            
            .carousel-nav {
                padding: 0 1rem;
            }
            
            .carousel-button {
                width: 40px;
                height: 40px;
            }

            .hero {
                margin-top: 110px;
            }

            .category-wrapper {
                padding: 0;
            }

            .category-container {
                flex-wrap: nowrap;
                overflow-x: auto;
                scroll-behavior: smooth;
                gap: 1.5rem;
                justify-content: flex-start;
                padding: 0 1.5rem;
            }

            .category-container::-webkit-scrollbar {
                display: none;
            }

            .category img {
                width: 90px;
                height: 90px;
            }

            .category span {
                font-size: 0.875rem;
            }

            .arrow {
                display: flex;
            }
        }

        /* Arrow buttons - Fixed positioning */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--white);
            border: 1px solid var(--bg-light);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            display: none;
            z-index: 10;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .arrow:hover {
            background: var(--primary);
            color: var(--white);
        }

        .arrow.left {
            left: 10px;
        }

        .arrow.right {
            right: 10px;
        }

        /* Overlay for menus */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1100;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* Make hero and category images clickable */
        .slide-link {
            display: block;
            width: 100%;
            height: 100%;
        }

        .category-link {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        /* Best Sellers Section */
        .bestsellers-section {
            padding: 3rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--white);
        }

        .heading-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .heading-row h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }
        
        .heading-row a {
            text-decoration: none;
            font-weight: 600;
            color: var(--primary);
            transition: color 0.2s;
        }
        
        .heading-row a:hover {
            color: var(--red);
        }
        
        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        /* Product Card */
        .product-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        
        .product-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-5px);
        }
        
        /* Image Container */
        .image-container {
            position: relative;
            width: 100%;
            padding-top: 125%; /* 4:5 aspect ratio */
            overflow: hidden;
            background-color: #f8f9fa;
        }
        
        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .product-card:hover .product-image {
            transform: scale(1.05);
        }
        
        /* Badges */
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 1;
            letter-spacing: 0.5px;
        }
        
        .badge.sale {
            background-color: var(--red);
        }
        
        .badge.new {
            background-color: #2ecc71;
        }
        
        /* Wishlist Button */
        .wishlist-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 1;
        }
        
        .wishlist-btn:hover {
            background-color: var(--bg-light);
            transform: scale(1.1);
        }
        
        .wishlist-btn i {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .wishlist-btn.active i {
            color: var(--red);
        }
        
        /* Product Info */
        .product-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .product-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }
        
        .product-price {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .current-price {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }
        
        .original-price {
            font-size: 13px;
            color: var(--text-light);
            text-decoration: line-through;
            margin-left: 6px;
        }
        
        .discount {
            font-size: 11px;
            color: var(--red);
            font-weight: 700;
            margin-left: 6px;
            background-color: rgba(220, 38, 38, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .rating {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .stars {
            color: #ffb300;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .rating-count {
            font-size: 11px;
            color: var(--text-light);
        }
        
        .stock {
            font-size: 11px;
            color: var(--text-light);
            display: flex;
            align-items: center;
        }
        
        .stock i {
            margin-right: 4px;
            font-size: 10px;
        }
        
        .stock.in-stock {
            color: #2ecc71;
        }
        
        .stock.low-stock {
            color: #f39c12;
        }

        /* Mobile Styling for Best Sellers */
        @media (max-width: 768px) {
            .heading-row {
                margin-bottom: 20px;
            }
            
            .heading-row h2 {
                font-size: 22px;
            }
            
            .heading-row a {
                font-size: 14px;
            }
            
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .product-card {
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            }
            
            .image-container {
                padding-top: 130%;
            }
            
            .product-info {
                padding: 12px;
            }
            
            .product-title {
                font-size: 13px;
                margin-bottom: 6px;
            }
            
            .current-price {
                font-size: 15px;
            }
            
            .original-price {
                font-size: 12px;
            }
            
            .discount {
                font-size: 10px;
            }
            
            .rating {
                margin-bottom: 4px;
            }
            
            .stars {
                font-size: 11px;
            }
            
            .rating-count {
                font-size: 10px;
            }
            
            .stock {
                font-size: 10px;
            }
        }

        /* Sarees & Lehengas Sections */
        .scroll-section {
            padding: 3rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--white);
        }

        .scroll-container {
            position: relative;
            overflow: hidden;
        }

        .scroll-products {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 10px 0;
            scrollbar-width: none;
        }

        .scroll-products::-webkit-scrollbar {
            display: none;
        }

        .scroll-product {
            flex: 0 0 280px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .scroll-product:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);

                const toastInfo = sessionStorage.getItem('toastMessage');

                    sessionStorage.removeItem('toastMessage');

            initializeUI();

            fetchDynamicData();

        // --- DATA FETCHING (NEW) ---
        async function fetchDynamicData() {
            try {
                // 1. Fetch Hero Slides (Ordered by 'order' field)
                const heroSnapshot = await db.collection('heroSlides')
                    .orderBy('order', 'asc')
                    .get();
                heroSlides = heroSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // 2. Fetch Categories (Ordered by 'order' field)
                const categorySnapshot = await db.collection('categories')
                    .orderBy('order', 'asc')
                    .get();
                categories = categorySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // 3. Fetch All Products (to get Best Sellers and filter all)
                const productSnapshot = await db.collection('products')
                    .where('isAvailable', '==', true)
                    .get();
                
                products = productSnapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data(), 
                    createdAt: doc.data().createdAt ? doc.data().createdAt.toDate() : new Date(0) // Ensure date is usable
                }));
                
                // Render all dynamic content now that data is available
                renderDynamicContent();
            } catch (error) {
                console.error("Error fetching dynamic data:", error);
                showToast("Error loading dynamic content from server.", "error");
            }
        }

        function renderDynamicContent() {
            renderHeroCarousel();
            renderCategories();
            renderBestSellers();
            // Assuming Sarees and Lehengas sections need to be populated with specific categories
            renderScrollSection('sareesScroll', 'sarees-section', 'Beautiful Sarees', 'Saree');
            renderScrollSection('lehengasScroll', 'lehengas-section', 'Stunning Lehengas', 'Lehenga Sets');
            renderHandpickedSection();
            setupScrollArrowLogic(); // Setup scrolling for horizontal sections
        }
        
        // --- DYNAMIC RENDERING FUNCTIONS ---

        function renderHeroCarousel() {
            const carousel = document.getElementById('heroCarousel');
            if (!carousel) return;

            carousel.innerHTML = heroSlides.map((slide, index) => `
                <div class="carousel-slide ${index === 0 ? 'active' : ''}" role="group" aria-roledescription="slide" aria-label="${index + 1} of ${heroSlides.length}">
                    <a href="${slide.link || '#'}" class="slide-link">
                        <img 
                            src="${slide.desktopImage || 'https://via.placeholder.com/1920x800?text=Desktop+Image'}" 
                            alt="Featured Slide ${index + 1}"
                            class="slide-image desktop-image"
                            loading="lazy"
                        >
                        <img 
                            src="${slide.mobileImage || 'https://via.placeholder.com/750x1164?text=Mobile+Image'}" 
                            alt="Featured Slide ${index + 1}"
                            class="slide-image mobile-image"
                            loading="lazy"
                        >
                    </a>
                </div>
            `).join('');
            
            // Re-initialize carousel JS after rendering new slides
            initializeCarousel();

        function renderCategories() {
            const container = document.getElementById('category-container');
            if (!container) return;

            container.innerHTML = categories.map(cat => `
                <div class="category">

            // Re-initialize scroll arrow logic for categories
            setupScrollArrowLogic();

        function renderBestSellers() {
            const grid = document.getElementById('best-sellers-grid');
            const bestSellers = products.filter(p => p.isBestSeller === true).slice(0, 4); // Take top 4 best sellers
            if (!grid) return;
            
            grid.innerHTML = bestSellers.length ? bestSellers.map(p => renderProductCardHTML(p)).join('') : '<p style="grid-column:1/-1; text-align:center;">No Best Sellers set up in Admin.</p>';

            // Attach event listeners for the new cards
            wishlistButtonsSetup();
            productCardClickSetup();
        }
        
        function renderScrollSection(containerId, sectionId, headingText, categoryFilter) {
            const section = document.getElementById(sectionId);
            if (!section) return;
            
            const filteredProducts = products.filter(p => p.category === categoryFilter).slice(0, 10); // Up to 10 items
            const container = document.getElementById(containerId);
            
            if (filteredProducts.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block'; // Ensure section is visible if products exist
            
            if (container) {
                container.innerHTML = filteredProducts.map(p => renderScrollProductHTML(p)).join('');

        function renderHandpickedSection() {
            const mobileRow = document.getElementById('handpicked-mobile-row');

            // Use the first 4 products as placeholders for the mobile row if dynamic data is not set up for this specific section

            `).join('');

        // --- HTML TEMPLATE HELPERS ---
        
        function renderProductCardHTML(p) {
            // Simplified for Best Sellers Grid, matching the new design's structure
            const isSale = p.oldPrice > p.price && p.oldPrice > 0;
            const isNew = p.createdAt && (new Date() - p.createdAt < (30 * 24 * 60 * 60 * 1000)); // New in last 30 days
            
            // Dummy rating/stock data for now, as this is not in the original template
            const rating = (p.rating || 4.5).toFixed(1);
            const stockCount = p.stockCount || 10;
            const stockClass = stockCount > 5 ? 'in-stock' : 'low-stock';

            return `
                <div class="product-card" data-product-id="${p.id}">
                    <div class="image-container">
                        <img src="${p.images?.[0] || 'https://via.placeholder.com/350'}" alt="${p.name}" class="product-image" loading="lazy">
                        ${isSale ? '<div class="badge sale">SALE</div>' : ''}
                        ${isNew ? '<div class="badge new">NEW</div>' : ''}
                        <button class="wishlist-btn" data-product-id="${p.id}">
                            <i class="far fa-heart"></i>
                        </button>
                    </div>
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">
                            <span class="current-price">₹${p.price.toFixed(2)}</span>
                            ${isSale ? `<span class="original-price">₹${p.oldPrice.toFixed(2)}</span>` : ''}
                            ${isSale ? `<span class="discount">${Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100)}% OFF</span>` : ''}
                        </div>
                        <div class="rating">
                            <div class="stars">${'&#9733;'.repeat(Math.floor(rating))}${ '&#9734;'.repeat(5 - Math.floor(rating))}</div>
                            <span class="rating-count">${rating} (${Math.floor(p.ratingCount || 100)})</span>
                        </div>
                        <div class="stock ${stockClass}">
                            <i class="fas fa-check-circle"></i>
                            ${stockCount} in stock
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderScrollProductHTML(p) {
            const isSale = p.oldPrice > p.price && p.oldPrice > 0;
            const isNew = p.createdAt && (new Date() - p.createdAt < (30 * 24 * 60 * 60 * 1000)); 

            return `
                <div class="scroll-product" onclick="window.location.href='product-detail.html#${p.id}'">
                    <div class="scroll-image-container">
                        <img src="${p.images?.[0] || 'https://via.placeholder.com/350'}" alt="${p.name}" class="scroll-product-image">
                        ${isSale ? '<div class="badge sale">SALE</div>' : ''}
                        ${isNew ? '<div class="badge new">NEW</div>' : ''}
                    </div>
                    <div class="scroll-product-info">
                        <div class="scroll-product-title">${p.name}</div>
                        <div class="scroll-product-price">
                            <span class="scroll-current-price">₹${p.price.toFixed(2)}</span>
                            ${isSale ? `<span class="scroll-original-price">₹${p.oldPrice.toFixed(2)}</span>` : ''}
                            ${isSale ? `<span class="scroll-discount">${Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100)}% OFF</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHandpickedSection() {
            const mobileRow = document.getElementById('handpicked-mobile-row');
            const handpickedBtn = document.getElementById('handpicked-shop-btn');
            if (!mobileRow || !handpickedBtn) return;

            const handpickedProducts = products.slice(0, 4); // Use first 4 products as placeholders
            
            mobileRow.innerHTML = handpickedProducts.map(p => `
                <img src="${p.images?.[0] || 'https://via.placeholder.com/110'}" alt="${p.name}" loading="lazy">
            `).join('');
            
            handpickedBtn.onclick = () => alert('Navigating to Handpicked Collection (Link set to #)...');
        }

        // --- UI & INTERACTION LOGIC ---

        function initializeUI() {
            // Setup Overlay/Menu/Search/Cart Listeners
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const closeMenu = document.getElementById('closeMenu');
            const mobileMenu = document.getElementById('mobileMenu');
            const mobileSearchBtn = document.getElementById('mobileSearchBtn');
            const desktopSearchBtn = document.getElementById('desktopSearchBtn');
            const closeSearch = document.getElementById('closeSearch');
            const searchOverlay = document.getElementById('searchOverlay');
            const mobileCartBtn = document.getElementById('mobileCartBtn');
            const desktopCartBtn = document.getElementById('desktopCartBtn');
            const closeCart = document.getElementById('closeCart');
            const cartSidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');

            // Menu
            const openMobileMenu = () => { mobileMenu.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; };
            const closeMobileMenu = () => { mobileMenu.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; };
            mobileMenuBtn.addEventListener('click', openMobileMenu);
            closeMenu.addEventListener('click', closeMobileMenu);

            // Search
            const openSearch = () => { searchOverlay.style.display = 'flex'; document.body.style.overflow = 'hidden'; };
            const closeSearchOverlay = () => { searchOverlay.style.display = 'none'; document.body.style.overflow = ''; };
            mobileSearchBtn.addEventListener('click', openSearch);
            desktopSearchBtn.addEventListener('click', openSearch);
            closeSearch.addEventListener('click', closeSearchOverlay);

            // Cart
            const openCart = () => { cartSidebar.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; };
            const closeCartSidebar = () => { cartSidebar.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; };
            mobileCartBtn.addEventListener('click', openCart);
            desktopCartBtn.addEventListener('click', openCart);
            closeCart.addEventListener('click', closeCartSidebar);

            // Close all overlays on overlay click
            overlay.addEventListener('click', function() {
                closeMobileMenu();
                closeCartSidebar();
                closeSearchOverlay();
            });
            
            // Carousel Initialization
            initializeCarousel();
            
            // Setup dynamic scroll section arrow visibility logic
            setupScrollArrowLogic();
            window.addEventListener('resize', setupScrollArrowLogic);
        }

        function initializeCarousel() {
            const slides = Array.from(document.querySelectorAll('.carousel-slide'));
            const indicators = Array.from(document.querySelectorAll('.carousel-indicator'));
            const prevButton = document.querySelector('.carousel-button.prev');
            const nextButton = document.querySelector('.carousel-button.next');
            
            let currentIndex = 0;
            let autoScrollInterval;
            let isTransitioning = false;
            const transitionDuration = 800;
            const autoScrollDelay = 5000;
            
            function updateCarouselState() {
                slides.forEach((slide, index) => {
                    slide.classList.remove('active', 'prev', 'next');
                    if (index === currentIndex) {
                        slide.classList.add('active');
                    } else if (index === (currentIndex - 1 + slides.length) % slides.length) {
                        slide.classList.add('prev');
                    } else if (index === (currentIndex + 1) % slides.length) {
                        slide.classList.add('next');
                    }
                });
                
                indicators.forEach((indicator, index) => {
                    indicator.classList.toggle('active', index === currentIndex);
                    if (index === currentIndex) {
                        indicator.style.animation = 'none';
                        void indicator.offsetWidth; // Trigger reflow
                        indicator.style.animation = `loading ${autoScrollDelay}ms linear`;
                    }
                });
                
                slides.forEach((slide, index) => {
                    slide.setAttribute('aria-label', `${index + 1} of ${slides.length}`);
                });
            }
            
            function goToSlide(index) {
                if (isTransitioning || index === currentIndex) return;
                
                isTransitioning = true;
                currentIndex = index;
                updateCarouselState();
                
                setTimeout(() => {
                    isTransitioning = false;
                }, transitionDuration);
            }
            
            function nextSlide() { goToSlide((currentIndex + 1) % slides.length); }
            function prevSlide() { goToSlide((currentIndex - 1 + slides.length) % slides.length); }
            
            function startAutoScroll() {
                stopAutoScroll();
                autoScrollInterval = setInterval(nextSlide, autoScrollDelay);
            }
            
            function stopAutoScroll() {
                clearInterval(autoScrollInterval);
            }
            
            // Event Listeners for Carousel
            prevButton.onclick = prevSlide;
            nextButton.onclick = nextSlide;
            indicators.forEach((indicator, index) => {
                indicator.addEventListener('click', () => goToSlide(index));
            });
            
            const carouselEl = document.querySelector('.carousel');
            carouselEl.addEventListener('mouseenter', stopAutoScroll);
            carouselEl.addEventListener('mouseleave', startAutoScroll);
            carouselEl.addEventListener('focusin', stopAutoScroll);
            carouselEl.addEventListener('focusout', startAutoScroll);
            
            let touchStartX = 0;
            carouselEl.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
            carouselEl.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].screenX;
                if (Math.abs(touchStartX - touchEndX) > 50) {
                    if (touchStartX > touchEndX) nextSlide();
                    else prevSlide();
                }
            }, { passive: true });
            
            updateCarouselState();
            startAutoScroll();
        }
        
        function setupScrollArrowLogic() {
            document.querySelectorAll('.scroll-section').forEach(section => {
                const container = section.querySelector('.scroll-products');
                const leftArrow = section.querySelector('.arrow.left');
                const rightArrow = section.querySelector('.arrow.right');

                if (!container || !leftArrow || !rightArrow) return;

                function updateArrowVisibility() {
                    if (window.innerWidth <= 768) {
                        leftArrow.style.display = container.scrollLeft <= 10 ? 'none' : 'flex';
                        rightArrow.style.display = (container.scrollLeft + container.clientWidth >= container.scrollWidth - 10) ? 'none' : 'flex';
                    } else {
                        leftArrow.style.display = 'none';
                        rightArrow.style.display = 'none';
                    }
                }

                leftArrow.onclick = () => container.scrollBy({ left: -300, behavior: 'smooth' });
                rightArrow.onclick = () => container.scrollBy({ left: 300, behavior: 'smooth' });
                
                container.addEventListener('scroll', updateArrowVisibility);
                window.addEventListener('resize', updateArrowVisibility);
                updateArrowVisibility(); // Initial check
            });
        }

        function wishlistButtonsSetup() {
            document.querySelectorAll('.wishlist-btn').forEach(button => {
                // Remove old listeners to prevent duplicates
                button.onclick = null; 
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const icon = this.querySelector('i');
                    const productId = this.dataset.productId;
                    
                    if (icon.classList.contains('far')) {
                        icon.classList.remove('far');
                        icon.classList.add('fas', 'active');
                        this.classList.add('active');
                        // Assume function to add to wishlist in state/storage
                        showToast(`Added Product ${productId} to Wishlist!`, 'success');
                    } else {
                        icon.classList.remove('fas', 'active');
                        icon.classList.add('far');
                        this.classList.remove('active');
                        // Assume function to remove from wishlist in state/storage
                        showToast(`Removed Product ${productId} from Wishlist.`, 'error');
                    }
                });
            });
        }

        function productCardClickSetup() {
            document.querySelectorAll('.product-card').forEach(card => {
                card.removeEventListener('click', handleProductCardClick); // Prevent duplicates
                card.addEventListener('click', handleProductCardClick);
            });
        }
        
        function handleProductCardClick(event) {
            // Check if the click target was a button (like wishlist or quick view)
            if (event.target.closest('.wishlist-btn') || event.target.closest('.quick-view-btn')) {
                return; // Don't navigate if an action button was clicked
            }
            const productId = this.dataset.productId;
            if (productId) {
                window.location.href = `product-detail.html#${productId}`;
            }
        }

        // --- CART LOGIC (Adapted for Sidebar) ---
        const loadCartFromLocalStorage = () => cart = JSON.parse(localStorage.getItem('shopSphereCart') || '[]');
        const saveCartToLocalStorage = () => localStorage.setItem('shopSphereCart', JSON.stringify(cart));
        
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const el = document.getElementById('cart-count');
            if(el) { 
                el.textContent = count; 
                el.style.display = count > 0 ? 'block' : 'none';
            }
            renderCartSidebar(); // Update sidebar content
        }
        
        function renderCartSidebar() {
            const itemsContainer = document.getElementById('cart-sidebar-items');
            const totalSpan = document.getElementById('cart-sidebar-total');
            
            if (!itemsContainer || !totalSpan) return;

            let sidebarSubtotal = 0;
            
            const sidebarItemsHtml = cart.map(item => {
                const product = products.find(p => p.id === item.productId);
                const imageUrl = product?.images?.[0] || 'https://via.placeholder.com/80';
                
                if (!product) return `<p>Item ID ${item.productId} Not Found</p>`;
                
                sidebarSubtotal += product.price * item.quantity;
                
                return `
                    <div class="cart-item" data-product-id="${product.id}" data-size="${item.size}">
                        <img src="${imageUrl}" alt="${product.name}">
                        <div class="cart-item-details">
                            <div class="cart-item-title">${product.name}</div>
                            <div class="cart-item-price">$${product.price.toFixed(2)} x ${item.quantity}</div>
                        </div>
                        <button class="remove-btn" data-product-id="${product.id}" data-size="${item.size}" style="background:none; border:none; color:var(--text-light); cursor:pointer; font-size:1.2rem;">&times;</button>
                    </div>`;
            }).join('');
            
            itemsContainer.innerHTML = sidebarItemsHtml;
            totalSpan.textContent = `$${sidebarSubtotal.toFixed(2)}`;

            // Attach remove button listeners
            itemsContainer.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const productId = this.dataset.productId;
                    const size = this.dataset.size;
                    updateCartQuantity(productId, size, 0); // 0 means remove
                });
            });
        }
        
        function updateCartQuantity(productId, size, change) {
            const itemIndex = cart.findIndex(i => i.productId === productId && i.size === size);
            if (itemIndex > -1) {
                if (change === 0 || cart[itemIndex].quantity + change <= 0) { 
                    cart.splice(itemIndex, 1);
                } else {
                    cart[itemIndex].quantity += change;
                }
            }
            saveCartToLocalStorage();
            updateCartCount(); // This now calls renderCartSidebar()
        }

        // --- FINAL HELPER FUNCTIONS ---
        function renderNav() {
            const navRight = document.getElementById('nav-right');
            const userInfo = document.getElementById('user-info');
            const authBtn = document.getElementById('auth-btn');
            const mobileLoginLink = document.getElementById('mobile-login-logout-link');

            if (currentUser) {
                userInfo.textContent = `Welcome, ${currentUser.displayName ? currentUser.displayName.split(' ')[0] : 'User'}`;
                userInfo.style.display = 'inline';
                authBtn.textContent = 'Logout';
                authBtn.className = 'btn btn-secondary';
                mobileLoginLink.textContent = 'Logout';
                mobileLoginLink.onclick = () => auth.signOut();
                authBtn.onclick = () => auth.signOut();
            } else {
                userInfo.textContent = '';
                userInfo.style.display = 'none';
                authBtn.textContent = 'Login';
                authBtn.className = 'btn btn-primary';
                mobileLoginLink.textContent = 'Login / Register';
                mobileLoginLink.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                authBtn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            }
        }

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        document.getElementById('sidebar-checkout-btn').onclick = () => {
            if (currentUser) {
                window.location.href = 'checkout.html';
            } else {
                showToast('Please log in to checkout.', 'error');
                // Optionally trigger login/cart sidebar close here
            }
        };
    </script>
