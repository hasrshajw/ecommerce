<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All - ShopSphere</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA;
            --secondary-color: #6B7280; --dark-color: #1F2937; --danger-color: #EF4444;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --box-shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        
        .promo-banner { background: var(--danger-color); color: var(--white); padding: 0.5rem; position: fixed; top: 0; left: 0; width: 100%; z-index: 1100; overflow: hidden; }
        .promo-text { display: inline-block; white-space: nowrap; animation: scroll-text 15s linear infinite; font-size: 0.875rem; font-weight: 500; }
        @keyframes scroll-text { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        nav { background: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--box-shadow); position: sticky; top: 32px; z-index: 1000; }
        .nav-left h1 { margin: 0; font-size: 1.75rem; color: var(--primary-color); cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .nav-icon { cursor: pointer; position: relative; background: none; border: none; padding: 0.5rem; border-radius: 50%; transition: background-color 0.2s; }
        .nav-icon:hover { background-color: #e5e7eb; }
        #cart-count { position: absolute; top: 0; right: 0; background-color: #EF4444; color: white; border-radius: 50%; padding: 1px 5px; font-size: 0.7rem; font-weight: bold; }
        
        button { border: 1px solid transparent; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; padding: 0.75rem 1.5rem; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06); }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
        .btn-primary { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
        .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); border-color: var(--primary-hover); }
        
        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .shop-header { padding: 3rem 0; text-align: center; border-bottom: 1px solid #e5e7eb; margin-bottom: 2rem; }
        .shop-header h1 { font-size: 2.5rem; margin: 0 0 0.5rem; }
        .shop-header p { color: var(--secondary-color); font-size: 1.1rem; }

        .shop-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .filter-sort-group { display: flex; align-items: center; gap: 1rem; }
        .filter-sort-group label { font-size: 0.9rem; font-weight: 600; color: var(--dark-color); }
        .filter-sort-group select, .filter-sort-group input { padding: 0.75rem; border: 1px solid #d1d5db; border-radius: var(--border-radius); font-size: 1rem; }
        
        #category-filters button { background-color: #fff; color: var(--dark-color); border: 1px solid #ddd; padding: 0.6rem 1.2rem; border-radius: 99px; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        #category-filters button.active { background-color: var(--dark-color); color: #fff; border-color: var(--dark-color); }
        
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background-color: #fff; border-radius: var(--border-radius); overflow: hidden; position: relative; transition: box-shadow 0.3s; box-shadow: var(--box-shadow); cursor: pointer; }
        .product-card:hover { box-shadow: var(--box-shadow-lg); }
        .product-card .image-container { position: relative; overflow: hidden; }
        .product-card img { width: 100%; height: 350px; object-fit: cover; transition: transform 0.3s; }
        .product-card:hover img { transform: scale(1.05); }
        .product-card .card-content { padding: 1.5rem; text-align: center; }
        .product-card h3 { margin: 0 0 0.5rem; font-size: 1.1rem; }
        .product-card .price-container { display: flex; justify-content: center; align-items: baseline; gap: 0.75rem; }
        .product-card .current-price { color: var(--primary-color); font-weight: 600; }
        .product-card .old-price { color: var(--secondary-color); text-decoration: line-through; font-size: 0.9rem; }

        .empty-state { text-align: center; padding: 5rem 1rem; background: #fff; border-radius: var(--border-radius); box-shadow: var(--box-shadow); }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        .toast.success { background-color: #10B981; }
        .toast.error { background-color: #EF4444; }
    </style>
</head>

                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>

    <div class="container">
        <div class="shop-header">
            <h1 id="shop-page-title">Shop All Products</h1>
            <p>Discover our full range of items, perfectly curated for you.</p>
        </div>

        <div class="shop-controls">
            <div id="category-filters"></div>
            <div class="filter-sort-group">
                <label for="sort-by">Sort By:</label>
                <select id="sort-by">
                    <option value="featured">Featured</option>
                    <option value="newest">Newest Arrivals</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                </select>
            </div>
        </div>

        <div id="product-grid">
            <p>Loading products...</p>
        </div>
        
        <div id="empty-state" class="empty-state" style="display:none;">
            <h2>No Products Found</h2>
            <p>Try adjusting your filters or search term.</p>
        </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzqYrP1qYSiiLLgKW3z3EcwMpiG4hyF6M",
            authDomain: "e-commerce27.firebaseapp.com",
            projectId: "e-commerce27",
            storageBucket: "e-commerce27.firebasestorage.app",
            messagingSenderId: "1000564724466",
            appId: "1:1000564724466:web:55047ed3c820197733366b",
        };
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allProducts = [];
        let availableCategories = [];
        let currentCategoryFilter = 'All';
        let currentSort = 'featured';
        let cart = [];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                loadCartFromLocalStorage();
                renderNav();
            });
            setupShopListeners();
            fetchProductsForShop();
        });
        
        function setupShopListeners() {
            const urlParams = new URLSearchParams(window.location.search);
            const initialCategory = urlParams.get('category');
            
            document.getElementById('sort-by').addEventListener('change', (e) => {
                currentSort = e.target.value;
                renderFilteredProducts();
            });
            
            document.getElementById('shop-search-input').addEventListener('input', renderFilteredProducts);
            
            if (initialCategory) {
                currentCategoryFilter = initialCategory;
            }
        }

        async function fetchProductsForShop() {
            try {
                const productSnapshot = await db.collection('products').where('isAvailable', '==', true).get();
                allProducts = productSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                const categorySnapshot = await db.collection('categories').get();
                availableCategories = ['All', ...categorySnapshot.docs.map(doc => doc.data().name).filter(name => name)];
                
                renderCategoryFilters();
                renderFilteredProducts();
            } catch (error) {
                console.error("Error fetching shop data:", error);
                document.getElementById('product-grid').innerHTML = `<div class="empty-state"><p>Error loading shop data.</p></div>`;
            }
        }
        
        function renderCategoryFilters() {
            const filtersContainer = document.getElementById('category-filters');
            filtersContainer.innerHTML = availableCategories.map(cat => `<button data-category="${cat}" class="${cat === currentCategoryFilter ? 'active' : ''}">${cat}</button>`).join('');
            
            filtersContainer.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', e => {
                    currentCategoryFilter = e.target.dataset.category;
                    document.querySelectorAll('#category-filters button.active').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderFilteredProducts();
                });
            });
        }
        
        function renderFilteredProducts() {
            let productsToRender = allProducts;
            const searchTerm = document.getElementById('shop-search-input').value.toLowerCase();
            
            if (currentCategoryFilter !== 'All') {
                productsToRender = productsToRender.filter(p => p.category === currentCategoryFilter);
            }

            if (searchTerm) {
                productsToRender = productsToRender.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) || 
                    p.category.toLowerCase().includes(searchTerm)
                );
            }
            
            if (currentSort === 'newest') {
                productsToRender.sort((a, b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0));
            } else if (currentSort === 'price-asc') {
                productsToRender.sort((a, b) => (a.price || 0) - (b.price || 0));
            } else if (currentSort === 'price-desc') {
                productsToRender.sort((a, b) => (b.price || 0) - (a.price || 0));
            } else if (currentSort === 'featured') {
                productsToRender.sort((a, b) => {
                    const isBestA = a.isBestSeller ? 1 : 0;
                    const isBestB = b.isBestSeller ? 1 : 0;
                    if (isBestA !== isBestB) return isBestB - isBestA;
                    return (a.name || "").localeCompare(b.name || "");
                });
            }

            const gridContainer = document.getElementById('product-grid');
            const emptyState = document.getElementById('empty-state');
            
            if (productsToRender.length === 0) {
                gridContainer.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                gridContainer.innerHTML = productsToRender.map(p => renderProductCardHTML(p)).join('');
                emptyState.style.display = 'none';
            }
            
            setupProductCardListeners();
        }

        function renderProductCardHTML(p) {
            const isSale = p.oldPrice > p.price && p.oldPrice > 0;
            const isNew = p.createdAt && (new Date() - p.createdAt < (30 * 24 * 60 * 60 * 1000));
            const rating = (p.rating || 4.5).toFixed(1);
            const stockCount = p.sizes ? p.sizes.filter(s => s.available).length * 2 : 10;
            const stockClass = stockCount > 2 ? 'in-stock' : 'low-stock';

            return `
                <div class="product-card" data-product-id="${p.id}">
                    <div class="image-container">
                        <img src="${p.images?.[0] || 'https://via.placeholder.com/350'}" alt="${p.name}" loading="lazy">
                        ${isSale ? '<span class="sale-badge" style="background-color:#EF4444; color:white; padding:0.25rem 0.75rem; font-size:0.8rem; font-weight:600; border-radius:var(--border-radius);">SALE</span>' : ''}
                        ${isNew ? '<span class="sale-badge" style="background-color:#2ecc71; color:white; padding:0.25rem 0.75rem; font-size:0.8rem; font-weight:600; border-radius:var(--border-radius); top:40px;">NEW</span>' : ''}
                        <button class="quick-view-btn" onclick="openQuickView('${p.id}')">Quick View</button>
                    </div>
                    <div class="card-content">
                        <h3>${p.name}</h3>
                        <div class="price-container">
                            <span class="current-price">$${p.price.toFixed(2)}</span>
                            ${isSale ? `<span class="old-price">$${p.oldPrice.toFixed(2)}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function setupProductCardListeners() {
            document.querySelectorAll('.product-card').forEach(card => {
                card.removeEventListener('click', handleProductCardClick);
                card.addEventListener('click', handleProductCardClick);
            });
            document.querySelectorAll('.product-card .quick-view-btn').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); openQuickView(btn.dataset.productId); };
            });
            document.querySelectorAll('.product-card .wishlist-btn').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); handleWishlist(btn.dataset.productId, btn); };
            });
        }
        
        function handleProductCardClick(event) {
            if (event.target.closest('.quick-view-btn') || event.target.closest('.wishlist-btn')) {
                return;
            }
            const productId = this.dataset.productId;
            if (productId) {
                window.location.href = `product-detail.html#${productId}`;
            }
        }

        function handleWishlist(productId, buttonEl) {
            if (!currentUser) { showToast('Please log in to manage your wishlist.', 'error'); return; }
            const icon = buttonEl.querySelector('i');
            const isCurrentlyActive = icon.classList.contains('fas');
            
            if (isCurrentlyActive) {
                icon.classList.remove('fas', 'active');
                icon.classList.add('far');
                buttonEl.classList.remove('active');
                showToast(`Removed Product ${productId} from Wishlist.`, 'error');
            } else {
                icon.classList.remove('far');
                icon.classList.add('fas', 'active');
                buttonEl.classList.add('active');
                showToast(`Added Product ${productId} to Wishlist!`, 'success');
            }
            // In a real app, you'd update Firestore here.
        }

        function openQuickView(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            const modal = document.getElementById('quick-view-modal');
            
            const sizesHtml = (product.sizes || []).filter(s => s.available).map(s => `<button data-size="${s.name}" ${s.name === 'M' ? 'class="selected"' : ''}>${s.name}</button>`).join('');

            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-image"><img src="${product.images?.[0] || 'https://via.placeholder.com/400'}" alt="${product.name}"></div>
                    <div class="modal-details">
                        <button class="close-btn" onclick="closeQuickView()">&times;</button>
                        <h4>${product.category || 'Apparel'}</h4>
                        <h1>${product.name}</h1>
                        <div class="price-container">
                            <span class="current-price">$${product.price.toFixed(2)}</span>
                            ${product.oldPrice > product.price ? `<span class="old-price">$${product.oldPrice.toFixed(2)}</span>` : ''}
                        </div>
                        <div class="description" style="margin-top:1rem; font-size:0.9rem; color:${var(--secondary-color)}">${product.description ? product.description.substring(0, 150) + '...' : 'Product details unavailable.'}</div>
                        <div class="size-selector" style="margin: 1.5rem 0;">
                            <h4>Size:</h4>
                            <div class="size-options">${sizesHtml || '<p style="font-size:0.9rem;">Sold Out</p>'}</div>
                        </div>
                        <button class="btn-primary" id="modal-add-to-cart" ${sizesHtml ? '' : 'disabled'} style="width:100%;">Add to Cart</button>
                        <a href="product-detail.html#${product.id}" style="display:block; text-align:center; margin-top:1rem; font-size:0.9rem; color: var(--primary-color); text-decoration: none;">View Full Details</a>
                    </div>
                </div>
            `;
            modal.style.display = 'flex';

            let quickViewSelectedSize = sizesHtml ? (product.sizes.find(s => s.available && s.name === 'M') ? 'M' : product.sizes.find(s => s.available)?.name) : null;

            modal.querySelectorAll('.size-options button').forEach(btn => {
                btn.addEventListener('click', () => {
                    modal.querySelector('.size-options button.selected')?.classList.remove('selected');
                    btn.classList.add('selected');
                    quickViewSelectedSize = btn.dataset.size;
                });
            });
            modal.querySelector('#modal-add-to-cart').addEventListener('click', () => {
                if (quickViewSelectedSize) {
                    handleAddToCart(productId, quickViewSelectedSize, 1);
                    closeQuickView();
                } else {
                    showToast('Please select an available size.', 'error');
                }
            });
        }
        
        function closeQuickView() { document.getElementById('quick-view-modal').style.display = 'none'; }
        
        function renderNav() {
            const navRight = document.getElementById('nav-right');
            const logoutIcon = `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" /></svg>`;
            if (currentUser) {
                let userActions = `<span style="margin-right: 1rem; font-weight: 600; color: var(--primary-color)">Welcome, ${currentUser.displayName ? currentUser.displayName.split(' ')[0] : 'User'}</span>`;
                if (currentUser.email === ADMIN_EMAIL) {
                    userActions += `<button class="btn-primary" onclick="window.location.href='admin-dashboard.html'">Admin</button>`;
                }
                navRight.innerHTML = userActions + `<button class="nav-icon" onclick="window.location.href='cart.html'"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c.51 0 .962-.343 1.087-.835l1.823-6.837A1.125 1.125 0 0018.32 5.25H5.82a1.125 1.125 0 00-1.087.835L3.72 8.25m0 0c0 .106.012.211.035.314.234 1.01 1.254 1.687 2.476 1.687h9.063c1.222 0 2.242-.677 2.476-1.687a4.5 4.5 0 00.035-.314z" /></svg><span id="cart-count">0</span></button>` + logoutButtonHtml;
            } else {
