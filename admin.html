<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ShopSphere</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --text: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --bg-light: #f9fafb;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --red: #dc2626;
            --green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .admin-badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text);
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-google {
            background: var(--white);
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-google:hover {
            background: var(--bg-light);
            border-color: var(--text-light);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 1rem;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--text-light);
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fef2f2;
            color: var(--red);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #fecaca;
            font-size: 0.875rem;
            display: none;
            margin-bottom: 1rem;
        }

        .success-message {
            background: #f0fdf4;
            color: var(--green);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
            font-size: 0.875rem;
            display: none;
            margin-bottom: 1rem;
        }

        .admin-email {
            background: #fffbeb;
            color: #d97706;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #fed7aa;
            font-size: 0.75rem;
            margin-bottom: 1rem;
        }

        .admin-email strong {
            display: block;
            margin-bottom: 0.25rem;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }
            
            .logo h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>ShopSphere</h1>
            <p>Premium E-commerce Platform</p>
        </div>

        <div class="admin-badge">
            ADMIN PANEL
        </div>

        <div class="admin-email">
            <strong>Admin Access Only</strong>
            <span>Use your authorized Google account</span>
        </div>

        <div class="error-message" id="errorMessage">
            <!-- Error messages will appear here -->
        </div>

        <div class="success-message" id="successMessage">
            <!-- Success messages will appear here -->
        </div>

        <div class="login-form">
            <button class="btn btn-google" onclick="signInWithGoogle()" id="googleSignInBtn">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </button>

            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                Signing in...
            </div>
        </div>

        <div class="divider">
            <span>Secure Access</span>
        </div>

        <div style="font-size: 0.75rem; color: var(--text-light); line-height: 1.5;">
            <p>Only authorized administrators can access this panel.</p>
            <p>All activities are logged for security purposes.</p>
        </div>
    </div>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyA1VS8uxSuiy50qtknIHm1bRYbmyW1Qm6U",
  authDomain: "vastramaya--magic.firebaseapp.com",
  projectId: "vastramaya--magic",
  storageBucket: "vastramaya--magic.firebasestorage.app",
  messagingSenderId: "606200705718",
  appId: "1:606200705718:web:5b4ee31fe3008845d2ec17",
  measurementId: "G-8XS75FC35W"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // Admin email configuration
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";

        // DOM elements
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Google Sign-In function
        async function signInWithGoogle() {
            try {
                // Show loading state
                showLoading(true);
                hideMessages();

                const provider = new firebase.auth.GoogleAuthProvider();
                
                // Add scopes if needed
                provider.addScope('email');
                provider.addScope('profile');

                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;

                // Check if user is admin
                if (user.email === ADMIN_EMAIL) {
                    showSuccess('Successfully signed in as admin!');
                    
                    // Store admin session
                    sessionStorage.setItem('adminAuthenticated', 'true');
                    sessionStorage.setItem('adminEmail', user.email);
                    sessionStorage.setItem('adminName', user.displayName);
                    
                    // Redirect to admin dashboard after short delay
                    setTimeout(() => {
                        window.location.href = 'manage-category.html';
                    }, 1500);
                    
                } else {
                    // Not admin - sign out and show error
                    await firebase.auth().signOut();
                    showError('Access denied. Only authorized administrators can access this panel.');
                }

            } catch (error) {
                console.error('Google Sign-In Error:', error);
                
                // Handle specific error cases
                if (error.code === 'auth/popup-closed-by-user') {
                    showError('Sign-in was cancelled.');
                } else if (error.code === 'auth/network-request-failed') {
                    showError('Network error. Please check your connection.');
                } else if (error.code === 'auth/popup-blocked') {
                    showError('Popup was blocked. Please allow popups for this site.');
                } else {
                    showError('Sign-in failed. Please try again.');
                }
                
                showLoading(false);
            }
        }

        // Check if user is already signed in
        firebase.auth().onAuthStateChanged((user) => {
            if (user && user.email === ADMIN_EMAIL) {
                // User is already signed in as admin
                sessionStorage.setItem('adminAuthenticated', 'true');
                sessionStorage.setItem('adminEmail', user.email);
                sessionStorage.setItem('adminName', user.displayName);
                
                // Redirect to admin dashboard
                window.location.href = 'manage-category.html';
            } else if (user) {
                // User is signed in but not admin - sign them out
                firebase.auth().signOut();
            }
        });

        // Check if user was redirected from admin page without authentication
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('redirect') === 'unauthorized') {
            showError('Please sign in to access the admin panel.');
        }

        // Utility functions
        function showLoading(show) {
            if (show) {
                googleSignInBtn.style.display = 'none';
                loading.style.display = 'flex';
            } else {
                googleSignInBtn.style.display = 'flex';
                loading.style.display = 'none';
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        // Add enter key support for accessibility
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                signInWithGoogle();
            }
        });

        // Add focus styles for accessibility
        googleSignInBtn.addEventListener('focus', function() {
            this.style.outline = '2px solid #2563eb';
            this.style.outlineOffset = '2px';
        });

        googleSignInBtn.addEventListener('blur', function() {
            this.style.outline = 'none';
        });
    </script>
</body>
</html>
