<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventory - Vastramaya Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --body-bg: #F8FAFC;
            --widget-bg: #FFFFFF;
            --border-color: #F1F5F9;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --brand-primary: #3B82F6;
            --brand-gradient: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            --hover-bg: #F8FAFC;
            --danger-color: #EF4444;
            --success-color: #10B981;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: var(--body-bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        
        .dashboard-container { display: grid; grid-template-columns: 280px 1fr; height: 100vh; position: relative; }
        .main-area { display: flex; flex-direction: column; height: 100vh; overflow-y: auto; background-color: var(--body-bg); }
        .main-header { 
            padding: 12px 2.5rem; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background-color: var(--widget-bg); 
            position: sticky; 
            top: 0; 
            z-index: 10; 
            box-shadow: var(--shadow-sm); 
            min-height: 65px;
        }
        
        .nav-logo { height: 42px; width: auto; object-fit: contain; }
        
        .sidebar { 
            background-color: var(--widget-bg); 
            border-right: 1px solid var(--border-color); 
            padding: 2rem 1.5rem; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            transition: transform 0.3s ease-in-out;
            box-shadow: var(--shadow-sm);
            z-index: 1001;
        }
        
        .sidebar-header { 
            display: flex; align-items: center; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color);
        } 
        
        .logo-container { display: flex; align-items: center; width: 100%; }
        .logo-image { height: 40px; width: auto; object-fit: contain; }
        
        .main-nav ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        
        .main-nav a { 
            display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--text-secondary); 
            font-weight: 500; padding: 0.875rem 1rem; border-radius: var(--radius-md); transition: var(--transition); position: relative;
        }
        
        .main-nav a i { font-size: 1.375rem; color: var(--text-secondary); transition: var(--transition); width: 24px; text-align: center; }
        
        .main-nav a:hover { background-color: var(--hover-bg); color: var(--text-primary); transform: translateY(-1px); } 
        .main-nav a:hover i { color: var(--brand-primary); }
        
        .main-nav a.active { 
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%); 
            color: var(--brand-primary); font-weight: 600; box-shadow: var(--shadow-sm);
        } 
        
        .main-nav a.active i { color: var(--brand-primary); }
        .main-nav a.active::before {
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 4px; height: 60%; background: var(--brand-gradient); border-radius: 0 4px 4px 0;
        }
        
        .profile-section { 
            margin-top: auto; padding-top: 1.5rem; border-top: 1px solid var(--border-color); 
            display: flex; align-items: center; gap: 0.75rem; cursor: pointer; 
            border-radius: var(--radius-md); transition: var(--transition); padding: 1rem;
        }
        
        .profile-section:hover { background-color: var(--hover-bg); }
        
        .profile-content-wrapper { display: flex; align-items: center; gap: 0.75rem; width: 100%; }
        .profile-avatar { 
            width: 40px; height: 40px; border-radius: 50%; object-fit: cover; 
            flex-shrink: 0; border: 2px solid var(--border-color); transition: var(--transition);
        }
        
        .profile-section:hover .profile-avatar { border-color: var(--brand-primary); }
        .profile-details { flex-grow: 1; min-width: 0; }
        .profile-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; font-size: 0.9rem; }
        .profile-email { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .profile-options i { font-size: 1.25rem; color: var(--text-secondary); transition: var(--transition); }
        .profile-section.active .profile-options i { transform: rotate(180deg); }
        
        .profile-popup { 
            position: absolute; bottom: 90px; left: 1.5rem; right: 1.5rem; 
            background-color: var(--widget-bg); border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-lg); border: 1px solid var(--border-color); 
            padding: 0.75rem; z-index: 100; opacity: 0; pointer-events: none; 
            transform: translateY(10px) scale(0.95); transition: var(--transition); 
        }
        
        .profile-popup.active { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
        .popup-header { display: flex; align-items: center; gap: 0.75rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); margin-bottom: 0.5rem; }
        .popup-list { list-style: none; } 
        .popup-list a { 
            display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem; 
            border-radius: var(--radius-sm); text-decoration: none; color: var(--text-primary); transition: var(--transition); cursor: pointer;
        }
        .popup-list a:hover { background-color: var(--hover-bg); } 
        .popup-list a i { font-size: 1.2rem; color: var(--text-secondary); }
        .popup-list a.logout i { color: var(--danger-color); } 
        .popup-list a.logout { color: var(--danger-color); }
        
        .menu-toggle, .sidebar-close-btn { display: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .btn-primary { background-color: var(--brand-primary); color: white; border: none; border-radius: var(--radius-sm); padding: 0.75rem 1.5rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .btn-primary:hover { background: #1D4ED8; }
        .btn-secondary { background-color: #F1F5F9; color: var(--text-primary); border: 1px solid #CBD5E1; border-radius: var(--radius-sm); padding: 0.75rem 1.5rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .btn-secondary:hover { background-color: #E2E8F0; }
        .btn-danger { background-color: var(--danger-color); color: white; border: none; border-radius: var(--radius-sm); padding: 0.5rem 1rem; cursor: pointer; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }

        .card { background-color: var(--widget-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 2rem; margin: 2rem auto; max-width: 1200px; border: 1px solid var(--border-color); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        
        fieldset { border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 1.5rem; margin: 0 0 1.5rem; background: #FAFAFA; }
        legend { font-weight: 600; padding: 0 0.5rem; font-size: 0.9rem; color: var(--text-primary); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            display: block; width: 100%; padding: 0.75rem 1rem; font-size: 0.95rem; line-height: 1.5; color: var(--text-primary);
            background-color: #fff; border: 1px solid #CBD5E1; border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--brand-primary); outline: 0; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .image-list-item { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
        .size-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; border-bottom: 1px solid var(--border-color); }
        .availability-toggle { appearance: none; width: 40px; height: 22px; background-color: #CBD5E1; border-radius: 99px; position: relative; cursor: pointer; transition: background-color 0.2s; }
        .availability-toggle::before { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background-color: white; top: 2px; left: 2px; transition: transform 0.2s; }
        .availability-toggle:checked { background-color: var(--success-color); }
        .availability-toggle:checked::before { transform: translateX(18px); }
        
        .form-actions { display: flex; justify-content: flex-end; gap: 1rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 1rem; backdrop-filter: blur(2px); }
        .modal { background: white; border-radius: var(--radius-lg); padding: 2rem; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .close-modal { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); }
        
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; pointer-events: none; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--radius-md); color: white; box-shadow: var(--shadow-lg); animation: slideIn 0.3s, fadeOut 0.3s 2.7s forwards; margin-top: 10px; pointer-events: auto; font-weight: 500; }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        
        .upload-btn { background: #fff; border: 2px dashed #CBD5E1; padding: 1rem; text-align: center; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); }
        .upload-btn:hover { border-color: var(--brand-primary); background: #F8FAFC; }
        .uploaded-images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.5rem; margin-top: 0.5rem; }
        .uploaded-image-item { position: relative; padding-top: 100%; }
        .uploaded-image-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }
        .uploaded-image-remove { position: absolute; top: -5px; right: -5px; background: var(--danger-color); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        @media (min-width: 768px) { .form-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 1024px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .sidebar { position: fixed; top: 0; left: 0; height: 100%; width: 85%; max-width: 320px; transform: translateX(-100%); z-index: 1000; padding: 2rem 1.25rem; }
            .sidebar.active { transform: translateX(0); }
            .main-header { padding: 12px 1.5rem; }
            .nav-logo { display: block; }
            .menu-toggle { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; font-size: 1.6rem; color: var(--text-primary); cursor: pointer; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: white; }
            .sidebar-close-btn { display: flex; align-items: center; justify-content: center; position: absolute; top: 1.5rem; right: 1.25rem; font-size: 1.75rem; color: var(--text-secondary); cursor: pointer; border: none; background: none; width: 36px; height: 36px; border-radius: 50%; }
            .card { margin: 1rem; padding: 1rem; border: none; }
            .modal-grid { grid-template-columns: 1fr; gap: 1rem; }
            .form-actions { flex-direction: column; }
            .form-actions button { width: 100%; }
        }
        @media (min-width: 1025px) { .nav-logo { display: none; } }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <button class="sidebar-close-btn" id="sidebar-close-btn"><i class='bx bx-x'></i></button>
            <div class="sidebar-header">
                <div class="logo-container">
                    <img src="https://product-ecommerces.netlify.app/vastramaya.png" alt="Vastramaya Logo" class="logo-image">
                </div>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html"><i class='bx bx-home-alt'></i> Dashboard</a></li>
                    <li><a href="#" class="active"><i class='bx bx-package'></i> Inventory</a></li>
                    <li><a href="#"><i class='bx bx-palette'></i> Customize Site</a></li>
                    <li><a href="#"><i class='bx bx-clipboard'></i> All Orders</a></li>
                </ul>
            </nav>
            <div class="profile-section" id="profile-section">
                <div class="profile-content-wrapper">
                    <img id="sidebar-avatar" src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile" class="profile-avatar">
                    <div class="profile-details">
                        <span class="profile-name" id="sidebar-name">Loading...</span>
                        <span class="profile-email" id="sidebar-email">...</span>
                    </div>
                    <div class="profile-options"><i class='bx bx-chevron-down'></i></div>
                </div>
            </div>
            <div class="profile-popup" id="profile-popup">
                <div class="popup-header">
                    <img id="popup-avatar" src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile" class="profile-avatar">
                    <div class="profile-details">
                        <span class="profile-name" id="popup-name">Loading...</span>
                        <span class="profile-email" id="popup-email">...</span>
                    </div>
                </div>
                <ul class="popup-list">
                    <li><a href="#"><i class='bx bx-user'></i> Profile</a></li>
                    <li><a href="#"><i class='bx bx-cog'></i> Settings</a></li>
                    <li><a href="#" id="logout-btn" class="logout"><i class='bx bx-log-out'></i> Logout</a></li>
                </ul>
            </div>
        </aside>
        
        <main class="main-area">
            <header class="main-header">
                <button class="menu-toggle" id="menu-toggle"><i class='bx bx-menu'></i></button>
                <img src="https://product-ecommerces.netlify.app/vastramaya.png" alt="Vastramaya Logo" class="nav-logo">
            </header>
            
            <div style="padding: 0 1rem;">
                <div id="product-editor-container" class="card">
                    <h1 id="editor-title" style="margin-top: 0; margin-bottom: 1.5rem; font-size: 1.5rem; color: var(--text-primary);">Loading Product Editor...</h1>
                    <div id="product-form-content">
                        <div style="display:flex; justify-content:center; padding:2rem; color:var(--text-secondary);">
                            <i class='bx bx-loader-alt bx-spin' style='font-size:2rem'></i>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <div id="color-variant-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="font-size: 1.25rem; font-weight: 600; margin: 0;" id="color-modal-title">Add Color Variant</h3>
                <button class="close-modal" onclick="closeColorModal()">&times;</button>
            </div>
            <form id="color-variant-form" style="display: flex; flex-direction: column; flex: 1; overflow-y: auto;">
                <div class="modal-grid">
                    <div class="form-column">
                        <div class="form-group">
                            <label for="color-name">Color Name</label>
                            <input type="text" id="color-name" required placeholder="e.g., Red, Blue">
                        </div>
                        <div class="form-group">
                            <label for="color-link">Color Image Link (or upload)</label>
                            <input type="url" id="color-link" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <div class="upload-btn" onclick="document.getElementById('color-image-upload').click()">
                                <div style="font-size:0.875rem; color:var(--text-secondary);">Click to upload color icon</div>
                            </div>
                            <input type="file" id="color-image-upload" accept="image/*" style="display: none;">
                            <img id="color-upload-preview" class="uploaded-image-preview" style="position:relative; height:60px; width:60px; margin-top:0.5rem; display:none;" alt="Preview">
                            <button type="button" class="upload-remove" onclick="removeColorUpload()" style="display: none; margin-top:0.5rem; position:relative; width:auto; padding:0.2rem 0.5rem; border-radius:4px;">Remove Upload</button>
                        </div>
                    </div>
                    <div class="form-column">
                        <fieldset>
                            <legend>Sizes & Stock</legend>
                            <div id="modal-sizes-list"></div>
                        </fieldset>
                    </div>
                </div>
                
                <fieldset>
                    <legend>Color Specific Images</legend>
                    <div class="form-group">
                        <div class="upload-btn" onclick="document.getElementById('multiple-color-images-upload').click()">
                            <div style="font-size:0.875rem; color:var(--text-secondary);">Upload Gallery Images</div>
                        </div>
                        <input type="file" id="multiple-color-images-upload" accept="image/*" multiple style="display: none;">
                    </div>
                    <div id="modal-color-images">
                        <div class="image-list-item">
                            <div class="form-group" style="flex-grow:1; margin:0;">
                                <input type="url" class="color-image-url" placeholder="Main Image URL">
                            </div>
                        </div>
                    </div>
                    <div id="color-uploaded-images" class="uploaded-images-grid"></div>
                    <button type="button" class="btn-secondary btn-sm" id="add-color-image-btn" style="margin-top:0.5rem; width: 100%;">Add URL Field</button>
                </fieldset>
                
                <div class="form-actions" style="margin-top: auto;">
                    <button type="button" class="btn-secondary" onclick="closeColorModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Variant</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.getElementById('menu-toggle');
            const closeBtn = document.getElementById('sidebar-close-btn');
            const overlay = document.getElementById('overlay');
            const profileSection = document.getElementById('profile-section');
            const profilePopup = document.getElementById('profile-popup');
            const logoutBtn = document.getElementById('logout-btn');

            const toggleMenu = () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            };
            
            if (menuToggle) menuToggle.addEventListener('click', toggleMenu);
            if (closeBtn) closeBtn.addEventListener('click', toggleMenu);
            if (overlay) overlay.addEventListener('click', toggleMenu);

            if (profileSection && profilePopup) {
                profileSection.addEventListener('click', e => { 
                    e.stopPropagation(); 
                    profilePopup.classList.toggle('active'); 
                    profileSection.classList.toggle('active'); 
                });
                document.addEventListener('click', e => { 
                    if (!profileSection.contains(e.target) && !profilePopup.contains(e.target)) { 
                        profilePopup.classList.remove('active'); 
                        profileSection.classList.remove('active'); 
                    } 
                });
            }

            if(logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    auth.signOut();
                });
            }
        });

        const firebaseConfig = {
            apiKey: "AIzaSyCdeonH3VytC21F3X6x0rCVCn2xXrGPoug",
            authDomain: "vastramaya---magic.firebaseapp.com",
            projectId: "vastramaya---magic",
            storageBucket: "vastramaya---magic.firebasestorage.app",
            messagingSenderId: "543460072082",
            appId: "1:543460072082:web:f3d1140e8f81ad338ae44b",
            measurementId: "G-E39VNDCFVE"
        };
        
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;
        let allCategories = [];
        const SIZES_LIST = ['S', 'M', 'L', 'XL', '2XL'];
        let currentColorEditingIndex = null;
        let colorUploadedFile = null;
        let colorUploadedImages = [];
        let generalUploadedImages = [];

        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                window.location.href = 'index.html';
                return;
            }
            updateProfileUI(user);
            initializeEditor();
        });

        function updateProfileUI(user) {
            const name = user.displayName || "Admin";
            const email = user.email;
            const avatar = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=3B82F6&color=fff`;
            
            document.getElementById('sidebar-name').textContent = name;
            document.getElementById('sidebar-email').textContent = email;
            document.getElementById('sidebar-avatar').src = avatar;
            
            document.getElementById('popup-name').textContent = name;
            document.getElementById('popup-email').textContent = email;
            document.getElementById('popup-avatar').src = avatar;
        }

        function initializeEditor() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            const categoryForCreation = params.get('category');

            if (productId) {
                document.getElementById('editor-title').textContent = 'Edit Product';
                loadProductForEdit(productId);
            } else if (categoryForCreation) {
                document.getElementById('editor-title').textContent = 'Add New Product';
                loadCategoriesAndRenderForm({ category: decodeURIComponent(categoryForCreation) });
            } else {
                document.getElementById('product-form-content').innerHTML = `<div style="text-align:center; padding:2rem;">No product ID provided. <a href="index.html" style="color:var(--brand-primary)">Return to Dashboard</a></div>`;
                document.getElementById('editor-title').textContent = 'Product Editor';
            }
        }

        async function loadCategories() {
            try {
                const snapshot = await db.collection('categories').orderBy('name').get();
                return snapshot.docs.map(doc => doc.data().name);
            } catch (error) {
                console.error("Error loading categories:", error);
                return [];
            }
        }

        async function loadProductForEdit(productId) {
            try {
                const doc = await db.collection('products').doc(productId).get();
                if (!doc.exists) {
                    showToast('Product not found.', 'error');
                    return;
                }
                const productData = { id: doc.id, ...doc.data() };
                allCategories = await loadCategories();
                renderProductForm(productData);
            } catch (error) {
                console.error("Error loading product:", error);
                showToast("Failed to load product data.", "error");
            }
        }
        
        async function loadCategoriesAndRenderForm(initialData = {}) {
            allCategories = await loadCategories();
            renderProductForm({...initialData, id: null});
        }

        function renderProductForm(product) {
            const container = document.getElementById('product-form-content');
            const isEditing = !!product.id;
            const categoryForCreation = new URLSearchParams(window.location.search).get('category');
            const categoryFromUrl = categoryForCreation ? decodeURIComponent(categoryForCreation) : product.category;
            
            const categorySelectOptions = allCategories.map(cat => 
                `<option value="${cat}" ${cat === categoryFromUrl ? 'selected' : ''}>${cat}</option>`
            ).join('') + '<option value="--new--">-- Create New Category --</option>';
            
            const existingImagesHtml = (product.images || ['']).map((url, index) => `
                <div class="image-list-item">
                    <div class="form-group" style="flex-grow:1; margin:0;"><input type="url" class="image-url-input" value="${url}" placeholder="${index === 0 ? 'Main Image URL' : 'Additional Image URL'}"></div>
                    ${index > 0 ? '<button type="button" class="btn-danger" style="padding:0.5rem; display:flex; align-items:center;" onclick="this.parentElement.remove()"><i class="bx bx-trash"></i></button>' : ''}
                </div>
            `).join('');

            container.dataset.colorVariants = JSON.stringify(product.colorVariants || []);
            const colorVariantsHtml = renderColorVariantsSection(product.colorVariants || []);

            container.innerHTML = `
                <form id="product-form">
                    <div class="form-grid">
                        <div class="form-column">
                            <fieldset>
                                <legend>Core Details</legend>
                                <div class="form-group"><label for="name">Product Name</label><input type="text" id="name" value="${product.name||''}" required placeholder="Product Name"></div>
                                <div class="form-group">
                                    <label for="category">Category</label>
                                    <select id="category-select"><option value="">Select a category...</option>${categorySelectOptions}</select>
                                    <input type="text" id="new-category-input" placeholder="Enter new category name" style="display:none; margin-top:0.5rem;">
                                </div>
                            </fieldset>
                            <fieldset>
                                <legend>Pricing</legend>
                                <div class="form-group"><label for="price">Current Price ($)</label><input type="number" id="price" step="0.01" value="${product.price||''}" required placeholder="19.99"></div>
                                <div class="form-group"><label for="oldPrice">Old Price ($)</label><input type="number" id="oldPrice" step="0.01" value="${product.oldPrice||0}" placeholder="24.99"></div>
                            </fieldset>
                        </div>
                        <div class="form-column">
                            <fieldset>
                                <legend>Color Variants</legend>
                                <div id="color-variants-container" style="display:flex; flex-direction:column; gap:0.75rem;">
                                    ${colorVariantsHtml}
                                </div>
                                <button type="button" class="btn-primary btn-sm" onclick="openColorModal()" style="margin-top:1rem; width: 100%;"><i class='bx bx-plus'></i> Add Color Variant</button>
                            </fieldset>
                            <fieldset>
                                <legend>General Images</legend>
                                <div class="form-group">
                                    <div class="upload-btn" onclick="document.getElementById('general-images-upload').click()">
                                        <div style="color:var(--text-secondary); font-size:0.9rem;">Upload Multiple Images</div>
                                    </div>
                                    <input type="file" id="general-images-upload" accept="image/*" multiple style="display: none;">
                                </div>
                                <div id="general-uploaded-images" class="uploaded-images-grid"></div>
                                <div id="image-list" style="margin-top: 1rem;">${existingImagesHtml}</div>
                                <button type="button" class="btn-secondary btn-sm" id="add-image-btn" style="margin-top:0.5rem; width:100%;">Add URL Field</button>
                            </fieldset>
                        </div>
                    </div>
                    <fieldset>
                        <legend>Description</legend>
                        <div class="form-group" style="margin-bottom: 0;"><textarea id="description" rows="5" placeholder="Product details">${product.description||''}</textarea></div>
                    </fieldset>
                </form>
                <div class="form-actions">
                    <button class="btn-secondary" onclick="window.history.back()">Cancel</button>
                    <button class="btn-primary" id="save-product-btn">${isEditing ? 'Save Changes' : 'Create Product'}</button>
                </div>
            `;
            
            setupProductFormListeners(product.id);
        }

        function renderColorVariantsSection(colorVariants) {
            if (!colorVariants || colorVariants.length === 0) {
                return '<p style="color: var(--text-secondary); font-style: italic; text-align: center; padding:1rem;">No color variants added yet.</p>';
            }

            return colorVariants.map((variant, index) => `
                <div style="background:#fff; border:1px solid var(--border-color); padding:0.75rem; border-radius:var(--radius-sm); display:flex; justify-content:space-between; align-items:center;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div style="width: 32px; height: 32px; border-radius: 50%; background-color: ${variant.hex || '#e5e7eb'}; border:1px solid var(--border-color);"></div>
                        <div>
                            <div style="font-weight:600; font-size:0.9rem;">${variant.name}</div>
                            <div style="font-size: 0.8rem; color: var(--text-secondary);">
                                ${variant.sizes ? variant.sizes.filter(s => s.available).length : 0} sizes active
                            </div>
                        </div>
                    </div>
                    <div style="display:flex; gap:0.5rem;">
                        <button type="button" class="btn-secondary btn-sm" onclick="editColorVariant(${index})"><i class='bx bx-edit'></i></button>
                        <button type="button" class="btn-danger btn-sm" onclick="removeColorVariant(${index})"><i class='bx bx-trash'></i></button>
                    </div>
                </div>
            `).join('');
        }

        function openColorModal(colorVariant = null, index = null) {
            currentColorEditingIndex = index;
            const modal = document.getElementById('color-variant-modal');
            const title = document.getElementById('color-modal-title');
            
            colorUploadedFile = null;
            colorUploadedImages = [];
            
            if (colorVariant) {
                title.textContent = 'Edit Color Variant';
                document.getElementById('color-name').value = colorVariant.name;
                document.getElementById('color-link').value = colorVariant.hex || '';
                renderModalSizes(colorVariant.sizes || []);
                
                const imagesContainer = document.getElementById('modal-color-images');
                imagesContainer.innerHTML = (colorVariant.images || ['']).map((url, index) => `
                    <div class="image-list-item">
                        <div class="form-group" style="flex-grow:1; margin:0;">
                            <input type="url" class="color-image-url" value="${url}" placeholder="${index === 0 ? 'Main Image URL' : 'Additional'}">
                        </div>
                        ${index > 0 ? '<button type="button" class="btn-danger btn-sm" onclick="this.parentElement.remove()"><i class="bx bx-trash"></i></button>' : ''}
                    </div>
                `).join('');
                document.getElementById('color-uploaded-images').innerHTML = '';
            } else {
                title.textContent = 'Add Color Variant';
                document.getElementById('color-variant-form').reset();
                renderModalSizes([]);
                document.getElementById('modal-color-images').innerHTML = `
                    <div class="image-list-item">
                        <div class="form-group" style="flex-grow:1; margin:0;">
                            <input type="url" class="color-image-url" placeholder="Main Image URL">
                        </div>
                    </div>
                `;
                document.getElementById('color-uploaded-images').innerHTML = '';
            }
            
            document.getElementById('color-upload-preview').style.display = 'none';
            document.querySelector('#color-variant-form .upload-remove').style.display = 'none';
            modal.style.display = 'flex';
        }

        function closeColorModal() {
            document.getElementById('color-variant-modal').style.display = 'none';
            currentColorEditingIndex = null;
        }

        function renderModalSizes(existingSizes = []) {
            const container = document.getElementById('modal-sizes-list');
            container.innerHTML = SIZES_LIST.map(size => {
                const sizeData = existingSizes.find(s => s.name === size);
                const isOffered = !!sizeData;
                const isAvailable = sizeData ? sizeData.available : false;
                
                return `
                    <div class="size-row" data-size-name="${size}">
                        <label style="display:flex; align-items:center; gap:0.75rem; cursor:pointer;">
                            <input type="checkbox" class="size-offered-checkbox" ${isOffered ? 'checked' : ''} style="width:18px;height:18px;">
                            <span>${size}</span>
                        </label>
                        <div style="display:flex; align-items:center; gap:0.5rem;">
                            <span style="font-size:0.8rem; color:var(--text-secondary);">Stock:</span>
                            <input type="checkbox" class="availability-toggle size-availability-toggle" ${isAvailable ? 'checked' : ''} ${!isOffered ? 'disabled' : ''}>
                        </div>
                    </div>
                `;
            }).join('');

            container.querySelectorAll('.size-offered-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const toggle = this.closest('.size-row').querySelector('.size-availability-toggle');
                    toggle.disabled = !this.checked;
                    if (!this.checked) toggle.checked = false;
                });
            });
        }

        function setupProductFormListeners(productId) {
            const container = document.getElementById('product-form-content');
            const categorySelect = container.querySelector('#category-select');
            const newCategoryInput = container.querySelector('#new-category-input');
            
            if (categorySelect.value === '--new--') newCategoryInput.style.display = 'block';
            categorySelect.addEventListener('change', () => { newCategoryInput.style.display = categorySelect.value === '--new--' ? 'block' : 'none'; });

            container.querySelector('#add-image-btn').onclick = () => {
                const list = container.querySelector('#image-list');
                const div = document.createElement('div');
                div.className = 'image-list-item';
                div.innerHTML = `<div class="form-group" style="flex-grow:1; margin:0;"><input type="url" class="image-url-input" placeholder="Additional Image URL"></div><button type="button" class="btn-danger btn-sm" onclick="this.parentElement.remove()"><i class="bx bx-trash"></i></button>`;
                list.appendChild(div);
            };

            document.getElementById('add-color-image-btn').onclick = () => {
                const list = document.getElementById('modal-color-images');
                const div = document.createElement('div');
                div.className = 'image-list-item';
                div.innerHTML = `
                    <div class="form-group" style="flex-grow:1; margin:0;">
                        <input type="url" class="color-image-url" placeholder="Additional Image URL">
                    </div>
                    <button type="button" class="btn-danger btn-sm" onclick="this.parentElement.remove()"><i class="bx bx-trash"></i></button>
                `;
                list.appendChild(div);
            };

            document.getElementById('color-image-upload').addEventListener('change', handleColorImageUpload);
            document.getElementById('multiple-color-images-upload').addEventListener('change', handleMultipleColorImagesUpload);
            document.getElementById('general-images-upload').addEventListener('change', handleGeneralImagesUpload);

            document.getElementById('color-variant-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveColorVariant();
            });

            container.querySelector('#save-product-btn').onclick = () => document.getElementById('product-form').requestSubmit();
            container.querySelector('#product-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await saveProduct(productId);
            });
        }

        function handleColorImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) { showToast("Image > 5MB", "error"); return; }
                colorUploadedFile = file;
                const preview = document.getElementById('color-upload-preview');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                document.querySelector('#color-variant-form .upload-remove').style.display = 'block';
                document.getElementById('color-link').value = '';
            }
        }

        function handleMultipleColorImagesUpload(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                if (file.size > 5 * 1024 * 1024) return;
                colorUploadedImages.push(file);
            });
            renderColorUploadedImages();
        }

        function handleGeneralImagesUpload(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                if (file.size > 5 * 1024 * 1024) return;
                generalUploadedImages.push(file);
            });
            renderGeneralUploadedImages();
        }

        function renderColorUploadedImages() {
            const container = document.getElementById('color-uploaded-images');
            container.innerHTML = colorUploadedImages.map((file, index) => `
                <div class="uploaded-image-item">
                    <img src="${URL.createObjectURL(file)}" class="uploaded-image-preview">
                    <button type="button" class="uploaded-image-remove" onclick="removeColorUploadedImage(${index})">×</button>
                </div>
            `).join('');
        }

        function renderGeneralUploadedImages() {
            const container = document.getElementById('general-uploaded-images');
            container.innerHTML = generalUploadedImages.map((file, index) => `
                <div class="uploaded-image-item">
                    <img src="${URL.createObjectURL(file)}" class="uploaded-image-preview">
                    <button type="button" class="uploaded-image-remove" onclick="removeGeneralUploadedImage(${index})">×</button>
                </div>
            `).join('');
        }

        function removeColorUploadedImage(index) { colorUploadedImages.splice(index, 1); renderColorUploadedImages(); }
        function removeGeneralUploadedImage(index) { generalUploadedImages.splice(index, 1); renderGeneralUploadedImages(); }

        function removeColorUpload() {
            colorUploadedFile = null;
            document.getElementById('color-image-upload').value = '';
            document.getElementById('color-upload-preview').style.display = 'none';
            document.querySelector('#color-variant-form .upload-remove').style.display = 'none';
        }

        async function uploadImage(file, productName, type) {
            try {
                const fileName = `${type}/${productName.toLowerCase().replace(/\s+/g, '-')}-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
                const storageRef = storage.ref().child(fileName);
                const snapshot = await storageRef.put(file);
                return await snapshot.ref.getDownloadURL();
            } catch (error) {
                console.error("Upload error:", error);
                throw new Error("Upload failed");
            }
        }

        async function saveColorVariant() {
            const colorName = document.getElementById('color-name').value;
            if (!colorName) { showToast('Color name required.', 'error'); return; }

            let colorImageUrl = document.getElementById('color-link').value;
            if (colorUploadedFile) {
                try { colorImageUrl = await uploadImage(colorUploadedFile, colorName, 'color-variants'); } 
                catch (e) { showToast('Image upload failed.', 'error'); return; }
            }

            const sizes = [];
            document.querySelectorAll('#modal-sizes-list .size-row').forEach(row => {
                if (row.querySelector('.size-offered-checkbox').checked) {
                    sizes.push({
                        name: row.dataset.sizeName,
                        available: row.querySelector('.size-availability-toggle').checked
                    });
                }
            });

            let colorImages = [...document.querySelectorAll('.color-image-url')].map(i => i.value.trim()).filter(Boolean);

            if (colorUploadedImages.length > 0) {
                try {
                    for (const file of colorUploadedImages) {
                        colorImages.push(await uploadImage(file, colorName, 'color-images'));
                    }
                } catch (e) { showToast('Gallery upload failed.', 'error'); return; }
            }

            if (colorImages.length === 0 && !colorImageUrl) { showToast('Image required.', 'error'); return; }

            const colorVariant = { name: colorName, hex: colorImageUrl, sizes: sizes, images: colorImages };
            const container = document.getElementById('product-form-content');
            let colorVariants = JSON.parse(container.dataset.colorVariants || '[]');

            if (currentColorEditingIndex !== null) colorVariants[currentColorEditingIndex] = colorVariant;
            else colorVariants.push(colorVariant);

            container.dataset.colorVariants = JSON.stringify(colorVariants);
            document.getElementById('color-variants-container').innerHTML = renderColorVariantsSection(colorVariants);
            closeColorModal();
            showToast('Variant saved!', 'success');
        }

        function editColorVariant(index) {
            const container = document.getElementById('product-form-content');
            const colorVariants = JSON.parse(container.dataset.colorVariants || '[]');
            if (colorVariants[index]) openColorModal(colorVariants[index], index);
        }

        function removeColorVariant(index) {
            if (!confirm('Remove variant?')) return;
            const container = document.getElementById('product-form-content');
            let colorVariants = JSON.parse(container.dataset.colorVariants || '[]');
            colorVariants.splice(index, 1);
            container.dataset.colorVariants = JSON.stringify(colorVariants);
            document.getElementById('color-variants-container').innerHTML = renderColorVariantsSection(colorVariants);
            showToast('Variant removed.', 'success');
        }

        async function saveProduct(productId) {
            const container = document.getElementById('product-form-content');
            const form = document.getElementById('product-form');
            
            let category = container.querySelector('#category-select').value;
            if (category === '--new--') category = container.querySelector('#new-category-input').value.trim();
            if (!category) { showToast('Category required.', 'error'); return; }

            let images = [...container.querySelectorAll('.image-url-input')].map(i => i.value.trim()).filter(Boolean);

            if (generalUploadedImages.length > 0) {
                try {
                    for (const file of generalUploadedImages) {
                        images.push(await uploadImage(file, form.name.value, 'products'));
                    }
                } catch (e) { showToast('Image upload failed.', 'error'); return; }
            }

            if (images.length === 0) { showToast('Main image required.', 'error'); return; }

            const colorVariants = JSON.parse(container.dataset.colorVariants || '[]');
            const productData = {
                name: form.name.value,
                category: category,
                price: parseFloat(form.price.value),
                oldPrice: parseFloat(form.oldPrice.value) || 0,
                images: images,
                colorVariants: colorVariants,
                description: form.description.value,
                isAvailable: colorVariants.some(v => v.sizes && v.sizes.some(s => s.available)) || images.length > 0
            };

            if (!productId) productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();

            const btn = document.getElementById('save-product-btn');
            btn.disabled = true; btn.textContent = 'Saving...';

            try {
                if (productId) {
                    await db.collection('products').doc(productId).update(productData);
                    showToast('Updated successfully!', 'success');
                } else {
                    await db.collection('products').add(productData);
                    showToast('Created successfully!', 'success');
                }
                setTimeout(() => window.history.back(), 1000);
            } catch(error) {
                console.error("Save error:", error);
                showToast("Save failed.", "error");
                btn.disabled = false; btn.textContent = 'Save';
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
