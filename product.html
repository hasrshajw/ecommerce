<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Editor - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1280px; margin: 0 auto; padding: 1rem; }
        nav { background: #fff; padding: 1rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--box-shadow); position: sticky; top: 0; z-index: 1000; }
        .nav-left h1 { margin: 0; font-size: 1.5rem; color: var(--primary-color); cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 0.5rem; }
        .nav-icon { cursor: pointer; position: relative; background: none; border: none; padding: 0.5rem; border-radius: 50%; transition: background-color 0.2s; }
        .nav-icon:hover { background-color: #e5e7eb; }
        button { border: none; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; padding: 0.75rem 1.5rem; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); }
        .btn-secondary { background-color: var(--secondary-color); color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background-color: #fff; border-radius: var(--border-radius); padding: 1.5rem; margin-bottom: 1rem; }
        .form-grid { display: block; gap: 1rem; }
        fieldset { border: 1px solid #e5e7eb; border-radius: var(--border-radius); padding: 1rem; margin: 0 0 1rem; }
        legend { font-weight: 600; padding: 0 0.5rem; font-size: 0.9rem; color: var(--dark-color); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-group input[type="text"], .form-group input[type="number"], .form-group input[type="url"], .form-group textarea, .form-group select {
            display: block; width: 100%; padding: 0.75rem; font-size: 0.95rem; line-height: 1.5; font-family: var(--font-family); color: var(--dark-color);
            background-color: #fff; border: 1px solid #ced4da; border-radius: var(--border-radius);
            transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary-color); outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .image-list-item { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
        .image-list-item .remove-image-btn { flex-shrink: 0; background: none; box-shadow: none; padding: 0.5rem; color: var(--danger-color); border: 1px solid transparent; }
        .image-list-item .remove-image-btn:hover { background-color: var(--light-color); border-color: #d1d5db; }
        .size-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; border-bottom: 1px solid #f3f4f6; }
        .size-controls { display: flex; align-items: center; gap: 1rem; }
        .availability-toggle { appearance: none; width: 40px; height: 22px; background-color: #ccc; border-radius: 99px; position: relative; cursor: pointer; transition: background-color 0.2s; }
        .availability-toggle::before { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background-color: white; top: 2px; left: 2px; transition: transform 0.2s; }
        .availability-toggle:checked { background-color: var(--success-color); }
        .availability-toggle:checked::before { transform: translateX(18px); }
        .availability-toggle:disabled { background-color: #e5e7eb; cursor: not-allowed; }
        .form-actions { display: flex; justify-content: flex-end; gap: 1rem; padding: 1rem; border-top: 1px solid #e5e7eb; background-color: var(--light-color); flex-wrap: wrap; }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }

        .color-variant-item { border: 1px solid #e5e7eb; border-radius: var(--border-radius); padding: 1rem; margin-bottom: 1rem; background: #fafafa; }
        .color-variant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
        .color-variant-title { font-weight: 600; font-size: 1rem; }
        .color-variant-actions { display: flex; gap: 0.5rem; }
        .color-preview { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #e5e7eb; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 1rem; }
        .modal { background: white; border-radius: var(--border-radius); padding: 1.5rem; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-title { font-size: 1.1rem; font-weight: 600; margin: 0; }
        .close-modal { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0; width: 30px; height: 30px; }
        .modal-grid { display: block; gap: 1rem; }
        .color-images-section { margin-top: 1rem; }
        .color-image-item { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
        
        .upload-container { margin-top: 0.5rem; }
        .upload-btn { 
            background: var(--light-color); border: 2px dashed #d1d5db; 
            padding: 0.75rem; text-align: center; border-radius: var(--border-radius);
            cursor: pointer; transition: all 0.2s; margin-bottom: 0.5rem;
        }
        .upload-btn:hover { border-color: var(--primary-color); background: #f0f4ff; }
        .upload-text { color: var(--secondary-color); font-size: 0.875rem; }
        .upload-preview { 
            width: 80px; height: 80px; object-fit: cover; border-radius: var(--border-radius);
            border: 2px solid #e5e7eb; margin-top: 0.5rem; display: none;
        }
        .upload-preview.show { display: block; }
        .upload-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .upload-remove { background: var(--danger-color); color: white; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; }
        .uploaded-images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.5rem; margin-top: 0.5rem; }
        .uploaded-image-item { position: relative; }
        .uploaded-image-preview { width: 80px; height: 80px; object-fit: cover; border-radius: var(--border-radius); border: 2px solid #e5e7eb; }
        .uploaded-image-remove { position: absolute; top: 5px; right: 5px; background: var(--danger-color); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 0.75rem; cursor: pointer; }

        @media (min-width: 768px) {
            .container { padding: 1.5rem; }
            nav { padding: 1rem 1.5rem; }
            .nav-left h1 { font-size: 1.75rem; }
            .nav-right { gap: 1rem; }
            .card { padding: 2rem; margin-bottom: 1.5rem; }
            .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
            fieldset { padding: 1.5rem; margin: 0 0 1.5rem; }
            .form-group { margin-bottom: 1.5rem; }
            .form-group textarea { min-height: 120px; }
            .form-actions { padding: 1.5rem; }
            .modal { padding: 2rem; max-width: 600px; }
            .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
            .upload-preview { width: 100px; height: 100px; }
            .uploaded-image-preview { width: 100px; height: 100px; }
            .uploaded-images-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .color-variant-item { padding: 1.5rem; }
            .color-variant-header { flex-wrap: nowrap; }
            .color-preview { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <nav>
        <div class="nav-left"><h1 onclick="window.location.href='index.html'">ShopSphere</h1></div>
        <div id="nav-right" class="nav-right"></div>
    </nav>

    <div class="container page">
        <div id="product-editor-container">
            <div class="card">
                <h1 id="editor-title">Loading Product Editor...</h1>
            </div>
            <div id="product-form-content">
                <div class="card"><p>Loading product data...</p></div>
            </div>
        </div>
    </div>

    <div id="color-variant-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="color-modal-title">Add Color Variant</h3>
                <button class="close-modal" onclick="closeColorModal()">&times;</button>
            </div>
            <form id="color-variant-form">
                <div class="modal-grid">
                    <div class="form-column">
                        <div class="form-group">
                            <label for="color-name">Color Name</label>
                            <input type="text" id="color-name" required placeholder="e.g., Red, Blue, Black">
                        </div>
                        <div class="form-group">
                            <label for="color-link">Color Image Link</label>
                            <input type="url" id="color-link" placeholder="https://example.com/color-image.jpg">
                        </div>
                        <div class="form-group">
                            <label>Or Upload Color Image</label>
                            <div class="upload-container">
                                <div class="upload-btn" onclick="document.getElementById('color-image-upload').click()">
                                    <div class="upload-text">Click to upload color image</div>
                                </div>
                                <input type="file" id="color-image-upload" accept="image/*" style="display: none;">
                                <img id="color-upload-preview" class="upload-preview" alt="Color upload preview">
                                <div class="upload-actions">
                                    <button type="button" class="upload-remove" onclick="removeColorUpload()" style="display: none;">Remove</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-column">
                        <fieldset>
                            <legend>Sizes & Stock</legend>
                            <div id="modal-sizes-list"></div>
                        </fieldset>
                    </div>
                </div>
                
                <fieldset>
                    <legend>Color Specific Images</legend>
                    <div class="form-group">
                        <label>Upload Multiple Images</label>
                        <div class="upload-container">
                            <div class="upload-btn" onclick="document.getElementById('multiple-color-images-upload').click()">
                                <div class="upload-text">Click to upload multiple images</div>
                            </div>
                            <input type="file" id="multiple-color-images-upload" accept="image/*" multiple style="display: none;">
                        </div>
                    </div>
                    <div id="modal-color-images">
                        <div class="color-image-item">
                            <div class="form-group" style="flex-grow:1; margin:0;">
                                <input type="url" class="color-image-url" placeholder="Main Image URL for this color">
                            </div>
                        </div>
                    </div>
                    <div id="color-uploaded-images" class="uploaded-images-grid"></div>
                    <button type="button" class="btn-secondary btn-sm" id="add-color-image-btn" style="margin-top:0.5rem;">Add Another Image URL</button>
                </fieldset>
                
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeColorModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Color Variant</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyCdeonH3VytC21F3X6x0rCVCn2xXrGPoug",
  authDomain: "vastramaya---magic.firebaseapp.com",
  projectId: "vastramaya---magic",
  storageBucket: "vastramaya---magic.firebasestorage.app",
  messagingSenderId: "543460072082",
  appId: "1:543460072082:web:f3d1140e8f81ad338ae44b",
  measurementId: "G-E39VNDCFVE"
};
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;
        let allCategories = [];
        const SIZES_LIST = ['S', 'M', 'L', 'XL', '2XL'];
        let currentColorEditingIndex = null;
        let colorUploadedFile = null;
        let colorUploadedImages = [];
        let generalUploadedImages = [];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                renderNav();
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializeEditor();
            });
        });

        function initializeEditor() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            const categoryForCreation = params.get('category');

            if (productId) {
                document.getElementById('editor-title').textContent = 'Edit Product';
                loadProductForEdit(productId);
            } else if (categoryForCreation) {
                document.getElementById('editor-title').textContent = 'Add New Product';
                loadCategoriesAndRenderForm({ category: decodeURIComponent(categoryForCreation) });
            } else {
                document.getElementById('product-form-content').innerHTML = `<div class="card"><p>Invalid request. Must provide a product ID or a category for creation.</p></div>`;
            }
        }

        async function loadCategories() {
            try {
                const snapshot = await db.collection('categories').orderBy('name').get();
                return snapshot.docs.map(doc => doc.data().name);
            } catch (error) {
                console.error("Error loading categories:", error);
                return [];
            }
        }

        async function loadProductForEdit(productId) {
            try {
                const doc = await db.collection('products').doc(productId).get();
                if (!doc.exists) {
                    showToast('Product not found.', 'error');
                    return;
                }
                const productData = { id: doc.id, ...doc.data() };
                allCategories = await loadCategories();
                renderProductForm(productData);
            } catch (error) {
                console.error("Error loading product data for edit:", error);
                showToast("Failed to load product data.", "error");
            }
        }
        
        async function loadCategoriesAndRenderForm(initialData = {}) {
            allCategories = await loadCategories();
            renderProductForm({...initialData, id: null});
        }

        function renderProductForm(product) {
            const container = document.getElementById('product-form-content');
            const isEditing = !!product.id;
            const categoryForCreation = new URLSearchParams(window.location.search).get('category');
            const categoryFromUrl = categoryForCreation ? decodeURIComponent(categoryForCreation) : product.category;
            
            const categorySelectOptions = allCategories.map(cat => 
                `<option value="${cat}" ${cat === categoryFromUrl ? 'selected' : ''}>${cat}</option>`
            ).join('') + '<option value="--new--">-- Create New Category --</option>';
            
            const existingImagesHtml = (product.images || ['']).map((url, index) => `
                <div class="image-list-item">
                    <div class="form-group" style="flex-grow:1; margin:0;"><input type="url" class="image-url-input" value="${url}" placeholder="${index === 0 ? 'Main Image URL' : 'Additional Image URL'}"></div>
                    ${index > 0 ? '<button type="button" class="remove-image-btn" onclick="this.parentElement.remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>' : ''}
                </div>
            `).join('');

            container.dataset.colorVariants = JSON.stringify(product.colorVariants || []);
            const colorVariantsHtml = renderColorVariantsSection(product.colorVariants || []);

            container.innerHTML = `
                <form id="product-form">
                    <div class="form-grid">
                        <div class="form-column">
                            <div class="card">
                                <fieldset>
                                    <legend>Core Details</legend>
                                    <div class="form-group"><label for="name">Product Name</label><input type="text" id="name" value="${product.name||''}" required placeholder="Product Name"></div>
                                    <div class="form-group">
                                        <label for="category">Category</label>
                                        <select id="category-select"><option value="">Select a category...</option>${categorySelectOptions}</select>
                                        <input type="text" id="new-category-input" placeholder="Enter new category name" style="display:none; margin-top:0.5rem;">
                                    </div>
                                </fieldset>
                            </div>
                            <div class="card">
                                <fieldset>
                                    <legend>Pricing</legend>
                                    <div class="form-group"><label for="price">Current Price ($)</label><input type="number" id="price" step="0.01" value="${product.price||''}" required placeholder="19.99"></div>
                                    <div class="form-group"><label for="oldPrice">Old Price ($)</label><input type="number" id="oldPrice" step="0.01" value="${product.oldPrice||0}" placeholder="24.99"></div>
                                </fieldset>
                            </div>
                        </div>
                        <div class="form-column">
                            <div class="card">
                                <fieldset>
                                    <legend>Color Variants</legend>
                                    ${colorVariantsHtml}
                                    <button type="button" class="btn-primary btn-sm" onclick="openColorModal()" style="margin-top:1rem;">+ Add Color Variant</button>
                                </fieldset>
                            </div>
                            <div class="card">
                                <fieldset>
                                    <legend>General Images</legend>
                                    <div class="form-group">
                                        <label>Upload Multiple Images</label>
                                        <div class="upload-container">
                                            <div class="upload-btn" onclick="document.getElementById('general-images-upload').click()">
                                                <div class="upload-text">Click to upload multiple images</div>
                                            </div>
                                            <input type="file" id="general-images-upload" accept="image/*" multiple style="display: none;">
                                        </div>
                                    </div>
                                    <div id="general-uploaded-images" class="uploaded-images-grid"></div>
                                    <div id="image-list">${existingImagesHtml}</div>
                                    <button type="button" class="btn-secondary" id="add-image-btn" style="padding:0.5rem 1rem; margin-top:0.5rem; width:100%; box-shadow:none;">Add Image URL</button>
                                </fieldset>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <fieldset>
                            <legend>Description</legend>
                            <div class="form-group"><textarea id="description" rows="5" placeholder="Product details">${product.description||''}</textarea></div>
                        </fieldset>
                    </div>
                </form>
                <div class="form-actions">
                    <button class="btn-secondary" onclick="window.history.back()">Cancel</button>
                    <button class="btn-primary" id="save-product-btn">${isEditing ? 'Save Changes' : 'Create Product'}</button>
                </div>
            `;
            
            setupProductFormListeners(product.id, categoryForCreation);
        }

        function renderColorVariantsSection(colorVariants) {
            if (colorVariants.length === 0) {
                return '<p style="color: var(--secondary-color); font-style: italic;">No color variants added yet.</p>';
            }

            return colorVariants.map((variant, index) => `
                <div class="color-variant-item" data-color-index="${index}">
                    <div class="color-variant-header">
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <div class="color-preview" style="background-color: ${variant.hex || '#e5e7eb'};"></div>
                            <div>
                                <div class="color-variant-title">${variant.name}</div>
                                <div style="font-size: 0.875rem; color: var(--secondary-color);">
                                    ${variant.sizes ? variant.sizes.filter(s => s.available).length : 0} sizes in stock
                                </div>
                            </div>
                        </div>
                        <div class="color-variant-actions">
                            <button type="button" class="btn-secondary btn-sm" onclick="editColorVariant(${index})">Edit</button>
                            <button type="button" class="btn-danger btn-sm" onclick="removeColorVariant(${index})">Remove</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openColorModal(colorVariant = null, index = null) {
            currentColorEditingIndex = index;
            const modal = document.getElementById('color-variant-modal');
            const title = document.getElementById('color-modal-title');
            
            colorUploadedFile = null;
            colorUploadedImages = [];
            
            if (colorVariant) {
                title.textContent = 'Edit Color Variant';
                document.getElementById('color-name').value = colorVariant.name;
                document.getElementById('color-link').value = colorVariant.hex || '';
                renderModalSizes(colorVariant.sizes || []);
                
                const imagesContainer = document.getElementById('modal-color-images');
                imagesContainer.innerHTML = (colorVariant.images || ['']).map((url, index) => `
                    <div class="color-image-item">
                        <div class="form-group" style="flex-grow:1; margin:0;">
                            <input type="url" class="color-image-url" value="${url}" placeholder="${index === 0 ? 'Main Image URL for this color' : 'Additional Image URL'}">
                        </div>
                        ${index > 0 ? '<button type="button" class="remove-image-btn" onclick="this.parentElement.remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>' : ''}
                    </div>
                `).join('');
                
                document.getElementById('color-uploaded-images').innerHTML = '';
            } else {
                title.textContent = 'Add Color Variant';
                document.getElementById('color-variant-form').reset();
                renderModalSizes([]);
                
                const imagesContainer = document.getElementById('modal-color-images');
                imagesContainer.innerHTML = `
                    <div class="color-image-item">
                        <div class="form-group" style="flex-grow:1; margin:0;">
                            <input type="url" class="color-image-url" placeholder="Main Image URL for this color">
                        </div>
                    </div>
                `;
                document.getElementById('color-uploaded-images').innerHTML = '';
            }
            
            document.getElementById('color-upload-preview').classList.remove('show');
            document.querySelector('#color-variant-form .upload-remove').style.display = 'none';
            
            modal.style.display = 'flex';
        }

        function closeColorModal() {
            document.getElementById('color-variant-modal').style.display = 'none';
            currentColorEditingIndex = null;
        }

        function renderModalSizes(existingSizes = []) {
            const container = document.getElementById('modal-sizes-list');
            container.innerHTML = SIZES_LIST.map(size => {
                const sizeData = existingSizes.find(s => s.name === size);
                const isOffered = !!sizeData;
                const isAvailable = sizeData ? sizeData.available : false;
                
                return `
                    <div class="size-row" data-size-name="${size}">
                        <label style="display:flex; align-items:center; gap:0.75rem; cursor:pointer;">
                            <input type="checkbox" class="size-offered-checkbox" ${isOffered ? 'checked' : ''} style="width:20px;height:20px;">
                            <span>${size}</span>
                        </label>
                        <div class="size-controls" style="display:flex; align-items:center; gap:1rem;">
                            <label style="font-size:0.9rem;">In Stock:</label>
                            <input type="checkbox" class="availability-toggle size-availability-toggle" ${isAvailable ? 'checked' : ''} ${!isOffered ? 'disabled' : ''}>
                        </div>
                    </div>
                `;
            }).join('');

            container.querySelectorAll('.size-offered-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const toggle = this.closest('.size-row').querySelector('.size-availability-toggle');
                    toggle.disabled = !this.checked;
                    if (!this.checked) {
                        toggle.checked = false;
                    }
                });
            });
        }

        function setupProductFormListeners(productId, categoryForCreation) {
            const container = document.getElementById('product-form-content');
            const categorySelect = container.querySelector('#category-select');
            const newCategoryInput = container.querySelector('#new-category-input');
            
            if (categorySelect.value === '--new--') newCategoryInput.style.display = 'block';
            categorySelect.addEventListener('change', () => { newCategoryInput.style.display = categorySelect.value === '--new--' ? 'block' : 'none'; });

            container.querySelector('#add-image-btn').onclick = () => {
                const list = container.querySelector('#image-list');
                const div = document.createElement('div');
                div.className = 'image-list-item';
                div.innerHTML = `<div class="form-group" style="flex-grow:1; margin:0;"><input type="url" class="image-url-input" placeholder="Additional Image URL"></div><button type="button" class="remove-image-btn" onclick="this.parentElement.remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>`;
                list.appendChild(div);
            };

            document.getElementById('add-color-image-btn').onclick = () => {
                const list = document.getElementById('modal-color-images');
                const div = document.createElement('div');
                div.className = 'color-image-item';
                div.innerHTML = `
                    <div class="form-group" style="flex-grow:1; margin:0;">
                        <input type="url" class="color-image-url" placeholder="Additional Image URL">
                    </div>
                    <button type="button" class="remove-image-btn" onclick="this.parentElement.remove()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                `;
                list.appendChild(div);
            };

            document.getElementById('color-image-upload').addEventListener('change', handleColorImageUpload);
            document.getElementById('multiple-color-images-upload').addEventListener('change', handleMultipleColorImagesUpload);
            document.getElementById('general-images-upload').addEventListener('change', handleGeneralImagesUpload);

            document.getElementById('color-variant-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveColorVariant();
            });

            container.querySelector('#save-product-btn').onclick = () => document.getElementById('product-form').requestSubmit();
            container.querySelector('#product-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await saveProduct(productId);
            });
        }

        function handleColorImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showToast("Image size should be less than 5MB", "error");
                    return;
                }
                colorUploadedFile = file;
                const preview = document.getElementById('color-upload-preview');
                preview.src = URL.createObjectURL(file);
                preview.classList.add('show');
                document.querySelector('#color-variant-form .upload-remove').style.display = 'block';
                document.getElementById('color-link').value = '';
            }
        }

        function handleMultipleColorImagesUpload(event) {
            const files = Array.from(event.target.files);
            if (files.length > 0) {
                files.forEach(file => {
                    if (file.size > 5 * 1024 * 1024) {
                        showToast("Image size should be less than 5MB", "error");
                        return;
                    }
                    colorUploadedImages.push(file);
                    renderColorUploadedImages();
                });
            }
        }

        function handleGeneralImagesUpload(event) {
            const files = Array.from(event.target.files);
            if (files.length > 0) {
                files.forEach(file => {
                    if (file.size > 5 * 1024 * 1024) {
                        showToast("Image size should be less than 5MB", "error");
                        return;
                    }
                    generalUploadedImages.push(file);
                    renderGeneralUploadedImages();
                });
            }
        }

        function renderColorUploadedImages() {
            const container = document.getElementById('color-uploaded-images');
            container.innerHTML = colorUploadedImages.map((file, index) => `
                <div class="uploaded-image-item">
                    <img src="${URL.createObjectURL(file)}" class="uploaded-image-preview" alt="Uploaded image">
                    <button type="button" class="uploaded-image-remove" onclick="removeColorUploadedImage(${index})">×</button>
                </div>
            `).join('');
        }

        function renderGeneralUploadedImages() {
            const container = document.getElementById('general-uploaded-images');
            container.innerHTML = generalUploadedImages.map((file, index) => `
                <div class="uploaded-image-item">
                    <img src="${URL.createObjectURL(file)}" class="uploaded-image-preview" alt="Uploaded image">
                    <button type="button" class="uploaded-image-remove" onclick="removeGeneralUploadedImage(${index})">×</button>
                </div>
            `).join('');
        }

        function removeColorUploadedImage(index) {
            colorUploadedImages.splice(index, 1);
            renderColorUploadedImages();
        }

        function removeGeneralUploadedImage(index) {
            generalUploadedImages.splice(index, 1);
            renderGeneralUploadedImages();
        }

        function removeColorUpload() {
            colorUploadedFile = null;
            document.getElementById('color-image-upload').value = '';
            document.getElementById('color-upload-preview').classList.remove('show');
            document.querySelector('#color-variant-form .upload-remove').style.display = 'none';
        }

        async function uploadImage(file, productName, type) {
            try {
                const fileName = `${type}/${productName.toLowerCase().replace(/\s+/g, '-')}-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
                const storageRef = storage.ref().child(fileName);
                const snapshot = await storageRef.put(file);
                const downloadURL = await snapshot.ref.getDownloadURL();
                return downloadURL;
            } catch (error) {
                console.error("Error uploading image:", error);
                throw new Error("Failed to upload image");
            }
        }

        async function saveColorVariant() {
            const form = document.getElementById('color-variant-form');
            const colorName = document.getElementById('color-name').value;
            
            if (!colorName) {
                showToast('Color name is required.', 'error');
                return;
            }

            let colorImageUrl = document.getElementById('color-link').value;

            if (colorUploadedFile) {
                try {
                    colorImageUrl = await uploadImage(colorUploadedFile, colorName, 'color-variants');
                } catch (error) {
                    showToast('Failed to upload color image. Please try again.', 'error');
                    return;
                }
            }

            const sizes = [];
            document.querySelectorAll('#modal-sizes-list .size-row').forEach(row => {
                if (row.querySelector('.size-offered-checkbox').checked) {
                    sizes.push({
                        name: row.dataset.sizeName,
                        available: row.querySelector('.size-availability-toggle').checked
                    });
                }
            });

            let colorImages = [...document.querySelectorAll('.color-image-url')]
                .map(input => input.value.trim())
                .filter(Boolean);

            if (colorUploadedImages.length > 0) {
                try {
                    for (const file of colorUploadedImages) {
                        const uploadedUrl = await uploadImage(file, colorName, 'color-images');
                        colorImages.push(uploadedUrl);
                    }
                } catch (error) {
                    showToast('Failed to upload some images. Please try again.', 'error');
                    return;
                }
            }

            if (colorImages.length === 0 && !colorImageUrl) {
                showToast('At least one image is required for this color.', 'error');
                return;
            }

            const colorVariant = {
                name: colorName,
                hex: colorImageUrl,
                sizes: sizes,
                images: colorImages
            };

            const container = document.getElementById('product-form-content');
            let colorVariants = JSON.parse(container.dataset.colorVariants || '[]');

            if (currentColorEditingIndex !== null) {
                colorVariants[currentColorEditingIndex] = colorVariant;
            } else {
                colorVariants.push(colorVariant);
            }

            container.dataset.colorVariants = JSON.stringify(colorVariants);

            const colorVariantsFieldset = Array.from(container.querySelectorAll('fieldset')).find(fieldset => 
                fieldset.querySelector('legend') && fieldset.querySelector('legend').textContent === 'Color Variants'
            );

            if (colorVariantsFieldset) {
                colorVariantsFieldset.innerHTML = `
                    <legend>Color Variants</legend>
                    ${renderColorVariantsSection(colorVariants)}
                    <button type="button" class="btn-primary btn-sm" onclick="openColorModal()" style="margin-top:1rem;">+ Add Color Variant</button>
                `;
            }

            closeColorModal();
            showToast(`Color variant ${currentColorEditingIndex !== null ? 'updated' : 'added'} successfully!`, 'success');
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        function editColorVariant(index) {
            const container = document.getElementById('product-form-content');
            const colorVariants = JSON.parse(container.dataset.colorVariants || '[]');
            if (colorVariants[index]) {
                openColorModal(colorVariants[index], index);
            }
        }

        function removeColorVariant(index) {
            if (!confirm('Are you sure you want to remove this color variant?')) return;

            const container = document.getElementById('product-form-content');
            let colorVariants = JSON.parse(container.dataset.colorVariants || '[]');
            colorVariants.splice(index, 1);

            container.dataset.colorVariants = JSON.stringify(colorVariants);

            const colorVariantsFieldset = Array.from(container.querySelectorAll('fieldset')).find(fieldset => 
                fieldset.querySelector('legend') && fieldset.querySelector('legend').textContent === 'Color Variants'
            );

            if (colorVariantsFieldset) {
                colorVariantsFieldset.innerHTML = `
                    <legend>Color Variants</legend>
                    ${renderColorVariantsSection(colorVariants)}
                    <button type="button" class="btn-primary btn-sm" onclick="openColorModal()" style="margin-top:1rem;">+ Add Color Variant</button>
                `;
            }

            showToast('Color variant removed successfully!', 'success');
        }

        async function saveProduct(productId) {
            const container = document.getElementById('product-form-content');
            const form = document.getElementById('product-form');
            
            let category = container.querySelector('#category-select').value;
            if (category === '--new--') {
                category = container.querySelector('#new-category-input').value.trim();
            }
            
            if (!category) {
                showToast('Category is required.', 'error');
                return;
            }

            let images = [...container.querySelectorAll('.image-url-input')]
                .map(input => input.value.trim())
                .filter(Boolean);

            if (generalUploadedImages.length > 0) {
                try {
                    for (const file of generalUploadedImages) {
                        const uploadedUrl = await uploadImage(file, form.name.value, 'products');
                        images.push(uploadedUrl);
                    }
                } catch (error) {
                    showToast('Failed to upload some images. Please try again.', 'error');
                    return;
                }
            }

            if (images.length === 0) {
                showToast('At least one image is required.', 'error');
                return;
            }

            const colorVariants = JSON.parse(container.dataset.colorVariants || '[]');

            const productData = {
                name: form.name.value,
                category: category,
                price: parseFloat(form.price.value),
                oldPrice: parseFloat(form.oldPrice.value) || 0,
                images: images,
                colorVariants: colorVariants,
                description: form.description.value,
                isAvailable: colorVariants.some(variant => 
                    variant.sizes && variant.sizes.some(size => size.available)
                ) || images.length > 0
            };

            if (!productId) {
                productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            }

            try {
                if (productId) {
                    await db.collection('products').doc(productId).update(productData);
                    showToast('Product updated successfully!', 'success');
                } else {
                    await db.collection('products').add(productData);
                    showToast('Product created successfully!', 'success');
                }
                setTimeout(() => window.history.back(), 1000);
            } catch(error) {
                console.error("Error saving product:", error);
                showToast("Failed to save product.", "error");
            }
        }
        
        function renderNav() {
            const navRight = document.getElementById('nav-right');
            const logoutIcon = `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" /></svg>`;
            if (currentUser && currentUser.email === ADMIN_EMAIL) {
                 navRight.innerHTML = `<button title="Category Management" class="nav-icon" onclick="window.location.href='manage-category.html'"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg></button><button title="Logout" class="nav-icon" onclick="auth.signOut()">${logoutIcon}</button>`;
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
