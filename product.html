<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form - ShopSphere Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #4F46E5; --primary-hover: #4338CA; --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444; --light-color: #F9FAFB; --dark-color: #1F2937; --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem; --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        nav { background: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--box-shadow); position: sticky; top: 0; z-index: 1000; }
        .nav-left h1 { margin: 0; font-size: 1.75rem; color: var(--primary-color); cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .nav-icon { cursor: pointer; position: relative; background: none; border: none; padding: 0.5rem; border-radius: 50%; transition: background-color 0.2s; }
        .nav-icon:hover { background-color: #e5e7eb; }
        button { border: none; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; padding: 0.75rem 1.5rem; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: var(--secondary-color); color: white; }
        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background-color: #fff; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 2rem; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: 1fr 1fr; } }
        fieldset { border: 1px solid #e5e7eb; border-radius: var(--border-radius); padding: 1.5rem; margin: 0 0 1.5rem; }
        legend { font-weight: 600; padding: 0 0.5rem; font-size: 0.9rem; color: var(--dark-color); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-group input[type="text"], .form-group input[type="number"], .form-group input[type="url"], .form-group textarea, .form-group select {
            display: block; width: 100%; padding: 0.75rem 1rem; font-size: 0.95rem; line-height: 1.5; font-family: var(--font-family); color: var(--dark-color);
            background-color: #fff; background-clip: padding-box; border: 1px solid #ced4da; border-radius: var(--border-radius);
            transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary-color); outline: 0; box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .image-list-item { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
        .image-list-item .remove-image-btn { flex-shrink: 0; background: none; box-shadow: none; padding: 0.5rem; color: var(--danger-color); border: 1px solid transparent; }
        .image-list-item .remove-image-btn:hover { background-color: var(--light-color); border-color: #d1d5db; }
        .size-item-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; border-bottom: 1px solid #f3f4f6; }
        .size-controls { display:flex; align-items:center; gap:1rem; }
        .availability-toggle { appearance: none; width: 40px; height: 22px; background-color: #ccc; border-radius: 99px; position: relative; cursor: pointer; transition: background-color 0.2s; }
        .availability-toggle::before { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background-color: white; top: 2px; left: 2px; transition: transform 0.2s; }
        .availability-toggle:checked { background-color: var(--success-color); }
        .availability-toggle:checked::before { transform: translateX(18px); }
        .modal-footer { display: flex; justify-content: flex-end; gap: 1rem; padding: 1.5rem; border-top: 1px solid #e5e7eb; background-color: var(--light-color); }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <nav>
        <div class="nav-left">
            <h1 onclick="window.location.href='index.html'">ShopSphere</h1>
        </div>
        <div id="nav-right" class="nav-right"></div>
    </nav>
    <div class="container page">
        <div id="product-form-container" class="card">
            <h1 id="form-title"></h1>
            <form id="product-form">
                <div class="form-grid">
                    <div class="form-column">
                        <fieldset>
                            <legend>Core Details</legend>
                            <div class="form-group"><label for="name">Product Name</label><input type="text" id="name" required placeholder="Product Name"></div>
                            <div class="form-group">
                                <label for="category-select">Category</label>
                                <select id="category-select"><option value="">Select a category...</option><option value="--new--">-- Create New Category --</option></select>
                                <input type="text" id="new-category-input" placeholder="Enter new category name" style="display:none; margin-top:0.5rem;">
                            </div>
                            <div class="form-group"><label for="isAvailable">Product Status</label><label style="font-weight:normal; display:flex; align-items:center; gap:0.5rem;"><input type="checkbox" id="isAvailable" style="width:20px; height:20px;"> Currently Available</label></div>
                        </fieldset>
                        <fieldset>
                            <legend>Pricing</legend>
                            <div class="form-group"><label for="price">Current Price ($)</label><input type="number" id="price" step="0.01" required placeholder="19.99"></div>
                            <div class="form-group"><label for="oldPrice">Old Price ($)</label><input type="number" id="oldPrice" step="0.01" placeholder="24.99"></div>
                        </fieldset>
                        <fieldset>
                            <legend>Images</legend>
                            <div id="image-list"></div>
                            <button type="button" class="btn-secondary" id="add-image-btn" style="padding:0.5rem 1rem; margin-top:0.5rem; width:100%; box-shadow:none;">Add Image URL</button>
                        </fieldset>
                    </div>
                    <div class="form-column">
                        <fieldset>
                            <legend>Inventory & Sizes</legend>
                            <div id="sizes-list"></div>
                        </fieldset>
                    </div>
                </div>
                <fieldset>
                    <legend>Description</legend>
                    <div class="form-group"><textarea id="description" rows="5" placeholder="Use *text* for bolding. New lines will be preserved."></textarea></div>
                </fieldset>
            </form>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-btn">Cancel</button>
                <button class="btn-primary" id="save-product-btn">Save Product</button>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCzqYrP1qYSiiLLgKW3z3EcwMpiG4hyF6M", authDomain: "e-commerce27.firebaseapp.com", projectId: "e-commerce27", storageBucket: "e-commerce27.firebasestorage.app", messagingSenderId: "1000564724466", appId: "1:1000564724466:web:55047ed3c820197733366b", };
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;
        let allProducts = [];
        let currentProductId = null;
        let defaultCategory = '';
        const SIZES = ['S', 'M', 'L', 'XL', '2XL'];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                renderNav();
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializeProductForm();
            });
        });

        function initializeProductForm() {
            const hash = window.location.hash.substring(1);
            if (hash.includes('_new_')) {
                const parts = hash.split('_new_');
                currentProductId = null;
                defaultCategory = decodeURIComponent(parts[1] || '');
                document.getElementById('form-title').textContent = 'Create New Product';
            } else {
                currentProductId = hash || null;
                document.getElementById('form-title').textContent = currentProductId ? 'Edit Product' : 'Create New Product';
            }
            
            if (!currentProductId && !defaultCategory) {
                showToast("Invalid context. Redirecting to category management.", 'error');
                setTimeout(() => window.location.href = 'manage-category.html', 2000);
                return;
            }
            
            fetchInitialDataAndRenderForm();
            document.getElementById('save-product-btn').onclick = saveProduct;
            document.getElementById('cancel-btn').onclick = goBack;
        }

        async function fetchInitialDataAndRenderForm() {
            try {
                const productSnapshot = await db.collection('products').get();
                allProducts = productSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                const categories = [...new Set(allProducts.map(p => p.category).filter(c => c))];
                
                populateCategorySelect(categories);
                setupDynamicListeners();

                if (currentProductId) {
                    const product = allProducts.find(p => p.id === currentProductId);
                    if (product) {
                        populateForm(product);
                        document.getElementById('category-select').value = product.category || '';
                    }
                } else if (defaultCategory) {
                    const categorySelect = document.getElementById('category-select');
                    categorySelect.value = defaultCategory;
                    document.getElementById('isAvailable').checked = true;
                    // Ensure the new category is visible in the select if it wasn't in the fetched list
                    if (!categorySelect.querySelector(`option[value="${defaultCategory}"]`)) {
                        const option = document.createElement('option');
                        option.value = defaultCategory;
                        option.textContent = defaultCategory;
                        categorySelect.insertBefore(option, categorySelect.querySelector('option[value="--new--"]'));
                        categorySelect.value = defaultCategory;
                    }
                }
            } catch(error) {
                showToast("Error loading initial data.", "error");
                console.error(error);
            }
        }
        
        function populateCategorySelect(categories) {
            const select = document.getElementById('category-select');
            select.innerHTML = '<option value="">Select a category...</option><option value="--new--">-- Create New Category --</option>';
            
            const sortedCategories = [...categories].sort();

            if (defaultCategory && !sortedCategories.includes(defaultCategory)) {
                 sortedCategories.unshift(defaultCategory);
            }

            sortedCategories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });

            if (defaultCategory && !select.value) {
                select.value = defaultCategory;
            }
        }

        function populateForm(product) {
            document.getElementById('name').value = product.name || '';
            document.getElementById('price').value = product.price || '';
            document.getElementById('oldPrice').value = product.oldPrice || '';
            document.getElementById('description').value = product.description || '';
            document.getElementById('isAvailable').checked = product.isAvailable === true;
            
            const imageList = document.getElementById('image-list');
            imageList.innerHTML = '';
            (product.images || ['']).forEach((url, index) => createImageInput(url, index === 0));
            
            const sizesList = document.getElementById('sizes-list');
            sizesList.innerHTML = SIZES.map(size => {
                const sizeData = product.sizes?.find(s => s.name === size);
                const isOffered = !!sizeData;
                const isAvailable = sizeData?.available ?? false;
                return `<div class="size-item-row" data-size-name="${size}">
                            <label style="display:flex;align-items:center;gap:0.75rem;cursor:pointer;"><input type="checkbox" class="size-offered-checkbox" ${isOffered ? 'checked' : ''} style="width:20px;height:20px;"><span>${size}</span></label>
                            <div class="size-controls" style="display:flex;align-items:center;gap:1rem;">
                                <label style="font-size:0.9rem;">In Stock:</label>
                                <input type="checkbox" class="availability-toggle size-availability-toggle" ${isAvailable ? 'checked' : ''} ${!isOffered ? 'disabled' : ''}>
                            </div>
                        </div>`;
            }).join('');
        }

        function createImageInput(value = '', isFirst = false) {
            const imageList = document.getElementById('image-list');
            const div = document.createElement('div');
            div.className = 'image-list-item';
            const removeButtonHtml = isFirst ? '' : `<button type="button" class="remove-image-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>`;
            div.innerHTML = `<div class="form-group" style="flex-grow:1; margin:0;"><input type="url" class="image-url-input" value="${value}" placeholder="${isFirst ? 'Main Image URL' : 'Additional Image URL'}" ${isFirst ? 'required' : ''}></div>${removeButtonHtml}`;
            if(!isFirst) { div.querySelector('.remove-image-btn').onclick = () => div.remove(); }
            imageList.appendChild(div);
        }

        function setupDynamicListeners() {
            const categorySelect = document.getElementById('category-select');
            const newCategoryInput = document.getElementById('new-category-input');
            categorySelect.addEventListener('change', () => {
                newCategoryInput.style.display = categorySelect.value === '--new--' ? 'block' : 'none';
                if (categorySelect.value !== '--new--') newCategoryInput.value = '';
                newCategoryInput.required = categorySelect.value === '--new--';
            });
            document.getElementById('add-image-btn').onclick = () => createImageInput();
            document.querySelectorAll('.size-offered-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const toggle = e.target.closest('.size-item-row').querySelector('.size-availability-toggle');
                    toggle.disabled = !e.target.checked;
                    if (!e.target.checked) toggle.checked = false;
                });
            });
            if(categorySelect.value === '--new--') newCategoryInput.style.display = 'block';
        }

        function saveProduct() {
            const form = document.getElementById('product-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            const categorySelect = document.getElementById('category-select');
            const newCategoryInput = document.getElementById('new-category-input');
            let category = categorySelect.value;
            if (category === '--new--') category = newCategoryInput.value.trim();
            if (!category) { showToast('Category is required.', 'error'); return; }
            
            const images = [...document.querySelectorAll('.image-url-input')].map(input => input.value.trim()).filter(Boolean);
            if (images.length === 0) { showToast('At least one image URL is required.', 'error'); return; }
            
            const sizes = [];
            document.querySelectorAll('.size-item-row').forEach(row => {
                if (row.querySelector('.size-offered-checkbox').checked) {
                    sizes.push({ name: row.dataset.sizeName, available: row.querySelector('.size-availability-toggle').checked });
                }
            });

            const productData = {
                name: document.getElementById('name').value,
                category: category,
                price: parseFloat(document.getElementById('price').value),
                oldPrice: parseFloat(document.getElementById('oldPrice').value) || 0,
                description: document.getElementById('description').value,
                images: images,
                sizes: sizes,
                isAvailable: document.getElementById('isAvailable').checked,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            document.getElementById('save-product-btn').disabled = true;
            document.getElementById('save-product-btn').textContent = currentProductId ? 'Updating...' : 'Creating...';

            try {
                if (currentProductId) {
                    db.collection('products').doc(currentProductId).update(productData);
                    showToast('Product updated successfully!', 'success');
                } else {
                    productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('products').add(productData);
                    showToast('Product created successfully!', 'success');
                }
                goBack();
            } catch(error) {
                showToast("Error saving product", "error");
                console.error(error);
                document.getElementById('save-product-btn').disabled = false;
                document.getElementById('save-product-btn').textContent = 'Save Product';
            }
        }

        function goBack() {
            if (defaultCategory) {
                window.location.href = `manage-products.html#${encodeURIComponent(defaultCategory)}`;
            } else {
                history.back();
            }
        }

        function renderNav() {
            const navRight = document.getElementById('nav-right');
            const logoutIcon = `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" /></svg>`;
            if (currentUser && currentUser.email === ADMIN_EMAIL) {
                 navRight.innerHTML = `<button title="Admin Dashboard" class="nav-icon" onclick="window.location.href='admin-dashboard.html'"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h12A2.25 2.25 0 0020.25 14.25V3m-15.75 0h15.75M3.75 3v1.5M20.25 3v1.5M3.75 6.75h15.75M3.75 9.75h15.75M3.75 12.75h15.75M3.75 15.75h15.75" /></svg></button><button title="Logout" class="nav-icon" onclick="auth.signOut()">${logoutIcon}</button>`;
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
