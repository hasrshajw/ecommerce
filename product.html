<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Editor - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA; --primary-light: #eef2ff;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        
        .promo-banner { background: var(--danger-color); color: var(--white); padding: 0.5rem; position: fixed; top: 0; left: 0; width: 100%; z-index: 1100; overflow: hidden; }
        .promo-text { display: inline-block; white-space: nowrap; animation: scroll-text 15s linear infinite; font-size: 0.875rem; font-weight: 500; }
        @keyframes scroll-text { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        nav { background: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--box-shadow); position: sticky; top: 32px; z-index: 1000; }
        .nav-left h1 { margin: 0; font-size: 1.75rem; color: var(--primary-color); cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .nav-icon { cursor: pointer; position: relative; background: none; border: none; padding: 0.5rem; border-radius: 50%; transition: background-color 0.2s; }
        .nav-icon:hover { background-color: #e5e7eb; }
        #cart-count { position: absolute; top: 0; right: 0; background-color: #EF4444; color: white; border-radius: 50%; padding: 1px 5px; font-size: 0.7rem; font-weight: bold; }
        
        button { border: none; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; padding: 0.75rem 1.5rem; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: var(--secondary-color); color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }

        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background-color: #fff; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 2rem; }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: 1fr 1fr; } }

        fieldset { border: 1px solid #e5e7eb; border-radius: var(--border-radius); padding: 1.5rem; margin: 0 0 1.5rem; }
        legend { font-weight: 600; padding: 0 0.5rem; font-size: 0.9rem; color: var(--dark-color); }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group:last-child { margin-bottom: 0; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        
        .form-group input[type="text"], .form-group input[type="number"], .form-group input[type="url"], .form-group textarea, .form-group select {
            display: block; width: 100%; padding: 0.75rem 1rem; font-size: 0.95rem; line-height: 1.5; font-family: var(--font-family); color: var(--dark-color);
            background-color: #fff; background-clip: padding-box; border: 1px solid #ced4da; border-radius: var(--border-radius);
            transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary-color); outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }
        .form-group textarea { resize: vertical; min-height: 120px; }
        
        .image-list-item { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
        .image-list-item .remove-image-btn { flex-shrink: 0; background: none; box-shadow: none; padding: 0.5rem; color: var(--danger-color); border: 1px solid transparent; }
        .image-list-item .remove-image-btn:hover { background-color: var(--light-color); border-color: #d1d5db; }
        
        .size-item-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; border-bottom: 1px solid #f3f4f6; }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 1rem; padding: 1.5rem; border-top: 1px solid #e5e7eb; background-color: var(--light-color); }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="admin-modal" class="modal"></div>
    <div class="promo-banner">
        <div class="promo-text" id="promo-text">
            Admin Panel: Product Editor
        </div>
    </div>

    <nav>
        <div class="nav-container">
            <div class="desktop-nav">
                <div class="nav-left" onclick="window.location.href='index.html'">
                    <h1>ShopSphere</h1>
                </div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="index.html#category-section">Categories</a>
                    <a href="/deals">Deals</a>
                </div>
                <div class="nav-search" id="desktopSearch">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                    <input type="text" placeholder="Search products...">
                </div>
                <div class="nav-icons">
                    <button class="nav-icon" id="desktopSearchBtn" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </svg>
                    </button>
                    <button class="nav-icon" onclick="window.location.href='/wishlist'" aria-label="Wishlist">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                    <button class="nav-icon" id="desktopCartBtn" aria-label="Shopping cart">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span id="cart-count">0</span>
                    </button>
                </div>
            </div>
            <div class="mobile-nav">
                <div class="mobile-nav-left">
                    <button class="hamburger" id="mobileMenuBtn" aria-label="Menu">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
                <div class="mobile-nav-center">
                    <div class="mobile-logo" onclick="window.location.href='index.html'">
                        <img src="http://photography.wixo.in/yellow.png" alt="Shop Logo">
                    </div>
                </div>
                <div class="mobile-nav-right">
                    <button class="nav-icon" id="mobileSearchBtn" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </svg>
                    </button>
                    <button class="nav-icon" onclick="window.location.href='/wishlist'" aria-label="Wishlist">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                    <button class="nav-icon" id="mobileCartBtn" aria-label="Shopping cart">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span id="cart-count">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    <div id="mobile-overlay-placeholder"></div>

    <div class="container page">
        <div id="product-editor-container" class="card">
            <h1 id="editor-mode-header">Loading Product...</h1>
            <div style="margin-bottom: 1.5rem;">
                <button class="btn-secondary" onclick="goBack()">← Back to List</button>
            </div>
            <form id="product-form">
                <div class="form-grid">
                    <div class="form-column">
                        <fieldset>
                            <legend>Core Details</legend>
                            <div class="form-group"><label for="name">Product Name</label><input type="text" id="name" required></div>
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category-select"><option value="">Select a category...</option></select>
                                <input type="text" id="new-category-input" placeholder="Enter new category name" style="display:none; margin-top:0.5rem;">
                            </div>
                        </fieldset>
                        <fieldset>
                            <legend>Pricing & Status</legend>
                            <div class="form-group"><label for="price">Current Price ($)</label><input type="number" id="price" step="0.01" required placeholder="19.99"></div>
                            <div class="form-group"><label for="oldPrice">Old Price ($)</label><input type="number" id="oldPrice" step="0.01" placeholder="24.99"></div>
                            <div class="form-group"><label for="rating">Average Rating (0-5)</label><input type="number" id="rating" step="0.1" min="0" max="5" value="4.5"></div>
                            <div class="form-group"><label for="ratingCount">Total Ratings Count</label><input type="number" id="ratingCount" value="100"></div>
                            <div class="form-group"><label for="isAvailable">Product Available for Sale</label><input type="checkbox" id="isAvailable" style="width:20px; height:20px; margin-top:0.5rem;"></div>
                            <div class="form-group"><label for="isBestSeller">Mark as Best Seller</label><input type="checkbox" id="isBestSeller" style="width:20px; height:20px; margin-top:0.5rem;"></div>
                        </fieldset>
                        <fieldset>
                            <legend>Images (URLs)</legend>
                            <div id="image-list"></div>
                            <button type="button" class="btn-secondary" id="add-image-btn" style="padding:0.5rem 1rem; margin-top:0.5rem; width:100%; box-shadow:none;">Add Image URL</button>
                        </fieldset>
                    </div>
                    <div class="form-column">
                        <fieldset>
                            <legend>Inventory & Sizes</legend>
                            <div id="sizes-list"></div>
                        </fieldset>
                        <fieldset>
                            <legend>Color Variants (Optional)</legend>
                            <div id="color-variant-list"></div>
                            <button type="button" class="btn-secondary" id="add-color-btn" style="padding:0.5rem 1rem; margin-top:0.5rem; width:100%; box-shadow:none;">Add Color Variant</button>
                        </fieldset>
                    </div>
                </div>
                <fieldset>
                    <legend>Description</legend>
                    <div class="form-group"><textarea id="description" rows="5" placeholder="Use *text* for bolding. New lines will be preserved."></textarea></div>
                </fieldset>
            </form>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="goBack()">Cancel</button>
                <button class="btn-primary" id="save-product-btn">Save Product</button>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzqYrP1qYSiiLLgKW3z3EcwMpiG4hyF6M",
            authDomain: "e-commerce27.firebaseapp.com",
            projectId: "e-commerce27",
            storageBucket: "e-commerce27.firebasestorage.app",
            messagingSenderId: "1000564724466",
            appId: "1:1000564724466:web:55047ed3c820197733366b",
        };
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allCategories = [];
        let cart = [];
        let isEditMode = false;
        let productIdToEdit = null;
        let categoryForNewProduct = null;
        const SIZES = ['S', 'M', 'L', 'XL', '2XL', '3XL'];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                loadCartFromLocalStorage();
                renderNav();
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializeProductEditor();
            });
        });

        function initializeProductEditor() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            productIdToEdit = params.get('id');
            categoryForNewProduct = params.get('category');

            if (mode === 'edit' && productIdToEdit) {
                isEditMode = true;
                document.getElementById('editor-mode-header').textContent = "Edit Product";
                document.getElementById('save-product-btn').textContent = "Update Product";
                loadProductData(productIdToEdit);
            } else if (mode === 'create' && categoryForNewProduct) {
                isEditMode = false;
                document.getElementById('editor-mode-header').textContent = `Create New Product in Category: ${categoryForNewProduct}`;
                document.getElementById('save-product-btn').textContent = "Create Product";
                loadCategoryData();
                setupEventListeners();
                setupDefaultFormValues();
            } else {
                showToast("Invalid page access. Redirecting...", "error");
                setTimeout(goBack, 1500);
                return;
            }
            setupEventListeners();
        }
        
        function setupEventListeners() {
            document.getElementById('save-product-btn').onclick = handleSaveProduct;
            document.getElementById('add-image-btn').onclick = () => createImageInput();
            document.getElementById('add-color-btn').onclick = () => addColorVariantRow();
        }
        
        function setupDefaultFormValues() {
            document.getElementById('isAvailable').checked = true;
            document.getElementById('isBestSeller').checked = false;
            document.getElementById('rating').value = 4.5;
            document.getElementById('ratingCount').value = 100;
            
            document.getElementById('category-select').value = categoryForNewProduct || '';
            document.getElementById('category-select').disabled = !!categoryForNewProduct;
            if(categoryForNewProduct) {
                document.getElementById('category-select').innerHTML = `<option value="${categoryForNewProduct}" selected>${categoryForNewProduct}</option>`;
            }
        }

        async function loadCategoryData() {
            const categorySnapshot = await db.collection('categories').get();
            const categories = categorySnapshot.docs.map(doc => doc.data().name).filter(Boolean);
            const categorySelect = document.getElementById('category-select');
            categorySelect.innerHTML = `<option value="">Select a category...</option>` + categories.map(cat => `<option value="${cat}" ${cat === categoryForNewProduct ? 'selected' : ''}>${cat}</option>`).join('') + `<option value="--new--">-- Create New Category --</option>`;
        }
        
        function setupCategorySelectListener() {
            const categorySelect = document.getElementById('category-select');
            const newCategoryInput = document.getElementById('new-category-input');
            categorySelect.addEventListener('change', () => { 
                newCategoryInput.style.display = categorySelect.value === '--new--' ? 'block' : 'none'; 
            });
            if (categorySelect.value === '--new--') newCategoryInput.style.display = 'block';
        }

        async function loadProductData(productId) {
            const doc = await db.collection('products').doc(productId).get();
            if (!doc.exists) { showToast("Product not found.", "error"); goBack(); return; }
            const product = doc.data();
            
            await loadCategoryData();
            setupCategorySelectListener();
            
            document.getElementById('name').value = product.name || '';
            document.getElementById('category-select').value = product.category || '';
            document.getElementById('price').value = product.price || '';
            document.getElementById('oldPrice').value = product.oldPrice || '';
            document.getElementById('rating').value = product.rating || 4.5;
            document.getElementById('ratingCount').value = product.ratingCount || 100;
            document.getElementById('isAvailable').checked = product.isAvailable === undefined ? true : product.isAvailable;
            document.getElementById('isBestSeller').checked = product.isBestSeller || false;
            document.getElementById('description').value = product.description || '';

            renderImages(product.images || []);
            renderSizes(product.sizes || []);
            renderColorVariants(product.colors || {});
        }
        
        function renderImages(images) {
            const imageListContainer = document.getElementById('image-list');
            imageListContainer.innerHTML = '';
            
            const createImageInput = (value = '', isFirst = false) => {
                const div = document.createElement('div');
                div.className = 'image-list-item';
                const removeButtonHtml = isFirst ? '' : `<button type="button" class="remove-image-btn" onclick="this.parentElement.remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>`;
                div.innerHTML = `<div class="form-group" style="flex-grow:1; margin:0;"><input type="url" class="image-url-input" value="${value}" placeholder="${isFirst ? 'Main Image URL' : 'Additional Image URL'}" required></div>${removeButtonHtml}`;
                imageListContainer.appendChild(div);
            };
            
            if(images.length === 0) {
                createImageInput('', true);
            } else {
                images.forEach((url, index) => createImageInput(url, index === 0));
            }
        }
        
        function renderSizes(sizesData) {
            const sizesListContainer = document.getElementById('sizes-list');
            sizesListContainer.innerHTML = '';
            
            SIZES.forEach(sizeName => {
                const sizeData = sizesData.find(s => s.name === sizeName);
                const isOffered = !!sizeData;
                const isAvailable = sizeData ? sizeData.available : false;
                
                const div = document.createElement('div');
                div.className = 'size-item-row';
                div.dataset.sizeName = sizeName;
                div.innerHTML = `
                    <label style="display:flex;align-items:center;gap:0.75rem;cursor:pointer;">
                        <input type="checkbox" class="size-offered-checkbox" ${isOffered ? 'checked' : ''} style="width:20px;height:20px;">
                        <span>${sizeName}</span>
                    </label>
                    <div style="display:flex;align-items:center;gap:1rem;">
                        <label style="font-size:0.9rem;">In Stock:</label>
                        <input type="checkbox" class="availability-toggle size-availability-toggle" ${isAvailable ? 'checked' : ''} ${!isOffered ? 'disabled' : ''}>
                    </div>
                `;
                sizesListContainer.appendChild(div);
            });
            
            document.querySelectorAll('.size-offered-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const toggle = e.target.closest('.size-item-row').querySelector('.size-availability-toggle');
                    toggle.disabled = !e.target.checked;
                    if (!e.target.checked) toggle.checked = false;
                });
            });
        }

        function renderColorVariants(colorsData) {
            const colorListContainer = document.getElementById('color-variant-list');
            colorListContainer.innerHTML = '';
            
            const colorNames = Object.keys(colorsData).length > 0 ? Object.keys(colorsData) : ['NewColor'];

            colorNames.forEach((colorName, index) => {
                const data = colorsData[colorName] || {};
                const div = document.createElement('div');
                div.className = 'color-variant-row';
                div.dataset.colorName = colorName;
                div.innerHTML = `
                    <div class="form-group" style="flex:1; margin-right:1rem;">
                        <label>Color Name</label>
                        <input type="text" class="color-name-input" value="${colorName}" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Preview Image URL</label>
                        <input type="url" class="color-preview-input" value="${data.previewImage || ''}" placeholder="Preview Image URL">
                    </div>
                    <button type="button" class="btn-danger" style="padding:0.5rem; margin-top:1.5rem; box-shadow:none;" onclick="this.parentElement.remove()">X</button>
                `;
                colorListContainer.appendChild(div);
            });
            
            addColorVariantRow(); // Ensure at least one empty row if no data exists
        }
        
        function addColorVariantRow() {
            const colorListContainer = document.getElementById('color-variant-list');
            const div = document.createElement('div');
            div.className = 'color-variant-row';
            div.innerHTML = `
                <div class="form-group" style="flex:1; margin-right:1rem;">
                    <label>Color Name</label>
                    <input type="text" class="color-name-input" value="" placeholder="e.g., Red" required>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Preview Image URL</label>
                    <input type="url" class="color-preview-input" value="" placeholder="Preview Image URL">
                </div>
                <button type="button" class="btn-danger" style="padding:0.5rem; margin-top:1.5rem; box-shadow:none;" onclick="this.parentElement.remove()">X</button>
            `;
            colorListContainer.appendChild(div);
        }

        async function handleSaveProduct(e) {
            e.preventDefault();
            
            const categorySelect = document.getElementById('category-select');
            const newCategoryInput = document.getElementById('new-category-input');
            let category = categorySelect.value;
            if (category === '--new--') category = newCategoryInput.value.trim();
            if (!category) { showToast('Category is required.', 'error'); return; }

            const images = [...document.querySelectorAll('#image-list .image-url-input')].map(input => input.value.trim()).filter(Boolean);
            if (images.length === 0) { showToast('At least one image URL is required.', 'error'); return; }
            
            const sizes = [];
            document.querySelectorAll('#sizes-list .size-item-row').forEach(row => {
                if (row.querySelector('.size-offered-checkbox').checked) {
                    sizes.push({ name: row.dataset.sizeName, available: row.querySelector('.size-availability-toggle').checked });
                }
            });
            
            const colors = {};
            document.querySelectorAll('#color-variant-list .color-variant-row').forEach(row => {
                const nameInput = row.querySelector('.color-name-input');
                const previewInput = row.querySelector('.color-preview-input');
                if (nameInput.value.trim()) {
                    colors[nameInput.value.trim()] = { previewImage: previewInput.value.trim() };
                }
            });

            const data = {
                name: document.getElementById('name').value, 
                category, 
                price: parseFloat(document.getElementById('price').value), 
                oldPrice: parseFloat(document.getElementById('oldPrice').value) || 0,
                images, 
                sizes, 
                colors,
                description: document.getElementById('description').value, 
                isAvailable: document.getElementById('isAvailable').checked, 
                isBestSeller: document.getElementById('isBestSeller').checked,
                rating: parseFloat(document.getElementById('rating').value),
                ratingCount: parseInt(document.getElementById('ratingCount').value)
            };
            
            try {
                if (isEditMode && productIdToEdit) {
                    await db.collection('products').doc(productIdToEdit).update(data);
                    showToast(`Product updated successfully!`, 'success');
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('products').add(data);
                    showToast(`Product created successfully!`, 'success');
                }
                setTimeout(goBack, 1000);
            } catch(error) { 
                showToast("Error saving product", "error"); 
                console.error(error); 
            }
        }

        function goBack() {
            const prevPage = categoryForNewProduct ? `manage-products.html?category=${categoryForNewProduct}` : 'admin-products.html';
            window.location.href = prevPage;
        }

        function renderNav() {
            const navRight = document.getElementById('nav-right');
            const logoutIcon = `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" /></svg>`;
            if (currentUser && currentUser.email === ADMIN_EMAIL) {
                 navRight.innerHTML = `<button title="Admin Dashboard" class="nav-icon" onclick="window.location.href='admin-dashboard.html'"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h12A2.25 2.25 0 0020.25 14.25V3m-15.75 0h15.75M3.75 3v1.5M20.25 3v1.5M3.75 6.75h15.75M3.75 9.75h15.75M3.75 12.75h15.75M3.75 15.75h15.75" /></svg></button><button title="Logout" class="nav-icon" onclick="auth.signOut()">${logoutIcon}</button>`;
            }
        }
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        const loadCartFromLocalStorage = () => cart = JSON.parse(localStorage.getItem('shopSphereCart') || '[]');
        const updateCartCount = () => {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const el = document.getElementById('cart-count');
            if(el) { el.textContent = count; el.style.display = count > 0 ? 'block' : 'none'; }
        };
    </script>
</body>
</html>
