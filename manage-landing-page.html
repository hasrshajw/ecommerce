<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Landing Page - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA; --primary-light: #eef2ff;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --warning-color: #F59E0B; --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06);
            --box-shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--dark-color); line-height: 1.5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        
        /* Navigation (Same as before) */
        nav { 
            background: #fff; padding: 1rem 1.5rem; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: var(--box-shadow); position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid #e5e7eb;
        }
        .nav-left h1 { 
            margin: 0; font-size: 1.75rem; font-weight: 700; 
            color: var(--primary-color); cursor: pointer; 
        }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }
        .nav-icon { 
            cursor: pointer; background: none; border: none; padding: 0.5rem; 
            border-radius: 50%; transition: all 0.2s ease-in-out; color: var(--secondary-color);
        }
        .nav-icon:hover { background-color: #f3f4f6; color: var(--dark-color); }
        
        /* Buttons */
        button { 
            border: none; border-radius: var(--border-radius); cursor: pointer; 
            font-family: var(--font-family); font-weight: 600; 
            transition: all 0.2s ease-in-out; display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-primary { background-color: var(--primary-color); color: white; padding: 0.75rem 1.5rem; font-size: 0.875rem; }
        .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-secondary { background-color: white; color: var(--secondary-color); border: 1px solid #d1d5db; padding: 0.5rem 1rem; font-size: 0.75rem; }
        .btn-secondary:hover { background-color: #f9fafb; border-color: var(--secondary-color); }
        .btn-icon { padding: 0.4rem; background: transparent; color: var(--secondary-color); }
        .btn-icon:hover { background: var(--bg-color); color: var(--primary-color); }
        
        /* Page Layout */
        .page { animation: fadeIn 0.5s; padding-bottom: 4rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { 
            background-color: #fff; border-radius: var(--border-radius); 
            box-shadow: var(--box-shadow); border: 1px solid #e5e7eb;
            margin-bottom: 1.5rem; overflow: hidden;
        }
        .card-header { 
            padding: 1.25rem 1.5rem; border-bottom: 1px solid #e5e7eb; background: #fff;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-title { font-size: 1.1rem; font-weight: 700; color: var(--dark-color); display: flex; align-items: center; gap: 0.5rem; }
        .card-body { padding: 1.5rem; }
        
        /* Grid Layout for settings */
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        
        /* Form Elements */
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--secondary-color); }
        .form-control { 
            display: block; width: 100%; padding: 0.6rem 0.8rem; 
            font-size: 0.9rem; background-color: #fff; 
            border: 1px solid #d1d5db; border-radius: var(--border-radius);
            transition: all 0.2s;
        }
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); outline: none; }
        
        /* Color Picker Group */
        .color-group { display: flex; align-items: center; gap: 0.75rem; border: 1px solid #e5e7eb; padding: 0.5rem; border-radius: var(--border-radius); }
        .color-input { width: 40px; height: 40px; padding: 0; border: none; border-radius: 4px; cursor: pointer; background: none; }
        .color-text { flex: 1; border: none; outline: none; font-family: monospace; color: var(--dark-color); text-transform: uppercase; }

        /* List Items (Nav & Sections) */
        .list-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0.75rem; background: var(--bg-color); border: 1px solid #e5e7eb;
            border-radius: var(--border-radius); margin-bottom: 0.5rem; transition: transform 0.2s;
        }
        .list-item:hover { border-color: var(--primary-color); }
        .item-drag-handle { color: #9ca3af; cursor: grab; padding-right: 0.5rem; }
        .item-content { flex: 1; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; }
        .item-actions { display: flex; gap: 0.25rem; }

        /* Toggle Switch */
        .toggle-wrapper { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .toggle-switch { 
            appearance: none; width: 40px; height: 22px; background: #d1d5db; 
            border-radius: 20px; position: relative; transition: 0.3s; cursor: pointer;
        }
        .toggle-switch::after { 
            content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; 
            background: white; border-radius: 50%; transition: 0.3s; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .toggle-switch:checked { background: var(--success-color); }
        .toggle-switch:checked::after { transform: translateX(18px); }

        /* Category Checklist */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
        .check-card { 
            position: relative; border: 1px solid #e5e7eb; border-radius: var(--border-radius); 
            overflow: hidden; cursor: pointer; transition: 0.2s;
        }
        .check-card:hover { border-color: var(--primary-color); }
        .check-card input { position: absolute; opacity: 0; }
        .check-card-content { padding: 0.75rem; text-align: center; background: #fff; }
        .check-card input:checked + .check-card-content { background: var(--primary-light); color: var(--primary-color); font-weight: 600; }
        
        /* Modal */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.5); display: none; align-items: center; 
            justify-content: center; z-index: 2000; backdrop-filter: blur(2px);
        }
        .modal { 
            background: white; border-radius: var(--border-radius); 
            width: 90%; max-width: 500px; box-shadow: var(--box-shadow-lg); 
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { padding: 1.25rem; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1.25rem; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 0.5rem; }

        /* Toast */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { 
            padding: 1rem 1.5rem; border-radius: var(--border-radius); 
            color: white; box-shadow: var(--box-shadow-lg); margin-top: 0.5rem;
            animation: slideIn 0.3s;
        }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
        
        @media (max-width: 768px) {
            .settings-grid { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <nav>
        <div class="nav-left"><h1 onclick="window.location.href='index.html'">ShopSphere</h1></div>
        <div id="nav-right" class="nav-right"></div>
    </nav>

    <div class="container page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.8rem; font-weight: 700;">Store Customization</h1>
            <button class="btn-primary" onclick="saveAllSettings()" id="global-save-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save Changes
            </button>
        </div>

        <div class="settings-grid">
            
            <!-- 1. Branding Configuration -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
                        Branding & Logo
                    </div>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Site Title (Text)</label>
                        <input type="text" class="form-control" id="site-title" placeholder="e.g. Vastramaya">
                    </div>
                    <div class="form-group">
                        <label>Desktop Logo URL</label>
                        <input type="url" class="form-control" id="logo-desktop" placeholder="https://...">
                        <button class="btn-secondary" style="width:100%; margin-top:0.5rem;" onclick="triggerUpload('logo-desktop')">Upload Image</button>
                        <input type="file" id="file-logo-desktop" hidden onchange="handleUpload(this, 'logo-desktop')">
                    </div>
                    <div class="form-group">
                        <label>Mobile Logo URL</label>
                        <input type="url" class="form-control" id="logo-mobile" placeholder="https://...">
                        <button class="btn-secondary" style="width:100%; margin-top:0.5rem;" onclick="triggerUpload('logo-mobile')">Upload Image</button>
                        <input type="file" id="file-logo-mobile" hidden onchange="handleUpload(this, 'logo-mobile')">
                    </div>
                </div>
            </div>

            <!-- 2. Theme & Colors -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                        Color Theme
                    </div>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Navbar Background</label>
                        <div class="color-group">
                            <input type="color" class="color-input" id="col-nav-bg" oninput="syncColor(this)">
                            <input type="text" class="color-text" id="val-nav-bg" oninput="syncColorInput(this)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Promo Banner Background</label>
                        <div class="color-group">
                            <input type="color" class="color-input" id="col-promo-bg" oninput="syncColor(this)">
                            <input type="text" class="color-text" id="val-promo-bg" oninput="syncColorInput(this)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Promo Banner Text</label>
                        <div class="color-group">
                            <input type="color" class="color-input" id="col-promo-text" oninput="syncColor(this)">
                            <input type="text" class="color-text" id="val-promo-text" oninput="syncColorInput(this)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Primary Brand Color</label>
                        <div class="color-group">
                            <input type="color" class="color-input" id="col-primary" oninput="syncColor(this)">
                            <input type="text" class="color-text" id="val-primary" oninput="syncColorInput(this)">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. Navigation Menu -->
            <div class="card" style="grid-row: span 2;">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                        Navigation Menu
                    </div>
                    <button class="btn-secondary" onclick="openLinkModal()">+ Add</button>
                </div>
                <div class="card-body">
                    <div id="nav-list-container">
                        <!-- Nav items injected here -->
                    </div>
                    <p style="font-size: 0.8rem; color: var(--secondary-color); margin-top: 1rem;">Drag items to reorder (Coming soon). Use arrow buttons for now.</p>
                </div>
            </div>

            <!-- 4. Homepage Sections -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                        Homepage Sections
                    </div>
                </div>
                <div class="card-body">
                    <div id="sections-list">
                        <!-- Sections injected here -->
                    </div>
                </div>
            </div>

            <!-- 5. Curated Categories -->
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.2 7.8l-7.7 7.7-4-4-5.7 5.7"/><path d="M15 7h6v6"/></svg>
                        Featured Category Rows
                    </div>
                </div>
                <div class="card-body">
                    <p style="margin-bottom: 1rem; color: var(--secondary-color);">Select categories to display as horizontal product rows on the homepage.</p>
                    <div class="category-grid" id="featured-cats-container">
                        <div class="loading">Loading categories...</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Navigation Link Modal -->
    <div class="modal-overlay" id="link-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Manage Link</h3>
                <button class="close-modal" onclick="closeLinkModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="link-index">
                <div class="form-group">
                    <label>Label Name</label>
                    <input type="text" class="form-control" id="link-label" placeholder="e.g. New Arrivals">
                </div>
                <div class="form-group">
                    <label>Destination URL</label>
                    <input type="text" class="form-control" id="link-url" placeholder="/category/new or https://...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeLinkModal()">Cancel</button>
                <button class="btn-primary" onclick="saveLink()">Save Link</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdeonH3VytC21F3X6x0rCVCn2xXrGPoug",
            authDomain: "vastramaya---magic.firebaseapp.com",
            projectId: "vastramaya---magic",
            storageBucket: "vastramaya---magic.firebasestorage.app",
            messagingSenderId: "543460072082",
            appId: "1:543460072082:web:f3d1140e8f81ad338ae44b",
            measurementId: "G-E39VNDCFVE"
        };
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let appSettings = {
            branding: { title: 'ShopSphere', logoDesktop: '', logoMobile: '' },
            theme: { navBg: '#ffffff', promoBg: '#dc2626', promoText: '#ffffff', primary: '#4F46E5' },
            navigation: [],
            sections: [
                {id: 'hero', label: 'Hero Carousel', visible: true},
                {id: 'categories', label: 'Category Circles', visible: true},
                {id: 'best_sellers', label: 'Best Sellers Grid', visible: true},
                {id: 'featured_rows', label: 'Category Rows', visible: true}
            ],
            featuredCategories: [] // Array of Category IDs
        };

        let allCategoriesList = [];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                if (!user || user.email !== ADMIN_EMAIL) {
                    window.location.href = 'index.html';
                    return;
                }
                renderNav(user);
                initData();
            });
        });

        async function initData() {
            await Promise.all([loadCategories(), loadSettings()]);
            renderUI();
        }

        async function loadCategories() {
            try {
                const snap = await db.collection('categories').orderBy('name').get();
                allCategoriesList = snap.docs.map(d => ({id: d.id, name: d.data().name}));
            } catch (e) { console.error(e); }
        }

        async function loadSettings() {
            try {
                const doc = await db.collection('landingPage').doc('settings').get();
                if (doc.exists) {
                    const data = doc.data();
                    // Merge with defaults to avoid undefined errors
                    appSettings = { ...appSettings, ...data };
                    // Ensure sections order exists if new sections added later
                    if(!data.sections || data.sections.length === 0) {
                        appSettings.sections = [
                            {id: 'hero', label: 'Hero Carousel', visible: true},
                            {id: 'categories', label: 'Category Circles', visible: true},
                            {id: 'best_sellers', label: 'Best Sellers Grid', visible: true},
                            {id: 'featured_rows', label: 'Category Rows', visible: true}
                        ];
                    }
                }
            } catch (e) { console.error(e); }
        }

        function renderUI() {
            // Branding
            document.getElementById('site-title').value = appSettings.branding.title || '';
            document.getElementById('logo-desktop').value = appSettings.branding.logoDesktop || '';
            document.getElementById('logo-mobile').value = appSettings.branding.logoMobile || '';

            // Theme
            setColVal('nav-bg', appSettings.theme.navBg);
            setColVal('promo-bg', appSettings.theme.promoBg);
            setColVal('promo-text', appSettings.theme.promoText);
            setColVal('primary', appSettings.theme.primary);

            // Navigation
            renderNavList();

            // Sections
            renderSectionsList();

            // Featured Categories
            renderFeaturedCategories();
        }

        // --- Helper: Color Sync ---
        function setColVal(id, val) {
            document.getElementById(`col-${id}`).value = val || '#000000';
            document.getElementById(`val-${id}`).value = val || '#000000';
        }
        function syncColor(input) {
            const id = input.id.replace('col-', '');
            document.getElementById(`val-${id}`).value = input.value;
        }
        function syncColorInput(input) {
            const id = input.id.replace('val-', '');
            document.getElementById(`col-${id}`).value = input.value;
        }

        // --- Navigation Management ---
        function renderNavList() {
            const container = document.getElementById('nav-list-container');
            container.innerHTML = appSettings.navigation.map((link, i) => `
                <div class="list-item">
                    <div class="item-content">
                        <span style="font-weight:600">${link.label}</span>
                        <span style="color:var(--secondary-color); font-size:0.85rem;">${link.url}</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon" onclick="moveLink(${i}, -1)">↑</button>
                        <button class="btn-icon" onclick="moveLink(${i}, 1)">↓</button>
                        <button class="btn-icon" onclick="editLink(${i})">✎</button>
                        <button class="btn-icon" style="color:var(--danger-color)" onclick="deleteLink(${i})">×</button>
                    </div>
                </div>
            `).join('') || '<p style="color:#999; text-align:center;">No links added</p>';
        }

        function openLinkModal() {
            document.getElementById('link-index').value = '-1'; // New
            document.getElementById('link-label').value = '';
            document.getElementById('link-url').value = '';
            document.getElementById('link-modal').style.display = 'flex';
        }
        function editLink(i) {
            const link = appSettings.navigation[i];
            document.getElementById('link-index').value = i;
            document.getElementById('link-label').value = link.label;
            document.getElementById('link-url').value = link.url;
            document.getElementById('link-modal').style.display = 'flex';
        }
        function closeLinkModal() { document.getElementById('link-modal').style.display = 'none'; }
        
        function saveLink() {
            const idx = parseInt(document.getElementById('link-index').value);
            const label = document.getElementById('link-label').value.trim();
            const url = document.getElementById('link-url').value.trim();
            if(!label || !url) return alert("Fill all fields");

            if(idx === -1) {
                appSettings.navigation.push({label, url});
            } else {
                appSettings.navigation[idx] = {label, url};
            }
            renderNavList();
            closeLinkModal();
        }
        function deleteLink(i) {
            if(confirm("Delete this link?")) {
                appSettings.navigation.splice(i, 1);
                renderNavList();
            }
        }
        function moveLink(i, dir) {
            if(i + dir < 0 || i + dir >= appSettings.navigation.length) return;
            const temp = appSettings.navigation[i];
            appSettings.navigation[i] = appSettings.navigation[i+dir];
            appSettings.navigation[i+dir] = temp;
            renderNavList();
        }

        // --- Section Management ---
        function renderSectionsList() {
            const container = document.getElementById('sections-list');
            container.innerHTML = appSettings.sections.map((sec, i) => `
                <div class="list-item">
                    <div class="item-content">
                        <span class="toggle-wrapper">
                            <input type="checkbox" class="toggle-switch" 
                                ${sec.visible ? 'checked' : ''} 
                                onchange="toggleSection(${i})">
                        </span>
                        <span>${sec.label}</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon" onclick="moveSection(${i}, -1)">↑</button>
                        <button class="btn-icon" onclick="moveSection(${i}, 1)">↓</button>
                    </div>
                </div>
            `).join('');
        }
        function toggleSection(i) { appSettings.sections[i].visible = !appSettings.sections[i].visible; }
        function moveSection(i, dir) {
            if(i + dir < 0 || i + dir >= appSettings.sections.length) return;
            const temp = appSettings.sections[i];
            appSettings.sections[i] = appSettings.sections[i+dir];
            appSettings.sections[i+dir] = temp;
            renderSectionsList();
        }

        // --- Curated Categories ---
        function renderFeaturedCategories() {
            const container = document.getElementById('featured-cats-container');
            if(allCategoriesList.length === 0) {
                container.innerHTML = '<p>No categories found. Create some first.</p>';
                return;
            }
            // Ensure array exists
            if(!appSettings.featuredCategories) appSettings.featuredCategories = [];

            container.innerHTML = allCategoriesList.map(cat => `
                <label class="check-card">
                    <input type="checkbox" value="${cat.id}" 
                        ${appSettings.featuredCategories.includes(cat.id) ? 'checked' : ''}
                        onchange="toggleFeaturedCat('${cat.id}')">
                    <div class="check-card-content">
                        ${cat.name}
                    </div>
                </label>
            `).join('');
        }
        function toggleFeaturedCat(id) {
            if(appSettings.featuredCategories.includes(id)) {
                appSettings.featuredCategories = appSettings.featuredCategories.filter(c => c !== id);
            } else {
                appSettings.featuredCategories.push(id);
            }
            renderFeaturedCategories(); // Re-render to update UI classes
        }

        // --- Image Upload Logic ---
        function triggerUpload(id) { document.getElementById(`file-${id}`).click(); }
        async function handleUpload(input, targetId) {
            const file = input.files[0];
            if(!file) return;
            
            const btn = input.previousElementSibling; // The Upload button
            btn.innerText = "Uploading...";
            btn.disabled = true;

            try {
                const ref = storage.ref(`branding/${Date.now()}-${file.name}`);
                await ref.put(file);
                const url = await ref.getDownloadURL();
                document.getElementById(targetId).value = url;
                showToast("Image uploaded!");
            } catch(e) {
                console.error(e);
                alert("Upload failed");
            } finally {
                btn.innerText = "Upload Image";
                btn.disabled = false;
            }
        }

        // --- Global Save ---
        async function saveAllSettings() {
            const btn = document.getElementById('global-save-btn');
            btn.disabled = true;
            btn.innerHTML = "Saving...";

            // Gather Inputs
            appSettings.branding.title = document.getElementById('site-title').value;
            appSettings.branding.logoDesktop = document.getElementById('logo-desktop').value;
            appSettings.branding.logoMobile = document.getElementById('logo-mobile').value;

            appSettings.theme.navBg = document.getElementById('val-nav-bg').value;
            appSettings.theme.promoBg = document.getElementById('val-promo-bg').value;
            appSettings.theme.promoText = document.getElementById('val-promo-text').value;
            appSettings.theme.primary = document.getElementById('val-primary').value;

            try {
                await db.collection('landingPage').doc('settings').set(appSettings);
                showToast("Settings saved successfully!", 'success');
            } catch(e) {
                console.error(e);
                showToast("Error saving settings", 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save Changes`;
            }
        }

        function renderNav(user) {
            const navRight = document.getElementById('nav-right');
            if (user && user.email === ADMIN_EMAIL) {
                navRight.innerHTML = `
                    <button class="nav-icon" onclick="window.location.href='manage-category.html'" title="Categories">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    </button>
                    <button class="nav-icon" onclick="auth.signOut()" title="Logout">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>`;
            }
        }

        function showToast(msg, type='success') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.innerText = msg;
            container.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
    </script>
</body>
</html>
