<!-- manage-category.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --warning-color: #F59E0B; --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        nav { background: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--box-shadow); position: sticky; top: 0; z-index: 1000; }
        .nav-left h1 { margin: 0; font-size: 1.75rem; color: var(--primary-color); cursor: pointer; }
        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background-color: #fff; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 2rem; }
        button { border: none; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; }
        .btn-primary { background-color: var(--primary-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: var(--secondary-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-danger { background-color: var(--danger-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-warning { background-color: var(--warning-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-group input { 
            display: block; width: 100%; padding: 0.75rem 1rem; font-size: 0.95rem; line-height: 1.5; 
            background-color: #fff; border: 1px solid #ced4da; border-radius: var(--border-radius);
            transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }
        .form-group input:focus {
            border-color: var(--primary-color); outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }
        .image-preview { 
            width: 80px; height: 80px; border-radius: var(--border-radius); 
            object-fit: cover; border: 2px solid #e5e7eb; margin-top: 0.5rem;
            display: none;
        }
        .image-preview.show { display: block; }
        .search-container { position: relative; margin-bottom: 2rem; max-width: 400px; }
        .search-input { 
            padding: 0.75rem 1rem 0.75rem 2.5rem; 
            border: 1px solid #d1d5db; border-radius: var(--border-radius);
            width: 100%; font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
        }
        .search-input:focus {
            border-color: var(--primary-color); outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }
        .search-icon { 
            position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); 
            color: var(--secondary-color); pointer-events: none;
        }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .category-card { 
            background: white; border-radius: var(--border-radius); padding: 1.5rem; 
            box-shadow: var(--box-shadow); border: 1px solid #e5e7eb;
            transition: all 0.2s ease-in-out; position: relative;
        }
        .category-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .category-content { 
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        .category-info { flex: 1; display: flex; align-items: center; gap: 1rem; }
        .category-image { 
            width: 50px; height: 50px; border-radius: var(--border-radius); 
            object-fit: cover; border: 2px solid #e5e7eb; flex-shrink: 0;
        }
        .category-details { flex: 1; }
        .category-name { 
            font-size: 1.1rem; font-weight: 600; color: var(--dark-color); 
            margin: 0 0 0.25rem 0; 
        }
        .category-count { 
            color: var(--secondary-color); font-size: 0.875rem; font-weight: 500;
        }
        .category-actions { display: flex; align-items: center; gap: 0.75rem; }
        .products-badge { 
            background: var(--primary-color); color: white; padding: 0.25rem 0.75rem; 
            border-radius: 999px; font-size: 0.8rem; font-weight: 600; min-width: 60px;
            text-align: center;
        }
        .menu-button { 
            background: none; border: none; padding: 0.5rem; border-radius: 50%;
            cursor: pointer; color: var(--secondary-color); position: relative;
            transition: all 0.2s ease-in-out;
        }
        .menu-button:hover { 
            background-color: var(--light-color); color: var(--dark-color);
        }
        .dropdown-menu {
            position: absolute; top: 100%; right: 0; background: white;
            border-radius: var(--border-radius); box-shadow: var(--box-shadow);
            border: 1px solid #e5e7eb; padding: 0.5rem; z-index: 100;
            min-width: 150px; display: none;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item { 
            display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem;
            background: none; border: none; width: 100%; text-align: left;
            border-radius: 0.375rem; cursor: pointer; color: var(--dark-color);
            font-size: 0.9rem; transition: background-color 0.2s;
        }
        .dropdown-item:hover { background-color: var(--light-color); }
        .dropdown-item.edit { color: var(--primary-color); }
        .dropdown-item.delete { color: var(--danger-color); }
        .empty-state { 
            text-align: center; padding: 3rem; color: var(--secondary-color); 
            background: var(--light-color); border-radius: var(--border-radius); 
            border: 2px dashed #d1d5db; grid-column: 1 / -1;
        }
        .empty-state h3 { margin: 0 0 0.5rem 0; color: var(--dark-color); }
        .modal-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.5); display: flex; align-items: center; 
            justify-content: center; z-index: 2000; 
        }
        .modal { 
            background: white; border-radius: var(--border-radius); padding: 2rem; 
            max-width: 500px; width: 90%; box-shadow: var(--box-shadow);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 1.25rem; font-weight: 600; margin: 0; }
        .close-modal { 
            background: none; border: none; font-size: 1.5rem; cursor: pointer; 
            padding: 0; color: var(--secondary-color); width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
        }
        .close-modal:hover { color: var(--dark-color); }
        .modal-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; }
        .danger-zone { 
            background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--border-radius);
            padding: 1.5rem; margin-top: 1.5rem;
        }
        .danger-zone h4 { color: var(--danger-color); margin: 0 0 1rem 0; }
        .warning-text { color: var(--danger-color); font-size: 0.9rem; margin-bottom: 1rem; }
        .confirmation-input { 
            border: 1px solid var(--danger-color); background: #fff;
        }
        .confirmation-input:focus {
            border-color: var(--danger-color);
            box-shadow: 0 0 0 0.2rem rgba(239, 68, 68, 0.25);
        }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
        .toast.warning { background-color: var(--warning-color); }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <nav>
        <div class="nav-left"><h1 onclick="window.location.href='index.html'">ShopSphere</h1></div>
    </nav>

    <div class="container page">
        <div id="manage-category-container" class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="margin: 0;">Category Management</h1>
                <button class="btn-primary" onclick="openAddCategoryModal()">+ Add Category</button>
            </div>

            <!-- Search Section -->
            <div class="search-container">
                <div class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                </div>
                <input type="text" id="search-categories" class="search-input" placeholder="Search categories...">
            </div>

            <!-- Categories Section -->
            <h2 style="margin-bottom: 1rem; color: var(--dark-color);">Existing Categories</h2>
            <div id="categories-container">
                <div class="empty-state">
                    <h3>No Categories Found</h3>
                    <p>Get started by creating your first category</p>
                    <button class="btn-primary" onclick="openAddCategoryModal()" style="margin-top: 1rem;">Create Category</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div id="add-category-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Add New Category</h3>
                <button class="close-modal" onclick="closeAddCategoryModal()">&times;</button>
            </div>
            <form id="add-category-form">
                <div class="form-group">
                    <label for="category-name">Category Name</label>
                    <input type="text" id="category-name" placeholder="Enter category name" required>
                </div>
                <div class="form-group">
                    <label for="category-image">Category Image URL</label>
                    <input type="url" id="category-image" placeholder="https://example.com/category-image.jpg">
                    <img id="add-category-preview" class="image-preview" alt="Category image preview">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddCategoryModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Category</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Category Modal -->
    <div id="edit-category-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Edit Category</h3>
                <button class="close-modal" onclick="closeEditCategoryModal()">&times;</button>
            </div>
            <form id="edit-category-form">
                <input type="hidden" id="edit-category-id">
                <div class="form-group">
                    <label for="edit-category-name">Category Name</label>
                    <input type="text" id="edit-category-name" placeholder="Enter category name" required>
                </div>
                <div class="form-group">
                    <label for="edit-category-image">Category Image URL</label>
                    <input type="url" id="edit-category-image" placeholder="https://example.com/category-image.jpg">
                    <img id="edit-category-preview" class="image-preview" alt="Category image preview">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeEditCategoryModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Update Category</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Category Modal -->
    <div id="delete-category-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" style="color: var(--danger-color);">Delete Category</h3>
                <button class="close-modal" onclick="closeDeleteCategoryModal()">&times;</button>
            </div>
            <div class="danger-zone">
                <h4>⚠️ Danger Zone</h4>
                <p class="warning-text">
                    You are about to delete the category "<strong id="delete-category-name"></strong>". 
                    This action cannot be undone.
                </p>
                <div class="form-group">
                    <label for="confirm-category-name">
                        Type the category name to confirm deletion:
                    </label>
                    <input type="text" id="confirm-category-name" class="confirmation-input" 
                           placeholder="Enter category name to confirm">
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeDeleteCategoryModal()">Cancel</button>
                <button type="button" class="btn-danger" id="confirm-delete-btn" disabled>
                    Delete Category
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyA1VS8uxSuiy50qtknIHm1bRYbmyW1Qm6U",
  authDomain: "vastramaya--magic.firebaseapp.com",
  projectId: "vastramaya--magic",
  storageBucket: "vastramaya--magic.firebasestorage.app",
  messagingSenderId: "606200705718",
  appId: "1:606200705718:web:5b4ee31fe3008845d2ec17",
  measurementId: "G-8XS75FC35W"
};
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allCategories = [];
        let productCounts = {};
        let currentEditingCategory = null;
        let currentDeletingCategory = null;

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializePage();
            });
        });

        async function initializePage() {
            await loadCategories();
            await loadProductCounts();
            renderCategories();
            setupEventListeners();
        }

        async function loadCategories() {
            try {
                const snapshot = await db.collection('categories').orderBy('name').get();
                allCategories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (error) {
                console.error("Error loading categories:", error);
                showToast("Failed to load categories.", "error");
            }
        }

        async function loadProductCounts() {
            try {
                const productsSnapshot = await db.collection('products').get();
                productCounts = {};
                
                productsSnapshot.docs.forEach(doc => {
                    const product = doc.data();
                    if (product.category) {
                        productCounts[product.category] = (productCounts[product.category] || 0) + 1;
                    }
                });
            } catch (error) {
                console.error("Error loading product counts:", error);
            }
        }

        function renderCategories(filteredCategories = null) {
            const categoriesToRender = filteredCategories || allCategories;
            const container = document.getElementById('categories-container');
            
            if (categoriesToRender.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Categories Found</h3>
                        <p>${filteredCategories ? 'Try adjusting your search' : 'Get started by creating your first category'}</p>
                        <button class="btn-primary" onclick="openAddCategoryModal()" style="margin-top: 1rem;">Create Category</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="categories-grid">
                    ${categoriesToRender.map(category => `
                        <div class="category-card">
                            <div class="category-content" onclick="navigateToProducts('${category.name}')">
                                <div class="category-info">
                                    <img src="${category.imageUrl || 'https://via.placeholder.com/50?text=No+Image'}" 
                                         alt="${category.name}" 
                                         class="category-image"
                                         onerror="this.src='https://via.placeholder.com/50?text=No+Image'">
                                    <div class="category-details">
                                        <h3 class="category-name">${category.name}</h3>
                                        <div class="category-count">${productCounts[category.name] || 0} products</div>
                                    </div>
                                </div>
                                <div class="category-actions">
                                    <span class="products-badge">${productCounts[category.name] || 0}</span>
                                    <div class="menu-container" style="position: relative;">
                                        <button class="menu-button" onclick="event.stopPropagation(); toggleMenu('${category.id}')">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                                <circle cx="12" cy="6" r="2"></circle>
                                                <circle cx="12" cy="12" r="2"></circle>
                                                <circle cx="12" cy="18" r="2"></circle>
                                            </svg>
                                        </button>
                                        <div class="dropdown-menu" id="menu-${category.id}">
                                            <button class="dropdown-item edit" onclick="openEditCategoryModal('${category.id}', '${category.name}', '${category.imageUrl || ''}')">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                                </svg>
                                                Edit
                                            </button>
                                            <button class="dropdown-item delete" onclick="openDeleteCategoryModal('${category.id}', '${category.name}')">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                                    <path d="M3 6h18"></path>
                                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                                </svg>
                                                Delete
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function setupEventListeners() {
            // Search functionality
            document.getElementById('search-categories').addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                if (searchTerm === '') {
                    renderCategories();
                } else {
                    const filtered = allCategories.filter(category => 
                        category.name.toLowerCase().includes(searchTerm)
                    );
                    renderCategories(filtered);
                }
            });

            // Add category form submission
            document.getElementById('add-category-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await addCategory();
            });

            // Edit category form submission
            document.getElementById('edit-category-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await updateCategory();
            });

            // Image preview for add category
            document.getElementById('category-image').addEventListener('input', (e) => {
                updateImagePreview(e.target.value, 'add-category-preview');
            });

            // Image preview for edit category
            document.getElementById('edit-category-image').addEventListener('input', (e) => {
                updateImagePreview(e.target.value, 'edit-category-preview');
            });

            // Delete confirmation input
            document.getElementById('confirm-category-name').addEventListener('input', (e) => {
                const confirmBtn = document.getElementById('confirm-delete-btn');
                const categoryName = document.getElementById('delete-category-name').textContent;
                confirmBtn.disabled = e.target.value !== categoryName;
            });

            // Confirm delete button
            document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
                await deleteCategory();
            });

            // Close dropdowns when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.menu-container')) {
                    document.querySelectorAll('.dropdown-menu').forEach(menu => {
                        menu.classList.remove('show');
                    });
                }
            });
        }

        function updateImagePreview(imageUrl, previewId) {
            const preview = document.getElementById(previewId);
            if (imageUrl && isValidUrl(imageUrl)) {
                preview.src = imageUrl;
                preview.classList.add('show');
            } else {
                preview.classList.remove('show');
            }
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        function toggleMenu(categoryId) {
            const menu = document.getElementById(`menu-${categoryId}`);
            const isVisible = menu.classList.contains('show');
            
            // Close all other menus
            document.querySelectorAll('.dropdown-menu').forEach(m => {
                m.classList.remove('show');
            });
            
            // Toggle current menu
            if (!isVisible) {
                menu.classList.add('show');
            }
        }

        function openAddCategoryModal() {
            document.getElementById('add-category-modal').style.display = 'flex';
            document.getElementById('category-name').focus();
        }

        function closeAddCategoryModal() {
            document.getElementById('add-category-modal').style.display = 'none';
            document.getElementById('add-category-form').reset();
            document.getElementById('add-category-preview').classList.remove('show');
        }

        function openEditCategoryModal(categoryId, categoryName, categoryImage = '') {
            currentEditingCategory = { id: categoryId, name: categoryName, imageUrl: categoryImage };
            document.getElementById('edit-category-id').value = categoryId;
            document.getElementById('edit-category-name').value = categoryName;
            document.getElementById('edit-category-image').value = categoryImage || '';
            
            // Update image preview if image exists
            if (categoryImage) {
                updateImagePreview(categoryImage, 'edit-category-preview');
            } else {
                document.getElementById('edit-category-preview').classList.remove('show');
            }
            
            document.getElementById('edit-category-modal').style.display = 'flex';
            document.getElementById('edit-category-name').focus();
        }

        function closeEditCategoryModal() {
            document.getElementById('edit-category-modal').style.display = 'none';
            document.getElementById('edit-category-form').reset();
            document.getElementById('edit-category-preview').classList.remove('show');
            currentEditingCategory = null;
        }

        function openDeleteCategoryModal(categoryId, categoryName) {
            currentDeletingCategory = { id: categoryId, name: categoryName };
            document.getElementById('delete-category-name').textContent = categoryName;
            document.getElementById('confirm-category-name').value = '';
            document.getElementById('confirm-delete-btn').disabled = true;
            document.getElementById('delete-category-modal').style.display = 'flex';
            document.getElementById('confirm-category-name').focus();
        }

        function closeDeleteCategoryModal() {
            document.getElementById('delete-category-modal').style.display = 'none';
            document.getElementById('confirm-category-name').value = '';
            currentDeletingCategory = null;
        }

        async function addCategory() {
            const nameInput = document.getElementById('category-name');
            const imageInput = document.getElementById('category-image');
            const name = nameInput.value.trim();
            const imageUrl = imageInput.value.trim();
            
            if (!name) {
                showToast('Category name cannot be empty.', 'error');
                return;
            }

            if (allCategories.some(c => c.name.toLowerCase() === name.toLowerCase())) {
                showToast('Category already exists.', 'error');
                return;
            }

            // Validate image URL if provided
            if (imageUrl && !isValidUrl(imageUrl)) {
                showToast('Please enter a valid image URL.', 'error');
                return;
            }

            try {
                const categoryData = { 
                    name: name, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                };

                // Add image URL if provided
                if (imageUrl) {
                    categoryData.imageUrl = imageUrl;
                }

                await db.collection('categories').add(categoryData);
                
                showToast('Category created successfully!', 'success');
                closeAddCategoryModal();
                
                // Reload data
                await loadCategories();
                await loadProductCounts();
                renderCategories();
                
            } catch (error) {
                console.error("Error adding category:", error);
                showToast("Failed to add category.", "error");
            }
        }

        async function updateCategory() {
            const nameInput = document.getElementById('edit-category-name');
            const imageInput = document.getElementById('edit-category-image');
            const name = nameInput.value.trim();
            const imageUrl = imageInput.value.trim();
            const categoryId = document.getElementById('edit-category-id').value;
            
            if (!name) {
                showToast('Category name cannot be empty.', 'error');
                return;
            }

            if (allCategories.some(c => c.id !== categoryId && c.name.toLowerCase() === name.toLowerCase())) {
                showToast('Category name already exists.', 'error');
                return;
            }

            // Validate image URL if provided
            if (imageUrl && !isValidUrl(imageUrl)) {
                showToast('Please enter a valid image URL.', 'error');
                return;
            }

            try {
                const updateData = { 
                    name: name,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
                };

                // Update image URL (set to empty string if cleared)
                updateData.imageUrl = imageUrl || '';

                await db.collection('categories').doc(categoryId).update(updateData);
                
                showToast('Category updated successfully!', 'success');
                closeEditCategoryModal();
                
                // Reload data
                await loadCategories();
                await loadProductCounts();
                renderCategories();
                
            } catch (error) {
                console.error("Error updating category:", error);
                showToast("Failed to update category.", "error");
            }
        }

        async function deleteCategory() {
            if (!currentDeletingCategory) return;

            try {
                await db.collection('categories').doc(currentDeletingCategory.id).delete();
                
                showToast('Category deleted successfully!', 'success');
                closeDeleteCategoryModal();
                
                // Reload data
                await loadCategories();
                await loadProductCounts();
                renderCategories();
                
            } catch (error) {
                console.error("Error deleting category:", error);
                showToast("Failed to delete category.", "error");
            }
        }

        function navigateToProducts(categoryName) {
            window.location.href = `manage-products.html?category=${encodeURIComponent(categoryName)}`;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
