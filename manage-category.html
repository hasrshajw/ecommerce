<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA; --primary-light: #eef2ff;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        
        .promo-banner { background: var(--danger-color); color: var(--white); padding: 0.5rem; position: fixed; top: 0; left: 0; width: 100%; z-index: 1100; overflow: hidden; }
        .promo-text { display: inline-block; white-space: nowrap; animation: scroll-text 15s linear infinite; font-size: 0.875rem; font-weight: 500; }
        @keyframes scroll-text { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        nav { background: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--box-shadow); position: sticky; top: 32px; z-index: 1000; }
        .nav-left h1 { margin: 0; font-size: 1.75rem; color: var(--primary-color); cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .nav-icon { cursor: pointer; position: relative; background: none; border: none; padding: 0.5rem; border-radius: 50%; transition: background-color 0.2s; }
        .nav-icon:hover { background-color: #e5e7eb; }
        #cart-count { position: absolute; top: 0; right: 0; background-color: #EF4444; color: white; border-radius: 50%; padding: 1px 5px; font-size: 0.7rem; font-weight: bold; }
        
        button { border: none; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; padding: 0.75rem 1.5rem; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }

        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background-color: #fff; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 2rem; }

        .admin-nav { display: flex; gap: 0.5rem; border-bottom: 1px solid #ddd; margin-bottom: 1.5rem; }
        .admin-nav button { background: none; box-shadow: none; padding: 1rem; font-size: 1rem; border-radius: 0; border-bottom: 3px solid transparent; color: var(--secondary-color); }
        .admin-nav button.active { border-bottom-color: var(--primary-color); color: var(--primary-color); }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid #e5e7eb; vertical-align: middle; }
        th { background-color: var(--light-color); font-size: 0.9rem; }
        .table-actions button { padding: 0.5rem 1rem; margin-right: 0.5rem; }
        
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div class="promo-banner">
        <div class="promo-text" id="promo-text">
            Admin Panel: Manage Categories
        </div>
    </div>

    <nav>
        <div class="nav-container">
            <div class="desktop-nav">
                <div class="nav-left" onclick="window.location.href='index.html'">
                    <h1>ShopSphere</h1>
                </div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="index.html#category-section">Categories</a>
                    <a href="/deals">Deals</a>
                </div>
                <div class="nav-search" id="desktopSearch">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                    <input type="text" placeholder="Search products...">
                </div>
                <div class="nav-icons">
                    <button class="nav-icon" id="desktopSearchBtn" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </svg>
                    </button>
                    <button class="nav-icon" onclick="window.location.href='/wishlist'" aria-label="Wishlist">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                    <button class="nav-icon" id="desktopCartBtn" aria-label="Shopping cart">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span id="cart-count">0</span>
                    </button>
                </div>
            </div>
            <div class="mobile-nav">
                <div class="mobile-nav-left">
                    <button class="hamburger" id="mobileMenuBtn" aria-label="Menu">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
                <div class="mobile-nav-center">
                    <div class="mobile-logo" onclick="window.location.href='index.html'">
                        <img src="http://photography.wixo.in/yellow.png" alt="Shop Logo">
                    </div>
                </div>
                <div class="mobile-nav-right">
                    <button class="nav-icon" id="mobileSearchBtn" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </svg>
                    </button>
                    <button class="nav-icon" onclick="window.location.href='/wishlist'" aria-label="Wishlist">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                    <button class="nav-icon" id="mobileCartBtn" aria-label="Shopping cart">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span id="cart-count">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    <div id="mobile-overlay-placeholder"></div>

    <div class="container page">
        <div id="admin-categories-container" class="card">
            <h1>Manage Categories</h1>
            <div class="admin-nav">
                <button onclick="window.location.href='admin-dashboard.html'">Dashboard</button>
                <button class="active" onclick="window.location.href='admin-products.html'">Products</button>
                <button class="active">Categories</button>
            </div>
            <div id="admin-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                    <h2>All Categories</h2>
                    <button class="btn-success" onclick="openCategoryForm()">Add New Category</button>
                </div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>Name</th><th>Product Count (Approx)</th><th>Order</th><th>Actions</th></tr></thead>
                        <tbody id="admin-categories-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzqYrP1qYSiiLLgKW3z3EcwMpiG4hyF6M",
            authDomain: "e-commerce27.firebaseapp.com",
            projectId: "e-commerce27",
            storageBucket: "e-commerce27.firebasestorage.app",
            messagingSenderId: "1000564724466",
            appId: "1:1000564724466:web:55047ed3c820197733366b",
        };
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allCategories = [];
        let allProducts = [];
        let cart = [];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                loadCartFromLocalStorage();
                renderNav();
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializeCategoryManagement();
            });
            const toastInfo = sessionStorage.getItem('toastMessage');
            if(toastInfo){
                const { message, type } = JSON.parse(toastInfo);
                showToast(message, type);
                sessionStorage.removeItem('toastMessage');
            }
        });

        async function initializeCategoryManagement() {
            await fetchAllData();
            renderCategoriesTable();
        }

        async function fetchAllData() {
            const categorySnapshot = await db.collection('categories').orderBy('order', 'asc').get();
            allCategories = categorySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const productSnapshot = await db.collection('products').get();
            allProducts = productSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        }
        
        function renderCategoriesTable() {
            const tableBody = document.getElementById('admin-categories-table');
            if (allCategories.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 2rem;">No categories found.</td></tr>`;
                return;
            }
            tableBody.innerHTML = allCategories.map(cat => {
                const productCount = (allProducts.filter(p => p.category === cat.name).length) || 0;
                return `
                <tr>
                    <td><a href="manage-products.html?category=${cat.id}" style="text-decoration:underline; color:var(--primary-color); font-weight:600;">${cat.name || 'Unnamed Category'}</a></td>
                    <td>${productCount}</td>
                    <td>${cat.order || '-'}</td>
                    <td class="table-actions">
                        <button class="btn-primary" onclick="openCategoryForm('${cat.id}')">Edit</button> 
                        <button class="btn-danger" onclick="deleteCategory('${cat.id}')">Delete</button>
                    </td>
                </tr>`;
            }).join('');
        }
        
        function openCategoryForm(categoryId) {
            const category = categoryId ? allCategories.find(c => c.id === categoryId) : { order: allCategories.length + 1 };
            const modal = document.getElementById('admin-modal');
            
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>${categoryId ? 'Edit' : 'Add'} Category</h2>
                        <button class="close-btn" onclick="closeAdminModal()">&times;</button>
                    </div>
                    <form id="category-form">
                        <div id="product-form" style="padding: 1.5rem;">
                            <div class="form-group"><label for="catName">Category Name</label><input type="text" id="catName" value="${category?.name||''}" required></div>
                            <div class="form-group"><label for="catOrder">Display Order (Lower number shows first)</label><input type="number" id="catOrder" value="${category?.order||''}" min="1" required></div>
                            <div class="form-group"><label for="catLink">Category Page Link (e.g., /category/sarees)</label><input type="text" id="catLink" value="${category?.link||''}" placeholder="/shop?category=Sarees"></div>
                            <p style="font-size:0.8rem; color:var(--secondary-color); margin-top:1rem;">*You can leave image URLs blank; they will use placeholders until updated.</p>
                            <div class="form-group"><label for="catDesktopImage">Desktop Image URL</label><input type="url" id="catDesktopImage" value="${category?.desktopImage||''}"></div>
                            <div class="form-group"><label for="catMobileImage">Mobile Image URL</label><input type="url" id="catMobileImage" value="${category?.mobileImage||''}"></div>
                        </div>
                    </form>
                    <div class="modal-footer">
                        <button class="btn-secondary" onclick="closeAdminModal()">Cancel</button>
                        <button class="btn-primary" id="save-category-btn">Save Category</button>
                    </div>
                </div>`;
            modal.style.display = 'flex';

            modal.querySelector('#save-category-btn').onclick = () => document.getElementById('category-form').requestSubmit();
            modal.querySelector('#category-form').addEventListener('submit', async e => {
                e.preventDefault();
                const data = {
                    name: modal.querySelector('#catName').value.trim(),
                    order: parseInt(modal.querySelector('#catOrder').value),
                    link: modal.querySelector('#catLink').value.trim(),
                    desktopImage: modal.querySelector('#catDesktopImage').value.trim(),
                    mobileImage: modal.querySelector('#catMobileImage').value.trim(),
                };
                try {
                    if (categoryId) await db.collection('categories').doc(categoryId).update(data);
                    else await db.collection('categories').add(data);
                    showToast(`Category ${categoryId ? 'updated' : 'added'}!`, 'success');
                    closeAdminModal();
                    await initializeCategoryManagement();
                } catch(error) { showToast("Error saving category", "error"); console.error(error); }
            });
        }
        
        function deleteCategory(categoryId) {
            if (confirm('Are you sure you want to delete this category? All associated products will still exist but may need manual re-categorization.')) {
                db.collection('categories').doc(categoryId).delete()
                    .then(() => {
                        showToast('Category deleted!', 'success');
                        initializeCategoryManagement();
                    })
                    .catch(error => {
                        showToast('Error deleting category', 'error');
                        console.error(error);
                    });
            }
        }
        
        const closeAdminModal = () => document.getElementById('admin-modal').style.display = 'none';
        
        function renderNav() {
            const navRight = document.getElementById('nav-right');
            const logoutIcon = `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" /></svg>`;
            if (currentUser && currentUser.email === ADMIN_EMAIL) {
                 navRight.innerHTML = `<button title="Store View" class="nav-icon" onclick="window.location.href='index.html'"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.25a.75.75 0 01-.75-.75v-11.25a.75.75 0 01.75-.75h19.5a.75.75 0 01.75.75v11.25a.75.75 0 01-.75.75H18M13.5 21h-3.375a.75.75 0 01-.75-.75V16.5m0 0v-4.5l-3.75-3.75a.75.75 0 010-1.06l3.75-3.75a.75.75 0 011.06 0l3.75 3.75a.75.75 0 010 1.06l-3.75 3.75m0 0H12" /></svg></button><button title="Logout" class="nav-icon" onclick="auth.signOut()">${logoutIcon}</button>`;
            }
        }
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        const loadCartFromLocalStorage = () => cart = JSON.parse(localStorage.getItem('shopSphereCart') || '[]');
        const updateCartCount = () => {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const el = document.getElementById('cart-count');
            if(el) { el.textContent = count; el.style.display = count > 0 ? 'block' : 'none'; }
        };
    </script>
</body>
</html>
