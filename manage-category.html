<!-- manage-category.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background-color: #fff; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 2rem; }
        button { border: none; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; padding: 0.75rem 1.5rem; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        
        /* Header Styles */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb; }
        .page-title { font-size: 1.875rem; font-weight: 700; color: var(--dark-color); margin: 0; }
        
        /* Search Styles */
        .search-container { margin-bottom: 2rem; }
        .search-input { width: 100%; max-width: 400px; padding: 0.75rem 1rem; border: 1px solid #d1d5db; border-radius: var(--border-radius); font-size: 1rem; transition: border-color 0.2s; }
        .search-input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        
        /* Categories Grid */
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .category-card { background: white; border: 1px solid #e5e7eb; border-radius: var(--border-radius); padding: 1.5rem; transition: all 0.2s; }
        .category-card:hover { box-shadow: var(--box-shadow); transform: translateY(-2px); }
        .category-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .category-name { font-size: 1.25rem; font-weight: 600; color: var(--dark-color); margin: 0; cursor: pointer; }
        .category-name:hover { color: var(--primary-color); }
        .product-count { background: var(--primary-color); color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; }
        .category-actions { display: flex; gap: 0.5rem; }
        
        /* Add Category Button */
        .add-category-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; max-width: 400px; margin: 2rem auto; padding: 1rem 1.5rem; background: var(--light-color); border: 2px dashed #d1d5db; color: var(--secondary-color); font-size: 1rem; }
        .add-category-btn:hover { background: #f8fafc; border-color: var(--primary-color); color: var(--primary-color); }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: white; border-radius: var(--border-radius); padding: 2rem; max-width: 500px; width: 90%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 1.5rem; font-weight: 600; margin: 0; }
        .close-modal { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0; width: 30px; height: 30px; color: var(--secondary-color); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #d1d5db; border-radius: var(--border-radius); font-size: 1rem; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 3rem 2rem; color: var(--secondary-color); }
        .empty-state h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        
        /* Toast Styles */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div class="container page">
        <div id="manage-category-container" class="card">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">Category Management</h1>
            </div>

            <!-- Search Section -->
            <div class="search-container">
                <input type="text" class="search-input" id="search-categories" placeholder="Search categories...">
            </div>

            <!-- Categories Grid -->
            <div id="categories-content">
                <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem; color: var(--dark-color);">Existing Categories</h2>
                <div id="categories-grid" class="categories-grid">
                    <div>Loading categories...</div>
                </div>
            </div>

            <!-- Add Category Button -->
            <button class="add-category-btn" onclick="openAddCategoryModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14m-7-7h14"/>
                </svg>
                Add New Category
            </button>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div id="add-category-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Add New Category</h3>
                <button class="close-modal" onclick="closeAddCategoryModal()">&times;</button>
            </div>
            <form id="add-category-form">
                <div class="form-group">
                    <label for="category-name">Category Name</label>
                    <input type="text" id="category-name" placeholder="Enter category name" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddCategoryModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Category</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzqYrP1qYSiiLLgKW3z3EcwMpiG4hyF6M",
            authDomain: "e-commerce27.firebaseapp.com",
            projectId: "e-commerce27",
            storageBucket: "e-commerce27.firebasestorage.app",
            messagingSenderId: "1000564724466",
            appId: "1:1000564724466:web:55047ed3c820197733366b",
        };
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allCategories = [];
        let productCounts = {};

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializePage();
            });
        });

        async function initializePage() {
            await loadCategories();
            await loadProductCounts();
            setupEventListeners();
        }

        async function loadCategories() {
            try {
                const snapshot = await db.collection('categories').orderBy('name').get();
                allCategories = snapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data() 
                }));
                renderCategories();
            } catch (error) {
                console.error("Error loading categories:", error);
                showToast("Failed to load categories.", "error");
            }
        }

        async function loadProductCounts() {
            try {
                const productsSnapshot = await db.collection('products').get();
                productCounts = {};
                
                productsSnapshot.docs.forEach(doc => {
                    const product = doc.data();
                    if (product.category) {
                        productCounts[product.category] = (productCounts[product.category] || 0) + 1;
                    }
                });
                
                renderCategories();
            } catch (error) {
                console.error("Error loading product counts:", error);
            }
        }

        function renderCategories() {
            const grid = document.getElementById('categories-grid');
            const searchTerm = document.getElementById('search-categories').value.toLowerCase();
            
            const filteredCategories = allCategories.filter(cat => 
                cat.name.toLowerCase().includes(searchTerm)
            );

            if (filteredCategories.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>No categories found</h3>
                        <p>${searchTerm ? 'Try adjusting your search' : 'Get started by adding your first category'}</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredCategories.map(cat => `
                <div class="category-card">
                    <div class="category-header">
                        <h3 class="category-name" onclick="navigateToProducts('${cat.name}')">${cat.name}</h3>
                        <span class="product-count">${productCounts[cat.name] || 0} products</span>
                    </div>
                    <div class="category-actions">
                        <button class="btn-danger btn-sm" onclick="deleteCategory('${cat.id}', '${cat.name}')">
                            Delete Category
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function setupEventListeners() {
            // Search functionality
            document.getElementById('search-categories').addEventListener('input', renderCategories);
            
            // Add category form submission
            document.getElementById('add-category-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await addCategory();
            });
        }

        function openAddCategoryModal() {
            document.getElementById('add-category-modal').style.display = 'flex';
            document.getElementById('category-name').focus();
        }

        function closeAddCategoryModal() {
            document.getElementById('add-category-modal').style.display = 'none';
            document.getElementById('add-category-form').reset();
        }

        async function addCategory() {
            const nameInput = document.getElementById('category-name');
            const name = nameInput.value.trim();
            
            if (!name) {
                showToast('Category name cannot be empty.', 'error');
                return;
            }
            
            if (allCategories.some(c => c.name.toLowerCase() === name.toLowerCase())) {
                showToast('Category already exists.', 'error');
                return;
            }
            
            try {
                await db.collection('categories').add({ 
                    name: name, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                });
                
                showToast('Category created successfully!', 'success');
                closeAddCategoryModal();
                await loadCategories();
                await loadProductCounts();
                
            } catch (error) {
                console.error("Error adding category:", error);
                showToast("Failed to add category.", "error");
            }
        }

        async function deleteCategory(id, name) {
            const productCount = productCounts[name] || 0;
            const message = productCount > 0 
                ? `Are you sure you want to delete category "${name}"? This category has ${productCount} product(s). The products will NOT be deleted, but they will lose their category association.`
                : `Are you sure you want to delete category "${name}"?`;
            
            if (confirm(message)) {
                try {
                    await db.collection('categories').doc(id).delete();
                    showToast(`Category "${name}" deleted!`, 'success');
                    await loadCategories();
                    await loadProductCounts();
                } catch (error) {
                    console.error("Error deleting category:", error);
                    showToast("Failed to delete category.", "error");
                }
            }
        }

        function navigateToProducts(categoryName) {
            window.location.href = `product.html?category=${encodeURIComponent(categoryName)}`;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
