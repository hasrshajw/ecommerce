<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Navigation Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* --- CSS Variables & Base Styles (Premium) --- */
        :root {
            --body-bg: #F8FAFC;
            --widget-bg: #FFFFFF;
            --border-color: #F1F5F9;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --brand-primary: #3B82F6;
            --brand-gradient: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            --hover-bg: #F8FAFC;
            --danger-color: #EF4444;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: var(--body-bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        
        /* --- Dashboard Layout for Sidebar Context --- */
        .dashboard-container { display: grid; grid-template-columns: 280px 1fr; height: 100vh; position: relative; }
        .main-area { display: flex; flex-direction: column; overflow-y: auto; }
        .main-header { 
            padding: 12px 2.5rem; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background-color: var(--widget-bg); 
            position: sticky; 
            top: 0; 
            z-index: 10; 
            box-shadow: var(--shadow-sm); 
        }
        
        .nav-logo {
            height: 42px;
            width: auto;
            object-fit: contain;
        }
        
        /* --- Premium Sidebar/Navbar Styles --- */
        .sidebar { 
            background-color: var(--widget-bg); 
            border-right: 1px solid var(--border-color); 
            padding: 2rem 1.5rem; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            transition: transform 0.3s ease-in-out;
            box-shadow: var(--shadow-sm);
        }
        
        .sidebar-header { 
            display: flex; 
            align-items: center; 
            margin-bottom: 3rem; 
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        } 
        
        .logo-container {
            display: flex;
            align-items: center;
            width: 100%;
        }
        
        .logo-image {
            height: 40px;
            width: auto;
            object-fit: contain;
        }
        
        .main-nav ul { 
            list-style: none; 
            display: flex; 
            flex-direction: column; 
            gap: 0.25rem; 
        }
        
        .main-nav a { 
            display: flex; 
            align-items: center; 
            gap: 1rem; 
            text-decoration: none; 
            color: var(--text-secondary); 
            font-weight: 500; 
            padding: 0.875rem 1rem; 
            border-radius: var(--radius-md); 
            transition: var(--transition);
            position: relative;
        }
        
        .main-nav a i { 
            font-size: 1.375rem; 
            color: var(--text-secondary); 
            transition: var(--transition);
            width: 24px;
            text-align: center;
        }
        
        .main-nav a:hover { 
            background-color: var(--hover-bg); 
            color: var(--text-primary);
            transform: translateY(-1px);
        } 
        
        .main-nav a:hover i { 
            color: var(--brand-primary);
        }
        
        .main-nav a.active { 
            background-color: #EFF6FF; 
            color: var(--text-primary);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        } 
        
        .main-nav a.active i { 
            color: var(--brand-primary); 
        }
        
        .main-nav a.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 60%;
            background: var(--brand-primary);
            border-radius: 0 4px 4px 0;
        }
        
        /* --- Profile Section Styles --- */
        .profile-section { 
            margin-top: auto; 
            padding-top: 1.5rem; 
            border-top: 1px solid var(--border-color); 
            display: flex; 
            align-items: center; 
            gap: 0.75rem; 
            cursor: pointer; 
            border-radius: var(--radius-md);
            transition: var(--transition);
            padding: 1rem;
        }
        
        .profile-section:hover {
            background-color: var(--hover-bg);
        }
        
        .profile-content-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 0.75rem; 
            width: 100%; 
        }
        
        .profile-avatar { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            object-fit: cover; 
            flex-shrink: 0; 
            border: 2px solid var(--border-color);
            transition: var(--transition);
        }
        
        .profile-section:hover .profile-avatar {
            border-color: var(--brand-primary);
        }
        
        .profile-details { 
            flex-grow: 1; 
            min-width: 0; 
        }
        
        .profile-name { 
            font-weight: 600; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: block; 
            font-size: 0.9rem;
        }
        
        .profile-email { 
            font-size: 0.8rem; 
            color: var(--text-secondary); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: block; 
        }
        
        .profile-options i { 
            font-size: 1.25rem; 
            color: var(--text-secondary); 
            transition: var(--transition); 
        }
        
        .profile-section.active .profile-options i { 
            transform: rotate(180deg); 
        }
        
        .profile-popup { 
            position: absolute; 
            bottom: 90px; 
            left: 1.5rem; 
            right: 1.5rem; 
            background-color: var(--widget-bg); 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-lg); 
            border: 1px solid var(--border-color); 
            padding: 0.75rem; 
            z-index: 100; 
            opacity: 0; 
            pointer-events: none; 
            transform: translateY(10px) scale(0.95); 
            transition: var(--transition); 
        }
        
        .profile-popup.active { 
            opacity: 1; 
            pointer-events: all; 
            transform: translateY(0) scale(1); 
        }
        
        .popup-header { 
            display: flex; 
            align-items: center; 
            gap: 0.75rem; 
            padding-bottom: 0.75rem; 
            border-bottom: 1px solid var(--border-color); 
        }
        
        .popup-list { 
            list-style: none; 
            padding-top: 0.5rem; 
        } 
        
        .popup-list a { 
            display: flex; 
            align-items: center; 
            gap: 0.75rem; 
            padding: 0.6rem; 
            border-radius: var(--radius-sm); 
            text-decoration: none; 
            color: var(--text-primary); 
            transition: var(--transition);
        }
        
        .popup-list a:hover { 
            background-color: var(--hover-bg); 
        } 
        
        .popup-list a i { 
            font-size: 1.2rem; 
            color: var(--text-secondary); 
        }
        
        .popup-list a.logout i { 
            color: var(--danger-color); 
        } 
        
        .popup-list a.logout { 
            color: var(--danger-color); 
        }
        
        /* --- Mobile Toggle Styles --- */
        .menu-toggle, .sidebar-close-btn { display: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .overlay.active { opacity: 1; pointer-events: auto; }

        @media (max-width: 1024px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .sidebar { 
                position: fixed; 
                top: 0; 
                left: 0; 
                height: 100%; 
                width: 85%; 
                max-width: 320px; 
                z-index: 1000; 
                transform: translateX(-100%); 
                box-shadow: var(--shadow-lg); 
                padding: 2rem 1.25rem;
            }
            .sidebar.active { transform: translateX(0); }
            .main-header { 
                padding: 12px 1.5rem; 
                justify-content: space-between;
            }
            
            /* Hide desktop logo in sidebar on mobile */
            .sidebar .logo-container {
                display: none;
            }
            
            /* Show logo in navbar on mobile */
            .nav-logo {
                display: block;
                height: 42px;
            }
            
            /* Reduce left padding for menu items on mobile */
            .main-nav a {
                padding: 0.875rem 0.75rem;
            }
            
            .menu-toggle { 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                width: 46px; 
                height: 46px; 
                font-size: 1.6rem; 
                color: var(--text-primary); 
                cursor: pointer; 
                border: 2px solid var(--border-color); 
                border-radius: var(--radius-md); 
                background-color: transparent;
                transition: var(--transition);
                outline: none;
            }
            .menu-toggle:hover { 
                background-color: var(--hover-bg);
                border-color: var(--brand-primary);
            }
            .menu-toggle:active, .menu-toggle:focus {
                background-color: var(--hover-bg);
                border-color: var(--border-color);
            }
            .sidebar-close-btn { 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                position: absolute; 
                top: 1.5rem; 
                right: 1.25rem; 
                font-size: 1.75rem; 
                color: var(--text-secondary); 
                cursor: pointer; 
                border: none; 
                background: none; 
                transition: var(--transition);
                width: 36px;
                height: 36px;
                border-radius: 50%;
                outline: none;
            }
            .sidebar-close-btn:hover {
                background-color: var(--hover-bg);
                color: var(--text-primary);
            }
            .sidebar-close-btn:active, .sidebar-close-btn:focus {
                background-color: var(--hover-bg);
                color: var(--text-primary);
            }
            
            /* Adjust profile popup position for mobile */
            .profile-popup {
                left: 1.25rem;
                right: 1.25rem;
            }
        }
        
        /* Desktop styles - ensure logo is hidden in navbar */
        @media (min-width: 1025px) {
            .nav-logo {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="dashboard-container">
        
        <!-- NAVBAR / SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <button class="sidebar-close-btn" id="sidebar-close-btn" aria-label="Close menu"><i class='bx bx-x'></i></button>
            <div class="sidebar-header">
                <div class="logo-container">
                    <img src="https://product-ecommerces.netlify.app/vastramaya.png" alt="Usha Designers Logo" class="logo-image">
                </div>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#dashboard"><i class='bx bx-home-alt'></i> Dashboard</a></li>
                    <li><a href="#course"><i class='bx bx-book-open'></i> Course & Content</a></li>
                    <li><a href="#leaderboard" class="active"><i class='bx bx-bar-chart-alt-2'></i> Leaderboard</a></li>
                    <li><a href="#programs"><i class='bx bx-briefcase-alt-2'></i> Explore Programs</a></li>
                    <li><a href="#community"><i class='bx bx-group'></i> Community</a></li>
                    <li><a href="#help"><i class='bx bx-help-circle'></i> Help & Support</a></li>
                </ul>
            </nav>
            
            <!-- PROFILE SECTION (Static Placeholder) -->
            <div class="profile-section" id="profile-section">
                <div class="profile-content-wrapper">
                    <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="Profile Picture" class="profile-avatar">
                    <div class="profile-details">
                        <span class="profile-name">Alex Johnson</span>
                        <span class="profile-email">alex.johnson@example.com</span>
                    </div>
                    <div class="profile-options"><i class='bx bx-chevron-down'></i></div>
                </div>
            </div>
            
            <!-- PROFILE POPUP -->
            <div class="profile-popup" id="profile-popup">
                <div class="popup-header">
                    <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="Profile Picture" class="profile-avatar">
                    <div class="profile-details">
                        <span class="profile-name">Alex Johnson</span>
                        <span class="profile-email">alex.johnson@example.com</span>
                    </div>
                </div>
                <ul class="popup-list">
                    <li><a href="#profile"><i class='bx bx-user'></i> Profile</a></li>
                    <li><a href="#settings"><i class='bx bx-cog'></i> Settings</a></li>
                    <li><a href="#billing"><i class='bx bx-credit-card'></i> Billing</a></li>
                    <li><a href="#logout" class="logout"><i class='bx bx-log-out'></i> Logout</a></li>
                </ul>
            </div>
        </aside>
        
        <!-- MAIN CONTENT AREA (Minimal for context) -->
        <main class="main-area">
            <header class="main-header">
                <!-- Menu Toggle Button for Mobile -->
                <button class="menu-toggle" id="menu-toggle" aria-label="Open menu"><i class='bx bx-menu'></i></button>
                
                <!-- Logo in navbar for mobile -->
                <img src="https://product-ecommerces.netlify.app/vastramaya.png" alt="Usha Designers Logo" class="nav-logo">
            </header>
            <div style="padding: 2rem; text-align: center;">
                <!-- Placeholder for actual page content -->
                <p>This area would contain the main page content.</p>
            </div>
        </main>
    </div>

    <!-- JAVASCRIPT (Simplified for Menu/Profile Functionality) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Menu Toggle Logic ---
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.getElementById('menu-toggle');
            const closeBtn = document.getElementById('sidebar-close-btn');
            const overlay = document.getElementById('overlay');
            
            const toggleMenu = () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            };
            
            if (menuToggle) menuToggle.addEventListener('click', toggleMenu);
            if (closeBtn) closeBtn.addEventListener('click', toggleMenu);
            if (overlay) overlay.addEventListener('click', toggleMenu);

            // --- Profile Dropdown Logic ---
            const profileSection = document.getElementById('profile-section');
            const profilePopup = document.getElementById('profile-popup');
            
            if (profileSection && profilePopup) {
                profileSection.addEventListener('click', e => { 
                    e.stopPropagation(); 
                    profilePopup.classList.toggle('active'); 
                    profileSection.classList.toggle('active'); 
                });
                
                document.addEventListener('click', e => { 
                    if (!profileSection.contains(e.target)) { 
                        profilePopup.classList.remove('active'); 
                        profileSection.classList.remove('active'); 
                    } 
                });
            }

            // --- Menu Link Active State Logic (Simplified) ---
            const tabs = document.querySelectorAll('.main-nav a');
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    // Simple example to toggle 'active' class on link
                    tabs.forEach(t => t.classList.remove('active'));
                    e.currentTarget.classList.add('active');

                    // Close sidebar on link click on mobile
                    if (window.innerWidth <= 1024) {
                        toggleMenu();
                    }
                });
            });
            
        });
    </script>
</body>
</html>
