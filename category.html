<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSphere - Category</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --bg-light: #f9fafb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --red: #dc2626;
            --red-light: #fef2f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
        }

        /* Promotional Banner */
        .promo-banner {
            background: var(--red);
            color: var(--white);
            padding: 0.5rem;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            overflow: hidden;
            cursor: pointer;
        }

        .promo-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-text 15s linear infinite;
            font-size: 0.875rem;
            font-weight: 500;
        }

        @keyframes scroll-text {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* Navbar Styles */
        .navbar {
            position: fixed;
            top: 32px;
            left: 0;
            width: 100%;
            background: var(--white);
            box-shadow: var(--shadow);
            z-index: 1000;
            padding: 1rem;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Desktop Nav */
        .desktop-nav {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .nav-logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary);
            margin-right: 2rem;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .nav-logo img {
            height: 40px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            margin-right: auto;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-search {
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin-right: 1rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            width: 300px;
        }

        .nav-search:focus-within {
            border-color: var(--primary);
            background: var(--white);
        }

        .nav-search input {
            border: none;
            background: transparent;
            outline: none;
            padding: 0 0.5rem;
            width: 100%;
        }

        .nav-icons {
            display: flex;
            gap: 0.5rem;
        }

        .nav-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            position: relative;
        }

        .nav-icon:hover {
            background: var(--bg-light);
        }

        .cart-count {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--red);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile Nav */
        .mobile-nav {
            display: none;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .mobile-nav-left, .mobile-nav-right {
            display: flex;
            gap: 0.5rem;
        }

        .mobile-nav-center {
            flex: 1;
            text-align: center;
        }

        .mobile-logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .mobile-logo img {
            height: 35px;
            width: auto;
        }

        .hamburger {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .hamburger:hover {
            background: var(--bg-light);
        }

        .hamburger span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--text);
            margin: 4px 0;
            transition: all 0.3s ease;
        }

        /* Search Overlay */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            display: none;
            flex-direction: column;
        }

        .search-header {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .search-input {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin: 0 1rem;
        }

        .search-input input {
            border: none;
            background: transparent;
            outline: none;
            padding: 0 0.5rem;
            width: 100%;
            font-size: 1rem;
        }

        .close-search {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .mobile-menu.active {
            transform: translateX(0);
        }

        .mobile-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .mobile-menu-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-menu {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .close-menu:hover {
            background: var(--bg-light);
        }

        .mobile-menu-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .mobile-menu-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 1.125rem;
            font-weight: 500;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--bg-light);
            transition: color 0.3s ease;
        }

        .mobile-menu-links a:hover {
            color: var(--primary);
        }

        .mobile-menu-about {
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid var(--bg-light);
        }

        .mobile-menu-about a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            display: block;
            padding: 0.75rem 0;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 80%;
            max-width: 400px;
            height: 100%;
            background: var(--white);
            z-index: 1200;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .cart-sidebar.active {
            transform: translateX(0);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bg-light);
        }

        .cart-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-cart {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .close-cart:hover {
            background: var(--bg-light);
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--bg-light);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 600;
        }

        .cart-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--bg-light);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .checkout-btn:hover {
            background: var(--primary-dark);
        }

        /* Category Header */
        .category-header {
            margin-top: 110px;
            padding: 2rem 1rem;
            background-color: var(--bg-light);
            text-align: center;
        }

        .category-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .category-description {
            font-size: 1.125rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Filters Section */
        .filters-section {
            padding: 1.5rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            border-bottom: 1px solid var(--bg-light);
        }

        .filters-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 0.5rem 1rem;
            border: 1px solid var(--bg-light);
            border-radius: 8px;
            background: var(--white);
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:hover {
            border-color: var(--primary);
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .view-btn {
            background: none;
            border: 1px solid var(--bg-light);
            border-radius: 8px;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-btn.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        /* Products Section */
        .products-section {
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Grid View */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* List View */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .list-product-card {
            display: flex;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .list-product-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-3px);
        }

        .list-image-container {
            position: relative;
            width: 200px;
            flex-shrink: 0;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .list-product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .list-product-card:hover .list-product-image {
            transform: scale(1.05);
        }

        .list-product-info {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .list-product-title {
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .list-product-description {
            font-size: 0.875rem;
            color: var(--text-light);
            margin-bottom: 1rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .list-product-price {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .list-current-price {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text);
        }

        .list-original-price {
            font-size: 1rem;
            color: var(--text-light);
            text-decoration: line-through;
            margin-left: 0.5rem;
        }

        .list-discount {
            font-size: 0.875rem;
            color: var(--red);
            font-weight: 700;
            margin-left: 0.5rem;
            background-color: rgba(220, 38, 38, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 10px;
        }

        .list-product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-rating {
            display: flex;
            align-items: center;
        }

        .list-stars {
            color: #ffb300;
            font-size: 0.875rem;
            margin-right: 0.5rem;
        }

        .list-rating-count {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .list-stock {
            font-size: 0.75rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
        }

        .list-stock i {
            margin-right: 0.25rem;
            font-size: 0.75rem;
        }

        .list-stock.in-stock {
            color: #2ecc71;
        }

        .list-stock.low-stock {
            color: #f39c12;
        }

        /* Product Card */
        .product-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        
        .product-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-5px);
        }
        
        /* Image Container */
        .image-container {
            position: relative;
            width: 100%;
            padding-top: 125%; /* 4:5 aspect ratio */
            overflow: hidden;
            background-color: #f8f9fa;
        }
        
        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .product-card:hover .product-image {
            transform: scale(1.05);
        }
        
        /* Badges */
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 1;
            letter-spacing: 0.5px;
        }
        
        .badge.sale {
            background-color: var(--red);
        }
        
        .badge.new {
            background-color: #2ecc71;
        }
        
        /* Wishlist Button */
        .wishlist-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 1;
        }
        
        .wishlist-btn:hover {
            background-color: var(--bg-light);
            transform: scale(1.1);
        }
        
        .wishlist-btn i {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .wishlist-btn.active i {
            color: var(--red);
        }
        
        /* Product Info */
        .product-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .product-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }
        
        .product-price {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .current-price {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }
        
        .original-price {
            font-size: 13px;
            color: var(--text-light);
            text-decoration: line-through;
            margin-left: 6px;
        }
        
        .discount {
            font-size: 11px;
            color: var(--red);
            font-weight: 700;
            margin-left: 6px;
            background-color: rgba(220, 38, 38, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .rating {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .stars {
            color: #ffb300;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .rating-count {
            font-size: 11px;
            color: var(--text-light);
        }
        
        .stock {
            font-size: 11px;
            color: var(--text-light);
            display: flex;
            align-items: center;
        }
        
        .stock i {
            margin-right: 4px;
            font-size: 10px;
        }
        
        .stock.in-stock {
            color: #2ecc71;
        }
        
        .stock.low-stock {
            color: #f39c12;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 3rem;
            gap: 0.5rem;
        }

        .pagination-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--bg-light);
            border-radius: 8px;
            background: var(--white);
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination-btn:hover:not(.disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .pagination-btn.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        .pagination-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading States */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: var(--text-light);
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #e5e7eb;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-state h3 {
            margin-bottom: 1rem;
            color: var(--text);
        }

        /* Responsive Styles */
        @media (max-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .desktop-nav {
                display: none;
            }
            
            .mobile-nav {
                display: flex;
            }
            
            .category-header {
                margin-top: 110px;
                padding: 1.5rem 1rem;
            }
            
            .category-title {
                font-size: 2rem;
            }
            
            .category-description {
                font-size: 1rem;
            }
            
            .filters-container {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .filter-group {
                width: 100%;
                justify-content: space-between;
            }
            
            .filter-select {
                flex: 1;
                min-width: 120px;
            }
            
            .view-toggle {
                align-self: flex-end;
            }
            
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .list-product-card {
                flex-direction: column;
            }
            
            .list-image-container {
                width: 100%;
                height: 200px;
            }
            
            .list-product-info {
                padding: 1rem;
            }
            
            .list-product-title {
                font-size: 1rem;
            }
            
            .list-product-description {
                font-size: 0.8rem;
                -webkit-line-clamp: 2;
            }
            
            .list-current-price {
                font-size: 1.125rem;
            }
            
            .list-original-price {
                font-size: 0.875rem;
            }
            
            .product-card {
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            }
            
            .image-container {
                padding-top: 130%;
            }
            
            .product-info {
                padding: 12px;
            }
            
            .product-title {
                font-size: 13px;
                margin-bottom: 6px;
            }
            
            .current-price {

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdeonH3VytC21F3X6x0rCVCn2xXrGPoug",
            authDomain: "vastramaya---magic.firebaseapp.com",
            projectId: "vastramaya---magic",
            storageBucket: "vastramaya---magic.firebasestorage.app",
            messagingSenderId: "543460072082",
            appId: "1:543460072082:web:f3d1140e8f81ad338ae44b",
            measurementId: "G-E39VNDCFVE"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Global variables
        let cart = [];
        let categories = [];
        let products = [];
        let filteredProducts = [];
        let currentCategory = '';
        let currentView = 'grid';
        let currentPage = 1;
        const productsPerPage = 12;

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            initializeNavigation();
            loadCartFromStorage();
            loadCategoryFromURL();
            loadCategories();
        });

        // Navigation functionality
        function initializeNavigation() {
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const closeMenu = document.getElementById('closeMenu');
            const mobileMenu = document.getElementById('mobileMenu');
            const mobileSearchBtn = document.getElementById('mobileSearchBtn');
            const desktopSearchBtn = document.getElementById('desktopSearchBtn');
            const closeSearch = document.getElementById('closeSearch');
            const searchOverlay = document.getElementById('searchOverlay');
            const mobileCartBtn = document.getElementById('mobileCartBtn');
            const desktopCartBtn = document.getElementById('desktopCartBtn');
            const closeCart = document.getElementById('closeCart');
            const cartSidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');

            // Mobile menu functionality
            function openMobileMenu() {
                mobileMenu.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeMobileMenu() {
                mobileMenu.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            mobileMenuBtn.addEventListener('click', openMobileMenu);
            closeMenu.addEventListener('click', closeMobileMenu);

            // Search functionality
            function openSearch() {
                searchOverlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }

            function closeSearchOverlay() {
                searchOverlay.style.display = 'none';
                document.body.style.overflow = '';
            }

            mobileSearchBtn.addEventListener('click', openSearch);
            desktopSearchBtn.addEventListener('click', openSearch);
            closeSearch.addEventListener('click', closeSearchOverlay);

            // Cart functionality
            function openCart() {
                cartSidebar.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                renderCart();
            }

            function closeCartSidebar() {
                cartSidebar.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            mobileCartBtn.addEventListener('click', openCart);
            desktopCartBtn.addEventListener('click', openCart);
            closeCart.addEventListener('click', closeCartSidebar);

            // Close overlays when clicking on overlay
            overlay.addEventListener('click', function() {
                closeMobileMenu();
                closeCartSidebar();
                closeSearchOverlay();
            });

            // Search functionality
            const searchInput = document.querySelector('.search-input input');
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const query = this.value.trim();
                    if (query) {
                        window.location.href = `search.html?q=${encodeURIComponent(query)}`;
                    }
                }
            });

            // View toggle functionality
            const gridViewBtn = document.getElementById('gridViewBtn');
            const listViewBtn = document.getElementById('listViewBtn');

            gridViewBtn.addEventListener('click', function() {
                if (currentView !== 'grid') {
                    currentView = 'grid';
                    gridViewBtn.classList.add('active');
                    listViewBtn.classList.remove('active');
                    renderProducts();
                }
            });

            listViewBtn.addEventListener('click', function() {
                if (currentView !== 'list') {
                    currentView = 'list';
                    listViewBtn.classList.add('active');
                    gridViewBtn.classList.remove('active');
                    renderProducts();
                }
            });

            // Filter functionality
            const sortBy = document.getElementById('sortBy');
            const priceRange = document.getElementById('priceRange');
            const availability = document.getElementById('availability');

            sortBy.addEventListener('change', applyFilters);
            priceRange.addEventListener('change', applyFilters);
            availability.addEventListener('change', applyFilters);
        }

        // Load category from URL parameter
        function loadCategoryFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            currentCategory = urlParams.get('category') || '';
            
            if (currentCategory) {
                document.getElementById('categoryTitle').textContent = currentCategory;
                loadCategoryProducts();
            } else {
                document.getElementById('categoryTitle').textContent = 'All Products';
                document.getElementById('categoryDescription').textContent = 'Browse our complete collection of products';
                loadAllProducts();
            }
        }

        // Load categories
        async function loadCategories() {
            try {
                const snapshot = await db.collection('categories').orderBy('name').get();
                categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderMobileMenuCategories();
            } catch (error) {
                console.error("Error loading categories:", error);
            }
        }

        // Render mobile menu categories
        function renderMobileMenuCategories() {
            const container = document.getElementById('mobileMenuLinks');
            
            if (categories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Categories</h3>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = categories.map(category => `
                <a href="category.html?category=${encodeURIComponent(category.name)}">${category.name}</a>
            `).join('');
        }

        // Load products for specific category
        async function loadCategoryProducts() {
            try {
                const container = document.getElementById('productsContainer');
                container.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        Loading ${currentCategory} products...
                    </div>
                `;

                const snapshot = await db.collection('products')
                    .where('category', '==', currentCategory)
                    .get();
                
                products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                filteredProducts = [...products];
                
                if (products.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>No Products Found</h3>
                            <p>There are no products in the ${currentCategory} category yet.</p>
                        </div>
                    `;
                    document.getElementById('pagination').style.display = 'none';
                } else {
                    applyFilters();
                }
            } catch (error) {
                console.error("Error loading category products:", error);
                document.getElementById('productsContainer').innerHTML = `
                    <div class="empty-state">
                        <h3>Error Loading Products</h3>
                        <p>Please try refreshing the page</p>
                    </div>
                `;
            }
        }

        // Load all products
        async function loadAllProducts() {
            try {
                const container = document.getElementById('productsContainer');
                container.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        Loading all products...
                    </div>
                `;

                const snapshot = await db.collection('products').get();
                products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                filteredProducts = [...products];
                
                if (products.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>No Products Found</h3>
                            <p>There are no products available yet.</p>
                        </div>
                    `;
                    document.getElementById('pagination').style.display = 'none';
                } else {
                    applyFilters();
                }
            } catch (error) {
                console.error("Error loading all products:", error);
                document.getElementById('productsContainer').innerHTML = `
                    <div class="empty-state">
                        <h3>Error Loading Products</h3>
                        <p>Please try refreshing the page</p>
                    </div>
                `;
            }
        }

        // Apply filters to products
        function applyFilters() {
            filteredProducts = [...products];
            
            // Sort products
            const sortBy = document.getElementById('sortBy').value;
            switch (sortBy) {
                case 'name':
                    filteredProducts.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'price-low':
                    filteredProducts.sort((a, b) => (a.price || 0) - (b.price || 0));
                    break;
                case 'price-high':
                    filteredProducts.sort((a, b) => (b.price || 0) - (a.price || 0));
                    break;
                case 'rating':
                    // For demo, using random ratings
                    filteredProducts.sort((a, b) => Math.random() - 0.5);
                    break;
                case 'newest':
                    // For demo, using random order
                    filteredProducts.sort((a, b) => Math.random() - 0.5);
                    break;
            }
            
            // Filter by price range
            const priceRange = document.getElementById('priceRange').value;
            if (priceRange !== 'all') {
                filteredProducts = filteredProducts.filter(product => {
                    const price = product.price || 0;
                    switch (priceRange) {
                        case '0-25': return price <= 25;
                        case '25-50': return price > 25 && price <= 50;
                        case '50-100': return price > 50 && price <= 100;
                        case '100+': return price > 100;
                        default: return true;
                    }
                });
            }
            
            // Filter by availability
            const availability = document.getElementById('availability').value;
            if (availability !== 'all') {
                filteredProducts = filteredProducts.filter(product => {
                    if (availability === 'in-stock') return product.isAvailable !== false;
                    if (availability === 'out-of-stock') return product.isAvailable === false;
                    return true;
                });
            }
            
            currentPage = 1;
            renderProducts();
            renderPagination();
        }

        // Render products based on current view
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            
            if (filteredProducts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Products Match Your Filters</h3>
                        <p>Try adjusting your filters to see more products</p>
                    </div>
                `;
                document.getElementById('pagination').style.display = 'none';
                return;
            }
            
            // Calculate pagination
            const startIndex = (currentPage - 1) * productsPerPage;
            const endIndex = Math.min(startIndex + productsPerPage, filteredProducts.length);
            const currentProducts = filteredProducts.slice(startIndex, endIndex);
            
            if (currentView === 'grid') {
                container.innerHTML = currentProducts.map(product => `
                    <div class="product-card" onclick="viewProduct('${product.id}')">
                        <div class="image-container">
                            <img src="${product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/300?text=No+Image'}" 
                                 alt="${product.name}" 
                                 class="product-image"
                                 onerror="this.src='https://via.placeholder.com/300?text=Error'">
                            ${product.oldPrice && product.oldPrice > product.price ? 
                                `<div class="badge sale">SALE</div>` : ''}
                            <button class="wishlist-btn" onclick="event.stopPropagation(); toggleWishlist('${product.id}')">
                                <i class="far fa-heart"></i>
                            </button>
                        </div>
                        <div class="product-info">
                            <div class="product-title">${product.name}</div>
                            <div class="product-price">
                                <span class="current-price">$${product.price?.toFixed(2) || '0.00'}</span>
                                ${product.oldPrice && product.oldPrice > product.price ? 
                                    `<span class="original-price">$${product.oldPrice.toFixed(2)}</span>
                                     <span class="discount">${Math.round((1 - product.price / product.oldPrice) * 100)}% OFF</span>` : ''}
                            </div>
                            <div class="rating">
                                <div class="stars">${generateRandomStars()}</div>
                                <span class="rating-count">${generateRandomRating()}</span>
                            </div>
                            <div class="stock ${product.isAvailable ? 'in-stock' : 'low-stock'}">
                                <i class="fas ${product.isAvailable ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                                ${product.isAvailable ? 'In stock' : 'Out of stock'}
                            </div>
                        </div>
                    </div>
                `).join('');
                
                container.className = 'product-grid';
            } else {
                container.innerHTML = currentProducts.map(product => `
                    <div class="list-product-card" onclick="viewProduct('${product.id}')">
                        <div class="list-image-container">
                            <img src="${product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/300?text=No+Image'}" 
                                 alt="${product.name}" 
                                 class="list-product-image"
                                 onerror="this.src='https://via.placeholder.com/300?text=Error'">
                            ${product.oldPrice && product.oldPrice > product.price ? 
                                `<div class="badge sale">SALE</div>` : ''}
                            <button class="wishlist-btn" onclick="event.stopPropagation(); toggleWishlist('${product.id}')">
                                <i class="far fa-heart"></i>
                            </button>
                        </div>
                        <div class="list-product-info">
                            <div>
                                <div class="list-product-title">${product.name}</div>
                                <div class="list-product-description">${product.description || 'No description available.'}</div>
                                <div class="list-product-price">
                                    <span class="list-current-price">$${product.price?.toFixed(2) || '0.00'}</span>
                                    ${product.oldPrice && product.oldPrice > product.price ? 
                                        `<span class="list-original-price">$${product.oldPrice.toFixed(2)}</span>
                                         <span class="list-discount">${Math.round((1 - product.price / product.oldPrice) * 100)}% OFF</span>` : ''}
                                </div>
                            </div>
                            <div class="list-product-meta">
                                <div class="list-rating">
                                    <div class="list-stars">${generateRandomStars()}</div>
                                    <span class="list-rating-count">${generateRandomRating()}</span>
                                </div>
                                <div class="list-stock ${product.isAvailable ? 'in-stock' : 'low-stock'}">
                                    <i class="fas ${product.isAvailable ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                                    ${product.isAvailable ? 'In stock' : 'Out of stock'}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                container.className = 'product-list';
            }
            
            document.getElementById('pagination').style.display = 'flex';
        }

        // Render pagination
        function renderPagination() {
            const totalPages = Math.ceil(filteredProducts.length / productsPerPage);
            const pageNumbers = document.getElementById('pageNumbers');
            const prevPageBtn = document.getElementById('prevPageBtn');
            const nextPageBtn = document.getElementById('nextPageBtn');
            
            // Update previous button
            if (currentPage === 1) {
                prevPageBtn.classList.add('disabled');
            } else {
                prevPageBtn.classList.remove('disabled');
            }
            
            // Update next button
            if (currentPage === totalPages) {
                nextPageBtn.classList.add('disabled');
            } else {
                nextPageBtn.classList.remove('disabled');
            }
            
            // Generate page numbers
            pageNumbers.innerHTML = '';
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    renderProducts();
                    renderPagination();
                });
                pageNumbers.appendChild(pageBtn);
            }
            
            // Add event listeners for previous and next buttons
            prevPageBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderProducts();
                    renderPagination();
                }
            };
            
            nextPageBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderProducts();
                    renderPagination();
                }
            };
        }

        // Generate random stars for demo
        function generateRandomStars() {
            const rating = Math.random() * 2 + 3; // 3-5 stars
            const fullStars = Math.floor(rating);
            const halfStar = rating - fullStars >= 0.5;
            const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);
            
            return '★'.repeat(fullStars) + (halfStar ? '½' : '') + '☆'.repeat(emptyStars);
        }

        // Generate random rating count
        function generateRandomRating() {
            const rating = (Math.random() * 1.5 + 3.5).toFixed(1); // 3.5-5.0
            const count = Math.floor(Math.random() * 500 + 50); // 50-550
            return `${rating} (${count})`;
        }

        // View product
        function viewProduct(productId) {
            window.location.href = `view.html?id=${productId}`;
        }

        // Toggle wishlist
        function toggleWishlist(productId) {
            // For demo purposes - in a real app, this would save to Firebase
            const wishlistBtn = event.target.closest('.wishlist-btn');
            const icon = wishlistBtn.querySelector('i');
            
            if (icon.classList.contains('far')) {
                icon.classList.remove('far');
                icon.classList.add('fas', 'active');
                wishlistBtn.classList.add('active');
                showToast('Added to wishlist');
            } else {
                icon.classList.remove('fas', 'active');
                icon.classList.add('far');
                wishlistBtn.classList.remove('active');
                showToast('Removed from wishlist');
            }
        }

        // Cart functionality
        function loadCartFromStorage() {
            const savedCart = localStorage.getItem('shopsphere_cart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
                updateCartCount();
            }
        }

        function saveCartToStorage() {
            localStorage.setItem('shopsphere_cart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('mobileCartCount').textContent = count;
        }

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            const cartTotal = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-state">
                        <h3>Your cart is empty</h3>
                        <p>Add some products to get started</p>
                    </div>
                `;
                cartFooter.style.display = 'none';
                return;
            }
            
            let total = 0;
            cartItems.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                return `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-details">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-price">$${itemTotal.toFixed(2)}</div>
                            <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                                <button onclick="updateCartQuantity('${item.id}', ${item.quantity - 1})">-</button>
                                <span>${item.quantity}</span>
                                <button onclick="updateCartQuantity('${item.id}', ${item.quantity + 1})">+</button>
                                <button onclick="removeFromCart('${item.id}')" style="margin-left: auto; color: var(--red);">Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            cartTotal.textContent = `$${total.toFixed(2)}`;
            cartFooter.style.display = 'block';
        }

        function addToCart(product) {
            const existingItem = cart.find(item => item.id === product.id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/80?text=No+Image',
                    quantity: 1
                });
            }
            
            saveCartToStorage();
            showToast('Added to cart');
        }

        function updateCartQuantity(productId, newQuantity) {
            if (newQuantity < 1) {
                removeFromCart(productId);
                return;
            }
            
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity = newQuantity;
                saveCartToStorage();
                renderCart();
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCartToStorage();
            renderCart();
            showToast('Removed from cart');
        }

        // Utility functions
        function showToast(message) {
            // Simple toast notification
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: var(--primary);
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                z-index: 1300;
                box-shadow: var(--shadow);
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                document.body.removeChild(toast);
            }, 3000);
        }
    </script>
</body>
</html>
