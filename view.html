<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ShopSphere</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --text: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --bg-light: #f9fafb;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --red: #dc2626;
            --green: #10b981;
            --yellow: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            background-color: var(--bg-light);
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: var(--white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary-light);
        }

        /* Breadcrumb */
        .breadcrumb {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Product Container */
        .product-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        /* Product Gallery */
        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .main-image {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .main-image img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .image-thumbnails {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 0;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .thumbnail.active {
            border-color: var(--primary);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Product Info */
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .product-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .product-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .product-category {
            color: var(--text-light);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .stars {
            color: var(--yellow);
        }

        .rating-text {
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .product-price {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .current-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .original-price {
            font-size: 1.25rem;
            color: var(--text-light);
            text-decoration: line-through;
        }

        .discount {
            background: var(--red);
            color: var(--white);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        /* Color Variants */
        .color-section {
            margin-top: 1rem;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .color-options {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .color-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .color-option.selected {
            background: var(--primary-light);
        }

        .color-preview {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            border: 2px solid var(--border);
            overflow: hidden;
        }

        .color-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .color-name {
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Size Selection */
        .size-section {
            margin-top: 1rem;
        }

        .size-options {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .size-option {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            background: var(--white);
        }

        .size-option.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }

        .size-option.unavailable {
            opacity: 0.5;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .size-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .availability-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .available {
            background: var(--green);
        }

        .unavailable {
            background: var(--red);
        }

        /* Quantity & Actions */
        .quantity-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem;
        }

        .quantity-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-light);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .quantity-input {
            width: 50px;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 1rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn-add-to-cart {
            flex: 2;
            background: var(--primary);
            color: var(--white);
        }

        .btn-wishlist {
            flex: 1;
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }

        .btn-wishlist.active {
            border-color: var(--red);
            color: var(--red);
        }

        /* Product Details */
        .product-details {
            margin-top: 2rem;
        }

        .details-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .tab {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tab.active {
            border-bottom-color: var(--primary);
            color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .description-content {
            line-height: 1.8;
            color: var(--text);
        }

        .specs-grid {
            display: grid;
            gap: 1rem;
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .spec-label {
            font-weight: 600;
            color: var(--text);
        }

        .spec-value {
            color: var(--text-light);
        }

        /* Reviews */
        .reviews-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .review-summary {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            padding: 1.5rem;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .average-rating {
            text-align: center;
        }

        .rating-score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text);
        }

        .rating-stars {
            color: var(--yellow);
            margin: 0.5rem 0;
        }

        .rating-count {
            color: var(--text-light);
        }

        .rating-bars {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .rating-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bar-label {
            width: 30px;
            font-size: 0.875rem;
        }

        .bar-container {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--yellow);
        }

        .review-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .review-item {
            padding: 1.5rem;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .reviewer-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .reviewer-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--primary);
        }

        .reviewer-name {
            font-weight: 600;
        }

        .review-date {
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .review-rating {
            color: var(--yellow);
        }

        .review-content {
            line-height: 1.6;
            color: var(--text);
        }

        /* Related Products */
        .related-products {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product-card-info {
            padding: 1rem;
        }

        .product-card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-card-price {
            font-weight: 700;
            color: var(--primary);
        }

        /* Loading States */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .error-state h2 {
            color: var(--red);
            margin-bottom: 1rem;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: var(--white);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .product-container {
                padding: 1rem;
                gap: 2rem;
            }

            .main-image img {
                height: 300px;
            }

            .product-title {
                font-size: 1.5rem;
            }

            .current-price {
                font-size: 1.5rem;
            }

            .action-buttons {
                flex-direction: column;
            }

            .review-summary {
                grid-template-columns: 1fr;
            }

            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }

            .color-options {
                justify-content: center;
            }

            .size-options {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">ShopSphere</a>
            <div class="nav-actions">
                <a href="index.html" class="btn btn-outline">
                    <i class="fas fa-arrow-left"></i>
                    Back to Shop
                </a>
            </div>
        </div>
    </header>

    <!-- Breadcrumb -->
    <nav class="breadcrumb">
        <a href="index.html">Home</a> > 
        <span id="breadcrumbCategory">Products</span> > 
        <span id="breadcrumbProduct">Product Details</span>
    </nav>

    <!-- Product Container -->
    <main class="product-container">
        <!-- Product Gallery -->
        <section class="product-gallery">
            <div class="main-image">
                <img id="mainProductImage" src="" alt="Product Image">
            </div>
            <div class="image-thumbnails" id="imageThumbnails">
                <!-- Thumbnails will be loaded here -->
            </div>
        </section>

        <!-- Product Info -->
        <section class="product-info">
            <div class="product-header">
                <h1 class="product-title" id="productTitle">Loading...</h1>
                <div class="product-category" id="productCategory"></div>
                
                <div class="product-rating">
                    <div class="stars" id="productRatingStars">★★★★★</div>
                    <span class="rating-text" id="productRatingText">(0 reviews)</span>
                </div>

                <div class="product-price">
                    <span class="current-price" id="currentPrice">$0.00</span>
                    <span class="original-price" id="originalPrice"></span>
                    <span class="discount" id="discountBadge" style="display: none;">0% OFF</span>
                </div>
            </div>

            <!-- Color Variants -->
            <div class="color-section" id="colorSection" style="display: none;">
                <h3 class="section-title">Color</h3>
                <div class="color-options" id="colorOptions">
                    <!-- Color options will be loaded here -->
                </div>
            </div>

            <!-- Size Selection -->
            <div class="size-section" id="sizeSection" style="display: none;">
                <h3 class="section-title">Size</h3>
                <div class="size-options" id="sizeOptions">
                    <!-- Size options will be loaded here -->
                </div>
                <div class="size-info">
                    <div class="availability-dot available"></div>
                    <span>In stock</span>
                    <div class="availability-dot unavailable" style="margin-left: 1rem;"></div>
                    <span>Out of stock</span>
                </div>
            </div>

            <!-- Quantity & Actions -->
            <div class="quantity-section">
                <div class="quantity-controls">
                    <button class="quantity-btn" onclick="updateQuantity(-1)">-</button>
                    <input type="number" class="quantity-input" id="quantityInput" value="1" min="1" max="10">
                    <button class="quantity-btn" onclick="updateQuantity(1)">+</button>
                </div>
                <div class="stock-status" id="stockStatus">
                    <i class="fas fa-check-circle" style="color: var(--green);"></i>
                    <span>In Stock</span>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-add-to-cart" onclick="addToCart()">
                    <i class="fas fa-shopping-cart"></i>
                    Add to Cart
                </button>
                <button class="btn btn-wishlist" id="wishlistBtn" onclick="toggleWishlist()">
                    <i class="far fa-heart"></i>
                    Wishlist
                </button>
            </div>

            <!-- Product Details Tabs -->
            <div class="product-details">
                <div class="details-tabs">
                    <div class="tab active" onclick="switchTab('description')">Description</div>
                    <div class="tab" onclick="switchTab('specifications')">Specifications</div>
                    <div class="tab" onclick="switchTab('reviews')">Reviews</div>
                </div>

                <div class="tab-content active" id="descriptionTab">
                    <div class="description-content" id="productDescription">
                        Loading product description...
                    </div>
                </div>

                <div class="tab-content" id="specificationsTab">
                    <div class="specs-grid" id="productSpecs">
                        <!-- Specifications will be loaded here -->
                    </div>
                </div>

                <div class="tab-content" id="reviewsTab">
                    <div class="reviews-container">
                        <div class="review-summary">
                            <div class="average-rating">
                                <div class="rating-score" id="averageRating">0.0</div>
                                <div class="rating-stars" id="averageStars">★★★★★</div>
                                <div class="rating-count" id="totalReviews">0 reviews</div>
                            </div>
                            <div class="rating-bars" id="ratingBars">
                                <!-- Rating bars will be loaded here -->
                            </div>
                        </div>
                        <div class="review-list" id="reviewList">
                            <!-- Reviews will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Related Products -->
    <section class="related-products">
        <div class="section-header">
            <h2 class="section-title">You May Also Like</h2>
        </div>
        <div class="products-grid" id="relatedProducts">
            <!-- Related products will be loaded here -->
        </div>
    </section>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyCdeonH3VytC21F3X6x0rCVCn2xXrGPoug",
  authDomain: "vastramaya---magic.firebaseapp.com",
  projectId: "vastramaya---magic",
  storageBucket: "vastramaya---magic.firebasestorage.app",
  messagingSenderId: "543460072082",
  appId: "1:543460072082:web:f3d1140e8f81ad338ae44b",
  measurementId: "G-E39VNDCFVE"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Global variables
        let currentProduct = null;
        let selectedColor = null;
        let selectedSize = null;
        let quantity = 1;
        let cart = [];

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadProduct();
            loadCartFromStorage();
        });

        // Load product data
        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                showError('Product not found');
                return;
            }

            try {
                // Show loading state
                document.getElementById('productTitle').textContent = 'Loading...';
                
                const doc = await db.collection('products').doc(productId).get();
                
                if (!doc.exists) {
                    showError('Product not found');
                    return;
                }

                currentProduct = { id: doc.id, ...doc.data() };
                renderProduct();
                loadRelatedProducts();

            } catch (error) {
                console.error('Error loading product:', error);
                showError('Failed to load product');
            }
        }

        // Render product details
        function renderProduct() {
            if (!currentProduct) return;

            // Basic product info
            document.getElementById('productTitle').textContent = currentProduct.name;
            document.getElementById('productCategory').textContent = currentProduct.category || 'Uncategorized';
            document.getElementById('breadcrumbProduct').textContent = currentProduct.name;
            document.getElementById('breadcrumbCategory').textContent = currentProduct.category || 'Products';

            // Price
            const currentPrice = currentProduct.price || 0;
            const oldPrice = currentProduct.oldPrice || 0;
            
            document.getElementById('currentPrice').textContent = `$${currentPrice.toFixed(2)}`;
            
            if (oldPrice > currentPrice) {
                const discount = Math.round((1 - currentPrice / oldPrice) * 100);
                document.getElementById('originalPrice').textContent = `$${oldPrice.toFixed(2)}`;
                document.getElementById('discountBadge').textContent = `${discount}% OFF`;
                document.getElementById('discountBadge').style.display = 'inline-block';
            }

            // Images
            renderProductImages();

            // Color variants
            renderColorVariants();

            // Sizes
            renderSizeOptions();

            // Description
            document.getElementById('productDescription').textContent = 
                currentProduct.description || 'No description available.';

            // Specifications
            renderSpecifications();

            // Reviews
            renderReviews();

            // Stock status
            updateStockStatus();
        }

        // Render product images
        function renderProductImages() {
            const images = currentProduct.images || [];
            const mainImage = document.getElementById('mainProductImage');
            const thumbnailsContainer = document.getElementById('imageThumbnails');

            if (images.length === 0) {
                mainImage.src = 'https://via.placeholder.com/600x500?text=No+Image';
                thumbnailsContainer.innerHTML = '';
                return;
            }

            // Set main image
            mainImage.src = images[0];
            mainImage.alt = currentProduct.name;

            // Create thumbnails
            thumbnailsContainer.innerHTML = images.map((image, index) => `
                <div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="changeMainImage(${index})">
                    <img src="${image}" alt="${currentProduct.name} - Image ${index + 1}">
                </div>
            `).join('');
        }

        // Render color variants
        function renderColorVariants() {
            const colorVariants = currentProduct.colorVariants || [];
            const colorSection = document.getElementById('colorSection');
            const colorOptions = document.getElementById('colorOptions');

            if (colorVariants.length === 0) {
                colorSection.style.display = 'none';
                return;
            }

            colorSection.style.display = 'block';
            colorOptions.innerHTML = colorVariants.map((variant, index) => `
                <div class="color-option ${index === 0 ? 'selected' : ''}" 
                     onclick="selectColor(${index})"
                     data-color-index="${index}">
                    <div class="color-preview">
                        <img src="${variant.images && variant.images.length > 0 ? variant.images[0] : 'https://via.placeholder.com/60?text=Color'}" 
                             alt="${variant.name}">
                    </div>
                    <span class="color-name">${variant.name}</span>
                </div>
            `).join('');

            // Select first color by default
            if (colorVariants.length > 0) {
                selectColor(0);
            }
        }

        // Render size options
        function renderSizeOptions() {
            const sizeSection = document.getElementById('sizeSection');
            const sizeOptions = document.getElementById('sizeOptions');

            // Get available sizes from selected color or general product
            const availableSizes = getAvailableSizes();
            
            if (availableSizes.length === 0) {
                sizeSection.style.display = 'none';
                return;
            }

            sizeSection.style.display = 'block';
            sizeOptions.innerHTML = availableSizes.map(size => `
                <div class="size-option ${size.available ? '' : 'unavailable'}" 
                     onclick="${size.available ? `selectSize('${size.name}')` : ''}">
                    ${size.name}
                </div>
            `).join('');

            // Select first available size by default
            const firstAvailable = availableSizes.find(size => size.available);
            if (firstAvailable) {
                selectSize(firstAvailable.name);
            }
        }

        // Get available sizes for current selection
        function getAvailableSizes() {
            const sizes = ['S', 'M', 'L', 'XL', '2XL'];
            
            if (selectedColor !== null && currentProduct.colorVariants) {
                const colorVariant = currentProduct.colorVariants[selectedColor];
                if (colorVariant.sizes) {
                    return sizes.map(sizeName => {
                        const sizeData = colorVariant.sizes.find(s => s.name === sizeName);
                        return {
                            name: sizeName,
                            available: sizeData ? sizeData.available : false
                        };
                    });
                }
            }

            // Fallback to general product availability
            return sizes.map(sizeName => ({
                name: sizeName,
                available: currentProduct.isAvailable !== false
            }));
        }

        // Render specifications
        function renderSpecifications() {
            const specsContainer = document.getElementById('productSpecs');
            
            const specifications = [
                { label: 'Category', value: currentProduct.category || 'N/A' },
                { label: 'Material', value: 'Premium Quality' },
                { label: 'Care Instructions', value: 'Machine wash cold' },
                { label: 'Origin', value: 'Imported' },
                { label: 'SKU', value: currentProduct.id || 'N/A' }
            ];

            specsContainer.innerHTML = specifications.map(spec => `
                <div class="spec-item">
                    <span class="spec-label">${spec.label}</span>
                    <span class="spec-value">${spec.value}</span>
                </div>
            `).join('');
        }

        // Render reviews
        function renderReviews() {
            // For demo purposes - in a real app, this would come from Firebase
            const reviews = [
                {
                    id: 1,
                    name: 'Sarah Johnson',
                    rating: 5,
                    date: '2024-01-15',
                    content: 'Absolutely love this product! The quality is amazing and it fits perfectly. Will definitely purchase again.'
                },
                {
                    id: 2,
                    name: 'Mike Chen',
                    rating: 4,
                    date: '2024-01-10',
                    content: 'Great product overall. The material is good quality and it looks exactly like the pictures. One star off because the sizing runs a bit small.'
                },
                {
                    id: 3,
                    name: 'Emily Davis',
                    rating: 5,
                    date: '2024-01-05',
                    content: 'Perfect fit and excellent quality. The delivery was fast and the packaging was secure. Highly recommended!'
                }
            ];

            // Calculate average rating
            const averageRating = reviews.reduce((sum, review) => sum + review.rating, 0) / reviews.length;
            document.getElementById('averageRating').textContent = averageRating.toFixed(1);
            document.getElementById('averageStars').innerHTML = '★'.repeat(Math.round(averageRating)) + '☆'.repeat(5 - Math.round(averageRating));
            document.getElementById('totalReviews').textContent = `${reviews.length} reviews`;

            // Rating distribution
            const ratingDistribution = [0, 0, 0, 0, 0];
            reviews.forEach(review => {
                ratingDistribution[5 - review.rating]++;
            });

            document.getElementById('ratingBars').innerHTML = [5, 4, 3, 2, 1].map(stars => {
                const count = ratingDistribution[5 - stars];
                const percentage = (count / reviews.length) * 100;
                return `
                    <div class="rating-bar">
                        <span class="bar-label">${stars}★</span>
                        <div class="bar-container">
                            <div class="bar-fill" style="width: ${percentage}%"></div>
                        </div>
                        <span class="bar-count">${count}</span>
                    </div>
                `;
            }).join('');

            // Review list
            document.getElementById('reviewList').innerHTML = reviews.map(review => `
                <div class="review-item">
                    <div class="review-header">
                        <div class="reviewer-info">
                            <div class="reviewer-avatar">${review.name.charAt(0)}</div>
                            <div>
                                <div class="reviewer-name">${review.name}</div>
                                <div class="review-date">${new Date(review.date).toLocaleDateString()}</div>
                            </div>
                        </div>
                        <div class="review-rating">${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</div>
                    </div>
                    <div class="review-content">${review.content}</div>
                </div>
            `).join('');
        }

        // Load related products
        async function loadRelatedProducts() {
            if (!currentProduct) return;

            try {
                const snapshot = await db.collection('products')
                    .where('category', '==', currentProduct.category)
                    .limit(4)
                    .get();

                const relatedProducts = snapshot.docs
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .filter(product => product.id !== currentProduct.id);

                renderRelatedProducts(relatedProducts);

            } catch (error) {
                console.error('Error loading related products:', error);
            }
        }

        // Render related products
        function renderRelatedProducts(products) {
            const container = document.getElementById('relatedProducts');

            if (products.length === 0) {
                container.innerHTML = '<p>No related products found.</p>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card" onclick="viewProduct('${product.id}')">
                    <img src="${product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/250x200?text=No+Image'}" 
                         alt="${product.name}" 
                         class="product-image">
                    <div class="product-card-info">
                        <div class="product-card-title">${product.name}</div>
                        <div class="product-card-price">$${(product.price || 0).toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
        }

        // Event handlers
        function changeMainImage(index) {
            const images = currentProduct.images || [];
            if (images[index]) {
                document.getElementById('mainProductImage').src = images[index];
                
                // Update active thumbnail
                document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                    thumb.classList.toggle('active', i === index);
                });
            }
        }

        function selectColor(index) {
            selectedColor = index;
            
            // Update UI
            document.querySelectorAll('.color-option').forEach((option, i) => {
                option.classList.toggle('selected', i === index);
            });

            // Update sizes based on color selection
            renderSizeOptions();
            updateStockStatus();

            // Update main image if color has specific images
            const colorVariant = currentProduct.colorVariants[index];
            if (colorVariant && colorVariant.images && colorVariant.images.length > 0) {
                document.getElementById('mainProductImage').src = colorVariant.images[0];
                
                // Update thumbnails
                const thumbnailsContainer = document.getElementById('imageThumbnails');
                thumbnailsContainer.innerHTML = colorVariant.images.map((image, imgIndex) => `
                    <div class="thumbnail ${imgIndex === 0 ? 'active' : ''}" onclick="changeColorImage(${imgIndex})">
                        <img src="${image}" alt="${colorVariant.name} - Image ${imgIndex + 1}">
                    </div>
                `).join('');
            }
        }

        function changeColorImage(index) {
            const colorVariant = currentProduct.colorVariants[selectedColor];
            if (colorVariant && colorVariant.images[index]) {
                document.getElementById('mainProductImage').src = colorVariant.images[index];
                
                document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                    thumb.classList.toggle('active', i === index);
                });
            }
        }

        function selectSize(size) {
            selectedSize = size;
            
            // Update UI
            document.querySelectorAll('.size-option').forEach(option => {
                option.classList.toggle('selected', option.textContent === size);
            });

            updateStockStatus();
        }

        function updateQuantity(change) {
            quantity = parseInt(document.getElementById('quantityInput').value) + change;
            quantity = Math.max(1, Math.min(10, quantity));
            document.getElementById('quantityInput').value = quantity;
        }

        function updateStockStatus() {
            const stockStatus = document.getElementById('stockStatus');
            const isAvailable = checkAvailability();
            
            if (isAvailable) {
                stockStatus.innerHTML = '<i class="fas fa-check-circle" style="color: var(--green);"></i><span>In Stock</span>';
            } else {
                stockStatus.innerHTML = '<i class="fas fa-times-circle" style="color: var(--red);"></i><span>Out of Stock</span>';
            }
        }

        function checkAvailability() {
            if (selectedColor !== null && currentProduct.colorVariants) {
                const colorVariant = currentProduct.colorVariants[selectedColor];
                if (selectedSize && colorVariant.sizes) {
                    const sizeData = colorVariant.sizes.find(s => s.name === selectedSize);
                    return sizeData ? sizeData.available : false;
                }
                return colorVariant.sizes ? colorVariant.sizes.some(s => s.available) : false;
            }
            return currentProduct.isAvailable !== false;
        }

        function switchTab(tabName) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Activate selected tab
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        // Cart functionality
        function loadCartFromStorage() {
            const savedCart = localStorage.getItem('shopsphere_cart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
            }
        }

        function saveCartToStorage() {
            localStorage.setItem('shopsphere_cart', JSON.stringify(cart));
        }

        function addToCart() {
            if (!currentProduct) return;

            const isAvailable = checkAvailability();
            if (!isAvailable) {
                showToast('This product is currently out of stock');
                return;
            }

            const cartItem = {
                id: currentProduct.id,
                name: currentProduct.name,
                price: currentProduct.price,
                image: currentProduct.images && currentProduct.images.length > 0 ? currentProduct.images[0] : 'https://via.placeholder.com/100?text=No+Image',
                quantity: quantity,
                color: selectedColor !== null && currentProduct.colorVariants ? currentProduct.colorVariants[selectedColor].name : null,
                size: selectedSize
            };

            // Check if item already exists in cart
            const existingIndex = cart.findIndex(item => 
                item.id === cartItem.id && 
                item.color === cartItem.color && 
                item.size === cartItem.size
            );

            if (existingIndex > -1) {
                cart[existingIndex].quantity += quantity;
            } else {
                cart.push(cartItem);
            }

            saveCartToStorage();
            showToast('Product added to cart!');
        }

        function toggleWishlist() {
            const wishlistBtn = document.getElementById('wishlistBtn');
            const icon = wishlistBtn.querySelector('i');
            
            if (icon.classList.contains('far')) {
                icon.classList.remove('far');
                icon.classList.add('fas');
                wishlistBtn.classList.add('active');
                showToast('Added to wishlist');
            } else {
                icon.classList.remove('fas');
                icon.classList.add('far');
                wishlistBtn.classList.remove('active');
                showToast('Removed from wishlist');
            }
        }

        function viewProduct(productId) {
            window.location.href = `view.html?id=${productId}`;
        }

        // Utility functions
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function showError(message) {
            document.querySelector('.product-container').innerHTML = `
                <div class="error-state">
                    <h2>Error</h2>
                    <p>${message}</p>
                    <button class="btn btn-primary" onclick="window.location.href='index.html'">
                        Back to Home
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
