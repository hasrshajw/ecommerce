<!-- manage-products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA; --primary-light: #eef2ff;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --warning-color: #F59E0B; --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06);
            --box-shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--dark-color); line-height: 1.5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        
        /* Navigation */
        nav { 
            background: #fff; padding: 1rem 1.5rem; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: var(--box-shadow); position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid #e5e7eb;
        }
        .nav-left h1 { 
            margin: 0; font-size: 1.75rem; font-weight: 700; 
            color: var(--primary-color); cursor: pointer; 
        }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }
        .nav-icon { 
            cursor: pointer; background: none; border: none; padding: 0.5rem; 
            border-radius: 50%; transition: all 0.2s ease-in-out; color: var(--secondary-color);
        }
        .nav-icon:hover { background-color: #f3f4f6; color: var(--dark-color); }
        
        /* Buttons */
        button { 
            border: none; border-radius: var(--border-radius); cursor: pointer; 
            font-family: var(--font-family); font-weight: 600; 
            transition: all 0.2s ease-in-out; display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-primary { 
            background-color: var(--primary-color); color: white; 
            padding: 0.75rem 1.5rem; font-size: 0.875rem;
        }
        .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-success { 
            background-color: var(--success-color); color: white; 
            padding: 0.75rem 1.5rem; font-size: 0.875rem;
        }
        .btn-success:hover { background-color: #0da271; transform: translateY(-1px); }
        .btn-danger { 
            background-color: var(--danger-color); color: white; 
            padding: 0.5rem 1rem; font-size: 0.75rem;
        }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-secondary { 
            background-color: white; color: var(--secondary-color); border: 1px solid #d1d5db;
            padding: 0.5rem 1rem; font-size: 0.75rem;
        }
        .btn-secondary:hover { background-color: #f9fafb; border-color: var(--secondary-color); }
        
        /* Page Layout */
        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .card { 
            background-color: #fff; border-radius: var(--border-radius); 
            box-shadow: var(--box-shadow); border: 1px solid #e5e7eb;
        }
        
        /* Header Section */
        .page-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb;
        }
        .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark-color); }
        .category-badge { 
            background: var(--primary-light); color: var(--primary-color); 
            padding: 0.5rem 1rem; border-radius: var(--border-radius); 
            font-size: 0.875rem; font-weight: 600; margin-left: 1rem;
        }
        
        /* Search and Filters */
        .search-container { 
            position: relative; margin-bottom: 1.5rem; max-width: 400px; 
        }
        .search-input { 
            padding: 0.75rem 1rem 0.75rem 2.5rem; 
            border: 1px solid #d1d5db; border-radius: var(--border-radius);
            width: 100%; font-size: 0.875rem; background: white;
            transition: all 0.2s ease-in-out;
        }
        .search-input:focus {
            border-color: var(--primary-color); outline: 0;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .search-icon { 
            position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); 
            color: var(--secondary-color); pointer-events: none;
        }
        
        /* Products Table */
        .table-container { 
            background: white; border-radius: var(--border-radius); 
            overflow: hidden; box-shadow: var(--box-shadow);
        }
        .products-table { 
            width: 100%; border-collapse: collapse; 
            font-size: 0.875rem;
        }
        .products-table th { 
            background-color: #f8fafc; 
            padding: 1rem 1.5rem; text-align: left; font-weight: 600; 
            color: var(--dark-color); border-bottom: 1px solid #e5e7eb;
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .products-table td { 
            padding: 1rem 1.5rem; border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .products-table tr:last-child td { border-bottom: none; }
        .products-table tr:hover { background-color: #fafafa; }
        
        /* Product Cells */
        .product-cell { display: flex; align-items: center; gap: 1rem; }
        .product-image { 
            width: 48px; height: 48px; border-radius: var(--border-radius); 
            object-fit: cover; border: 1px solid #e5e7eb;
        }
        .product-info { flex: 1; }
        .product-name { 
            font-weight: 600; color: var(--dark-color); margin-bottom: 0.25rem;
            font-size: 0.875rem;
        }
        .product-category { 
            color: var(--secondary-color); font-size: 0.75rem; 
            font-weight: 500;
        }
        .price-cell { 
            font-weight: 600; color: var(--dark-color); 
            font-size: 0.875rem;
        }
        .colors-cell { 
            text-align: center; 
        }
        .colors-badge { 
            background: var(--primary-color); color: white; 
            padding: 0.25rem 0.5rem; border-radius: 999px; 
            font-size: 0.75rem; font-weight: 600; min-width: 24px;
            display: inline-block;
        }
        
        /* Availability Toggle */
        .availability-cell { text-align: center; }
        .availability-badge { 
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.375rem 0.75rem; border-radius: 999px;
            font-size: 0.75rem; font-weight: 600;
        }
        .availability-badge.available { 
            background: #f0fdf4; color: var(--success-color); 
            border: 1px solid #bbf7d0;
        }
        .availability-badge.unavailable { 
            background: #fef2f2; color: var(--danger-color);
            border: 1px solid #fecaca;
        }
        .availability-toggle { 
            appearance: none; width: 36px; height: 20px; 
            background-color: #d1d5db; border-radius: 999px; 
            position: relative; cursor: pointer; transition: all 0.2s;
        }
        .availability-toggle::before { 
            content: ''; position: absolute; width: 16px; height: 16px; 
            border-radius: 50%; background-color: white; top: 2px; left: 2px; 
            transition: transform 0.2s; box-shadow: var(--box-shadow);
        }
        .availability-toggle:checked { background-color: var(--success-color); }
        .availability-toggle:checked::before { transform: translateX(16px); }
        
        /* Actions */
        .actions-cell { text-align: right; }
        .actions-container { 
            display: flex; align-items: center; gap: 0.5rem; 
            justify-content: flex-end;
        }
        
        /* Empty State */
        .empty-state { 
            text-align: center; padding: 3rem; color: var(--secondary-color); 
        }
        .empty-state-icon { 
            width: 64px; height: 64px; color: #d1d5db; 
            margin-bottom: 1rem;
        }
        .empty-state h3 { 
            margin: 0 0 0.5rem 0; color: var(--dark-color); 
            font-size: 1.125rem; font-weight: 600;
        }
        .empty-state p { margin-bottom: 1.5rem; font-size: 0.875rem; }
        
        /* Toast Notifications */
        #toast-container { 
            position: fixed; bottom: 20px; right: 20px; z-index: 3000; 
        }
        .toast { 
            padding: 1rem 1.5rem; border-radius: var(--border-radius); 
            color: white; box-shadow: var(--box-shadow-lg); 
            animation: slideIn 0.3s, fadeOut 0.3s 2.7s; 
            font-size: 0.875rem; font-weight: 500;
        }
        @keyframes slideIn { 
            from { transform: translateX(100%); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
        @keyframes fadeOut { to { opacity: 0; } }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
        .toast.warning { background-color: var(--warning-color); }
        
        /* Loading State */
        .loading-state { 
            text-align: center; padding: 2rem; color: var(--secondary-color);
        }
        .loading-spinner {
            width: 24px; height: 24px; border: 2px solid #e5e7eb;
            border-top: 2px solid var(--primary-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <nav>
        <div class="nav-left">
            <h1 onclick="window.location.href='index.html'">ShopSphere</h1>
        </div>
        <div id="nav-right" class="nav-right"></div>
    </nav>

    <div class="container page">
        <div class="card" style="padding: 2rem;">
            <!-- Page Header -->
            <div class="page-header">
                <div style="display: flex; align-items: center;">
                    <h1 class="page-title" id="products-page-title">Products</h1>
                    <span class="category-badge" id="category-badge" style="display: none;"></span>
                </div>
                <button class="btn-success" id="add-product-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 4v16m8-8H4"/>
                    </svg>
                    Add Product
                </button>
            </div>

            <!-- Search Section -->
            <div class="search-container">
                <div class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                </div>
                <input type="text" id="search-products" class="search-input" placeholder="Search products by name...">
            </div>

            <!-- Products Table -->
            <div class="table-container">
                <table class="products-table">
                    <thead>
                        <tr>
                            <th style="width: 35%;">Product</th>
                            <th style="width: 15%;">Price</th>
                            <th style="width: 15%;">Colors</th>
                            <th style="width: 15%;">Available</th>
                            <th style="width: 20%; text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-table">
                        <tr>
                            <td colspan="5" class="loading-state">
                                <div class="loading-spinner"></div>
                                Loading products...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyA1VS8uxSuiy50qtknIHm1bRYbmyW1Qm6U",
  authDomain: "vastramaya--magic.firebaseapp.com",
  projectId: "vastramaya--magic",
  storageBucket: "vastramaya--magic.firebasestorage.app",
  messagingSenderId: "606200705718",
  appId: "1:606200705718:web:5b4ee31fe3008845d2ec17",
  measurementId: "G-8XS75FC35W"
};
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allProducts = [];
        let currentCategory = null;
        let filteredProducts = [];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                renderNav();
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializePage();
            });
        });

        function initializePage() {
            const params = new URLSearchParams(window.location.search);
            currentCategory = params.get('category');
            
            // Update page title and badge
            const pageTitle = document.getElementById('products-page-title');
            const categoryBadge = document.getElementById('category-badge');
            
            if (!currentCategory) {
                pageTitle.textContent = "All Products";
                categoryBadge.style.display = 'none';
                document.getElementById('add-product-btn').onclick = () => window.location.href = 'product.html';
            } else {
                const decodedCategory = decodeURIComponent(currentCategory);
                pageTitle.textContent = "Products";
                categoryBadge.textContent = decodedCategory;
                categoryBadge.style.display = 'inline-block';
                document.getElementById('add-product-btn').onclick = () => window.location.href = `product.html?category=${encodeURIComponent(decodedCategory)}`;
            }

            loadAndRenderProducts();
            setupEventListeners();
        }

        function setupEventListeners() {
            // Search functionality
            document.getElementById('search-products').addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                filterProducts(searchTerm);
            });
        }

        async function loadAndRenderProducts() {
            try {
                const snapshot = await db.collection('products').orderBy('name').get();
                allProducts = snapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data(),
                    colorsCount: (doc.data().colorVariants || []).length
                }));
                
                filterProducts('');
            } catch (error) {
                console.error("Error loading products:", error);
                showToast("Failed to load products.", "error");
                renderEmptyState("Error loading products. Please try again.");
            }
        }

        function filterProducts(searchTerm) {
            if (!searchTerm) {
                filteredProducts = currentCategory 
                    ? allProducts.filter(p => p.category === decodeURIComponent(currentCategory))
                    : allProducts;
            } else {
                filteredProducts = allProducts.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) &&
                    (!currentCategory || p.category === decodeURIComponent(currentCategory))
                );
            }
            renderProductsTable();
        }

        function renderProductsTable() {
            const tableBody = document.getElementById('admin-products-table');
            
            if (filteredProducts.length === 0) {
                renderEmptyState(
                    currentCategory 
                        ? `No products found in ${decodeURIComponent(currentCategory)}.`
                        : "No products found."
                );
                return;
            }

            tableBody.innerHTML = filteredProducts.map(product => {
                const imageUrl = (product.images && product.images.length > 0) 
                    ? product.images[0] 
                    : 'https://via.placeholder.com/50?text=No+Image';
                
                const isAvailable = product.isAvailable !== false;
                const colorsCount = product.colorsCount || 0;

                return `
                <tr>
                    <td>
                        <div class="product-cell">
                            <img src="${imageUrl}" alt="${product.name}" class="product-image" 
                                 onerror="this.src='https://via.placeholder.com/50?text=No+Image'">
                            <div class="product-info">
                                <div class="product-name">${product.name}</div>
                                <div class="product-category">${product.category || 'Uncategorized'}</div>
                            </div>
                        </div>
                    </td>
                    <td class="price-cell">$${(product.price || 0).toFixed(2)}</td>
                    <td class="colors-cell">
                        <span class="colors-badge">${colorsCount}</span>
                    </td>
                    <td class="availability-cell">
                        <label class="availability-badge ${isAvailable ? 'available' : 'unavailable'}">
                            <input type="checkbox" class="availability-toggle" 
                                   data-id="${product.id}" ${isAvailable ? 'checked' : ''}>
                            ${isAvailable ? 'Available' : 'Unavailable'}
                        </label>
                    </td>
                    <td class="actions-cell">
                        <div class="actions-container">
                            <button class="btn-secondary" onclick="editProduct('${product.id}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                                Edit
                            </button>
                            <button class="btn-danger" onclick="deleteProduct('${product.id}', '${product.name}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M3 6h18"></path>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            // Add event listeners to availability toggles
            document.querySelectorAll('.availability-toggle').forEach(toggle => {
                toggle.addEventListener('change', async (e) => {
                    await updateProductAvailability(e.target.dataset.id, e.target.checked);
                });
            });
        }

        function renderEmptyState(message) {
            const tableBody = document.getElementById('admin-products-table');
            tableBody.innerHTML = `
                <tr>
                    <td colspan="5" class="empty-state">
                        <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                        </svg>
                        <h3>No Products Found</h3>
                        <p>${message}</p>
                        <button class="btn-primary" onclick="document.getElementById('add-product-btn').click()">
                            Add Your First Product
                        </button>
                    </td>
                </tr>`;
        }

        async function updateProductAvailability(productId, isAvailable) {
            try {
                await db.collection('products').doc(productId).update({ 
                    isAvailable: isAvailable,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Update local data
                const product = allProducts.find(p => p.id === productId);
                if (product) product.isAvailable = isAvailable;
                
                showToast(`Product ${isAvailable ? 'activated' : 'deactivated'} successfully!`, 'success');
            } catch (error) {
                console.error("Error updating availability:", error);
                showToast("Failed to update availability", "error");
                
                // Revert the toggle in UI
                const toggle = document.querySelector(`.availability-toggle[data-id="${productId}"]`);
                if (toggle) toggle.checked = !isAvailable;
            }
        }

        function editProduct(productId) {
            window.location.href = `product.html?id=${productId}`;
        }

        async function deleteProduct(productId, productName) {
            if (confirm(`Are you sure you want to delete "${productName}"? This action cannot be undone.`)) {
                try {
                    await db.collection('products').doc(productId).delete();
                    showToast('Product deleted successfully!', 'success');
                    
                    // Remove from local data and re-render
                    allProducts = allProducts.filter(p => p.id !== productId);
                    filterProducts(document.getElementById('search-products').value);
                    
                } catch(error) { 
                    console.error("Error deleting product:", error);
                    showToast("Failed to delete product", "error"); 
                }
            }
        }
        
        function renderNav() {
            const navRight = document.getElementById('nav-right');
            const logoutIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>`;
            const categoriesIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>`;
            
            if (currentUser && currentUser.email === ADMIN_EMAIL) {
                navRight.innerHTML = `
                    <button title="Manage Categories" class="nav-icon" onclick="window.location.href='manage-category.html'">
                        ${categoriesIcon}
                    </button>
                    <button title="Logout" class="nav-icon" onclick="auth.signOut()">
                        ${logoutIcon}
                    </button>`;
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
