<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA; --primary-light: #eef2ff;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --warning-color: #F59E0B; --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06);
        }
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--dark-color); line-height: 1.5; padding-bottom: 20px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        
        nav { 
            background: #fff; padding: 1rem 1.5rem; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: var(--box-shadow); position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid #e5e7eb;
        }
        .nav-left h1 { 
            margin: 0; font-size: 1.75rem; font-weight: 700; 
            color: var(--primary-color); cursor: pointer; 
        }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }
        .nav-icon { 
            cursor: pointer; background: none; border: none; padding: 0.5rem; 
            border-radius: 50%; transition: all 0.2s ease-in-out; color: var(--secondary-color);
        }
        .nav-icon:hover { background-color: #f3f4f6; color: var(--dark-color); }
        
        button { 
            border: none; border-radius: var(--border-radius); cursor: pointer; 
            font-family: var(--font-family); font-weight: 600; 
            transition: all 0.2s ease-in-out; display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-primary { background-color: var(--primary-color); color: white; padding: 0.75rem 1.5rem; font-size: 0.875rem; }
        .btn-success { background-color: var(--success-color); color: white; padding: 0.75rem 1.5rem; font-size: 0.875rem; }
        .btn-danger { background-color: var(--danger-color); color: white; padding: 0.5rem 1rem; font-size: 0.75rem; }
        .btn-secondary { background-color: white; color: var(--secondary-color); border: 1px solid #d1d5db; padding: 0.5rem 1rem; font-size: 0.75rem; }
        
        .card { 
            background-color: #fff; border-radius: var(--border-radius); 
            box-shadow: var(--box-shadow); border: 1px solid #e5e7eb;
            padding: 2rem;
        }
        
        .page-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb;
        }
        .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark-color); }
        .category-badge { 
            background: var(--primary-light); color: var(--primary-color); 
            padding: 0.5rem 1rem; border-radius: var(--border-radius); 
            font-size: 0.875rem; font-weight: 600; margin-left: 1rem;
        }
        
        .search-container { position: relative; margin-bottom: 1.5rem; max-width: 400px; }
        .search-input { 
            padding: 0.75rem 1rem 0.75rem 2.5rem; 
            border: 1px solid #d1d5db; border-radius: var(--border-radius);
            width: 100%; font-size: 0.875rem; background: white;
        }
        .search-icon { 
            position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); 
            color: var(--secondary-color); pointer-events: none;
        }
        
        .table-container { 
            background: white; border-radius: var(--border-radius); 
            overflow: hidden; box-shadow: var(--box-shadow); width: 100%;
        }
        .products-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .products-table th { 
            background-color: #f8fafc; padding: 1rem 1.5rem; text-align: left; 
            font-weight: 600; color: var(--dark-color); border-bottom: 1px solid #e5e7eb;
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .products-table td { 
            padding: 1rem 1.5rem; border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .products-table tr:hover { background-color: #fafafa; }
        
        .product-cell { display: flex; align-items: center; gap: 1rem; }
        .product-image { 
            width: 48px; height: 48px; border-radius: var(--border-radius); 
            object-fit: cover; border: 1px solid #e5e7eb; flex-shrink: 0;
        }
        .product-info { flex: 1; min-width: 0; }
        .product-name { 
            font-weight: 600; color: var(--dark-color); margin-bottom: 0.25rem;
            font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .product-category { color: var(--secondary-color); font-size: 0.75rem; font-weight: 500; }
        
        .colors-badge { 
            background: var(--primary-color); color: white; 
            padding: 0.25rem 0.5rem; border-radius: 999px; 
            font-size: 0.75rem; font-weight: 600;
        }
        
        .availability-toggle { 
            appearance: none; width: 36px; height: 20px; 
            background-color: #d1d5db; border-radius: 999px; 
            position: relative; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .availability-toggle::before { 
            content: ''; position: absolute; width: 16px; height: 16px; 
            border-radius: 50%; background-color: white; top: 2px; left: 2px; 
            transition: transform 0.2s; box-shadow: var(--box-shadow);
        }
        .availability-toggle:checked { background-color: var(--success-color); }
        .availability-toggle:checked::before { transform: translateX(16px); }
        
        .actions-container { display: flex; align-items: center; gap: 0.5rem; justify-content: flex-end; }
        .mobile-menu-btn { display: none; background: none; border: none; color: var(--dark-color); padding: 0.5rem; }
        
        /* Bottom Sheet */
        .bottom-sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            z-index: 2000; display: none; opacity: 0; transition: opacity 0.3s;
        }
        .bottom-sheet-overlay.active { display: block; opacity: 1; }
        
        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: white; z-index: 2001; 
            border-top-left-radius: 1rem; border-top-right-radius: 1rem;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 1.5rem; box-shadow: 0 -4px 6px -1px rgba(0,0,0,0.1);
        }
        .bottom-sheet.active { transform: translateY(0); }
        
        .sheet-handle { width: 40px; height: 4px; background: #e5e7eb; border-radius: 2px; margin: 0 auto 1.5rem; }
        .sheet-header { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid #f3f4f6; padding-bottom: 1rem; }
        .sheet-img { width: 64px; height: 64px; border-radius: 0.5rem; object-fit: cover; }
        .sheet-info h3 { font-weight: 600; color: var(--dark-color); margin-bottom: 0.25rem; }
        .sheet-meta { font-size: 0.875rem; color: var(--secondary-color); display: flex; flex-direction: column; gap: 0.25rem; }
        .sheet-actions { display: grid; gap: 0.75rem; }
        .sheet-btn { 
            width: 100%; justify-content: center; padding: 0.875rem; 
            font-size: 1rem; border-radius: 0.5rem;
        }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { 
            padding: 1rem 1.5rem; border-radius: var(--border-radius); 
            color: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            margin-top: 10px;
        }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }

        .loading-spinner {
            width: 24px; height: 24px; border: 2px solid #e5e7eb;
            border-top: 2px solid var(--primary-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .container { padding: 0.5rem; }
            .card { padding: 1rem; border: none; background: transparent; box-shadow: none; }
            .page-header { flex-direction: column; gap: 1rem; align-items: stretch; }
            .search-container { max-width: 100%; }
            .nav-left h1 { font-size: 1.25rem; }
            
            /* Mobile Table Adjustments */
            .table-container { border: none; box-shadow: none; background: transparent; }
            .products-table { background: white; border-radius: 0.5rem; overflow: hidden; box-shadow: var(--box-shadow); }
            .products-table thead { display: none; } /* Hide headers on mobile */
            
            .products-table td { padding: 1rem; }
            
            /* Hide specific columns */
            .mobile-hidden { display: none !important; }
            
            /* Action column adjustments */
            .desktop-actions { display: none !important; }
            .mobile-menu-btn { display: block; margin-left: auto; }
            
            /* Layout for mobile row */
            .products-table tr { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; }
            .products-table td { border-bottom: none; padding: 0.5rem 1rem; }
            
            /* Specific widths for mobile flex layout */
            .products-table td:nth-child(1) { flex: 1; min-width: 0; } /* Product Info */
            .products-table td:nth-child(4) { width: auto; padding-right: 0.5rem; } /* Availability */
            .products-table td:nth-child(5) { width: auto; padding-left: 0; } /* Actions (Dots) */
            
            .product-image { width: 40px; height: 40px; }
            .product-category { display: none; } /* Simplify info */
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet-overlay" id="mobile-overlay" onclick="closeMobileMenu()"></div>
    <div class="bottom-sheet" id="mobile-sheet">
        <div class="sheet-handle"></div>
        <div id="sheet-content">
            <!-- Content injected by JS -->
        </div>
    </div>

    <nav>
        <div class="nav-left">
            <h1 onclick="window.location.href='index.html'">ShopSphere</h1>
        </div>
        <div id="nav-right" class="nav-right"></div>
    </nav>

    <div class="container page">
        <div class="card">
            <div class="page-header">
                <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                    <div style="display: flex; align-items: center;">
                        <h1 class="page-title" id="products-page-title">Products</h1>
                        <span class="category-badge" id="category-badge" style="display: none;"></span>
                    </div>
                    <!-- Mobile Add Button shown in header row on mobile if preferred, or kept below -->
                </div>
                <button class="btn-success" id="add-product-btn" style="width: 100%; justify-content: center; margin-top: 5px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 4v16m8-8H4"/>
                    </svg>
                    Add Product
                </button>
            </div>

            <div class="search-container">
                <div class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                </div>
                <input type="text" id="search-products" class="search-input" placeholder="Search products...">
            </div>

            <div class="table-container">
                <table class="products-table">
                    <thead>
                        <tr>
                            <th style="width: 40%;">Product</th>
                            <th class="mobile-hidden" style="width: 15%;">Price</th>
                            <th class="mobile-hidden" style="width: 10%;">Colors</th>
                            <th style="width: 15%; text-align: center;">Status</th>
                            <th style="width: 20%; text-align: right;"></th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-table">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 2rem;">
                                <div class="loading-spinner"></div>
                                Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyCdeonH3VytC21F3X6x0rCVCn2xXrGPoug",
  authDomain: "vastramaya---magic.firebaseapp.com",
  projectId: "vastramaya---magic",
  storageBucket: "vastramaya---magic.firebasestorage.app",
  messagingSenderId: "543460072082",
  appId: "1:543460072082:web:f3d1140e8f81ad338ae44b",
  measurementId: "G-E39VNDCFVE"
};
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allProducts = [];
        let currentCategory = null;
        let filteredProducts = [];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                renderNav();
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    window.location.href = 'index.html';
                    return;
                }
                initializePage();
            });
        });

        function initializePage() {
            const params = new URLSearchParams(window.location.search);
            currentCategory = params.get('category');
            
            const pageTitle = document.getElementById('products-page-title');
            const categoryBadge = document.getElementById('category-badge');
            const addBtn = document.getElementById('add-product-btn');
            
            if (!currentCategory) {
                pageTitle.textContent = "All Products";
                categoryBadge.style.display = 'none';
                addBtn.onclick = () => window.location.href = 'product.html';
            } else {
                const decoded = decodeURIComponent(currentCategory);
                pageTitle.textContent = "Products";
                categoryBadge.textContent = decoded;
                categoryBadge.style.display = 'inline-block';
                addBtn.onclick = () => window.location.href = `product.html?category=${encodeURIComponent(decoded)}`;
            }

            loadAndRenderProducts();
            
            document.getElementById('search-products').addEventListener('input', (e) => {
                filterProducts(e.target.value.toLowerCase().trim());
            });
        }

        async function loadAndRenderProducts() {
            try {
                const snapshot = await db.collection('products').orderBy('name').get();
                allProducts = snapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data(),
                    colorsCount: (doc.data().colorVariants || []).length
                }));
                filterProducts('');
            } catch (error) {
                console.error(error);
                showToast("Failed to load products.", "error");
            }
        }

        function filterProducts(searchTerm) {
            if (!searchTerm) {
                filteredProducts = currentCategory 
                    ? allProducts.filter(p => p.category === decodeURIComponent(currentCategory))
                    : allProducts;
            } else {
                filteredProducts = allProducts.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) &&
                    (!currentCategory || p.category === decodeURIComponent(currentCategory))
                );
            }
            renderProductsTable();
        }

        function renderProductsTable() {
            const tableBody = document.getElementById('admin-products-table');
            
            if (filteredProducts.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:2rem; color:#6b7280;">No products found.</td></tr>`;
                return;
            }

            tableBody.innerHTML = filteredProducts.map(product => {
                const imageUrl = (product.images && product.images.length > 0) 
                    ? product.images[0] 
                    : 'https://via.placeholder.com/50?text=No+Image';
                
                const isAvailable = product.isAvailable !== false;

                return `
                <tr>
                    <td>
                        <div class="product-cell">
                            <img src="${imageUrl}" alt="" class="product-image">
                            <div class="product-info">
                                <div class="product-name">${product.name}</div>
                                <div class="product-category">${product.category || 'General'}</div>
                            </div>
                        </div>
                    </td>
                    <td class="mobile-hidden" style="font-weight:600;">$${(product.price || 0).toFixed(2)}</td>
                    <td class="mobile-hidden" style="text-align:center;">
                        <span class="colors-badge">${product.colorsCount || 0}</span>
                    </td>
                    <td style="text-align: center;">
                        <input type="checkbox" class="availability-toggle" 
                               data-id="${product.id}" ${isAvailable ? 'checked' : ''}>
                    </td>
                    <td>
                        <div class="actions-container">
                            <!-- Desktop Buttons -->
                            <div class="desktop-actions" style="display:flex; gap:0.5rem;">
                                <button class="btn-secondary" onclick="editProduct('${product.id}')">Edit</button>
                                <button class="btn-danger" onclick="deleteProduct('${product.id}', '${product.name.replace(/'/g, "\\'")}')">Delete</button>
                            </div>
                            <!-- Mobile 3-Dots -->
                            <button class="mobile-menu-btn" onclick="openMobileMenu('${product.id}')">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="1"></circle>
                                    <circle cx="12" cy="5" r="1"></circle>
                                    <circle cx="12" cy="19" r="1"></circle>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            document.querySelectorAll('.availability-toggle').forEach(toggle => {
                toggle.addEventListener('change', async (e) => {
                    await updateProductAvailability(e.target.dataset.id, e.target.checked);
                });
            });
        }

        function openMobileMenu(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            const imageUrl = (product.images && product.images.length > 0) ? product.images[0] : 'https://via.placeholder.com/50';
            
            const sheetContent = document.getElementById('sheet-content');
            sheetContent.innerHTML = `
                <div class="sheet-header">
                    <img src="${imageUrl}" class="sheet-img">
                    <div class="sheet-info">
                        <h3>${product.name}</h3>
                        <div class="sheet-meta">
                            <span>Category: ${product.category || 'Uncategorized'}</span>
                            <span style="color:var(--dark-color); font-weight:600;">Price: $${(product.price || 0).toFixed(2)}</span>
                            <span>Colors Variants: ${product.colorsCount || 0}</span>
                        </div>
                    </div>
                </div>
                <div class="sheet-actions">
                    <button class="btn-secondary sheet-btn" onclick="editProduct('${product.id}')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        Edit Product
                    </button>
                    <button class="btn-danger sheet-btn" onclick="deleteProduct('${product.id}', '${product.name.replace(/'/g, "\\'")}')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        Delete Product
                    </button>
                </div>
            `;

            document.getElementById('mobile-overlay').classList.add('active');
            document.getElementById('mobile-sheet').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileMenu() {
            document.getElementById('mobile-overlay').classList.remove('active');
            document.getElementById('mobile-sheet').classList.remove('active');
            document.body.style.overflow = '';
        }

        async function updateProductAvailability(productId, isAvailable) {
            try {
                await db.collection('products').doc(productId).update({ 
                    isAvailable: isAvailable,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                const p = allProducts.find(p => p.id === productId);
                if(p) p.isAvailable = isAvailable;
                showToast(isAvailable ? 'Product Available' : 'Product Unavailable');
            } catch (error) {
                showToast("Update failed", "error");
                const toggle = document.querySelector(`.availability-toggle[data-id="${productId}"]`);
                if (toggle) toggle.checked = !isAvailable;
            }
        }

        function editProduct(productId) {
            window.location.href = `product.html?id=${productId}`;
        }

        async function deleteProduct(productId, productName) {
            closeMobileMenu();
            if (confirm(`Delete "${productName}"?`)) {
                try {
                    await db.collection('products').doc(productId).delete();
                    showToast('Deleted successfully', 'success');
                    allProducts = allProducts.filter(p => p.id !== productId);
                    filterProducts(document.getElementById('search-products').value);
                } catch(error) { 
                    showToast("Delete failed", "error"); 
                }
            }
        }
        
        function renderNav() {
            const navRight = document.getElementById('nav-right');
            if (currentUser && currentUser.email === ADMIN_EMAIL) {
                navRight.innerHTML = `
                    <button class="nav-icon" onclick="window.location.href='manage-category.html'">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <button class="nav-icon" onclick="auth.signOut()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </button>`;
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
