<!-- manage-products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA; --primary-light: #eef2ff;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --warning-color: #F59E0B; --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        nav { background: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--box-shadow); position: sticky; top: 0; z-index: 1000; }
        .nav-left h1 { margin: 0; font-size: 1.75rem; color: var(--primary-color); cursor: pointer; }
        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background-color: #fff; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 2rem; }
        button { border: none; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; }
        .btn-primary { background-color: var(--primary-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: var(--secondary-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-danger { background-color: var(--danger-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--border-radius); overflow: hidden; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #e5e7eb; vertical-align: middle; }
        th { background-color: var(--light-color); font-size: 0.9rem; font-weight: 600; color: var(--dark-color); }
        tr:hover { background-color: #fafafa; }
        .table-actions { display: flex; gap: 0.5rem; }
        .product-image { width: 50px; height: 50px; border-radius: var(--border-radius); object-fit: cover; border: 1px solid #e5e7eb; }
        .availability-badge { 
            display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.75rem; 
            border-radius: 999px; font-size: 0.875rem; font-weight: 500; 
        }
        .available { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .unavailable { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .availability-toggle { appearance: none; width: 44px; height: 24px; background-color: #d1d5db; border-radius: 999px; position: relative; cursor: pointer; transition: all 0.2s; }
        .availability-toggle::before { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background-color: white; top: 2px; left: 2px; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .availability-toggle:checked { background-color: var(--success-color); }
        .availability-toggle:checked::before { transform: translateX(20px); }
        .colors-count { 
            display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.25rem 0.75rem; 
            background: var(--primary-light); color: var(--primary-color); border-radius: 999px; 
            font-size: 0.875rem; font-weight: 600; 
        }
        .search-container { position: relative; margin-bottom: 1.5rem; max-width: 400px; }
        .search-input { 
            padding: 0.75rem 1rem 0.75rem 2.5rem; 
            border: 1px solid #d1d5db; border-radius: var(--border-radius);
            width: 100%; font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
        }
        .search-input:focus {
            border-color: var(--primary-color); outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }
        .search-icon { 
            position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); 
            color: var(--secondary-color); pointer-events: none;
        }
        .empty-state { 
            text-align: center; padding: 3rem; color: var(--secondary-color); 
            background: var(--light-color); border-radius: var(--border-radius); 
            border: 2px dashed #d1d5db;
        }
        .empty-state h3 { margin: 0 0 0.5rem 0; color: var(--dark-color); }
        .page-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb;
        }
        .page-title { margin: 0; color: var(--dark-color); }
        .category-badge { 
            display: inline-block; background: var(--primary-light); color: var(--primary-color);
            padding: 0.5rem 1rem; border-radius: var(--border-radius); font-weight: 600;
            margin-left: 1rem; font-size: 0.9rem;
        }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
        .menu-button { 
            background: none; border: none; padding: 0.5rem; border-radius: 50%;
            cursor: pointer; color: var(--secondary-color); position: relative;
            transition: all 0.2s ease-in-out;
        }
        .menu-button:hover { 
            background-color: var(--light-color); color: var(--dark-color);
        }
        .dropdown-menu {
            position: absolute; top: 100%; right: 0; background: white;
            border-radius: var(--border-radius); box-shadow: var(--box-shadow);
            border: 1px solid #e5e7eb; padding: 0.5rem; z-index: 100;
            min-width: 120px; display: none;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item { 
            display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem;
            background: none; border: none; width: 100%; text-align: left;
            border-radius: 0.375rem; cursor: pointer; color: var(--dark-color);
            font-size: 0.9rem; transition: background-color 0.2s;
        }
        .dropdown-item:hover { background-color: var(--light-color); }
        .dropdown-item.edit { color: var(--primary-color); }
        .dropdown-item.delete { color: var(--danger-color); }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <nav>
        <div class="nav-left"><h1 onclick="window.location.href='index.html'">ShopSphere</h1></div>
    </nav>

    <div class="container page">
        <div id="manage-products-container" class="card">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Products</h1>
                    <span class="category-badge" id="category-badge">All Categories</span>
                </div>
                <button class="btn-primary" id="add-product-btn">+ Add Product</button>
            </div>

            <!-- Search Section -->
            <div class="search-container">
                <div class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                </div>
                <input type="text" id="search-products" class="search-input" placeholder="Search products...">
            </div>

            <!-- Products Table -->
            <div style="overflow-x: auto; border-radius: var(--border-radius); border: 1px solid #e5e7eb;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 30%;">Product Name</th>
                            <th style="width: 15%;">Price</th>
                            <th style="width: 15%;">Colors</th>
                            <th style="width: 15%;">Available</th>
                            <th style="width: 25%;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-table">
                        <tr><td colspan="5" style="text-align: center; padding: 2rem;">Loading products...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzqYrP1qYSiiLLgKW3z3EcwMpiG4hyF6M",
            authDomain: "e-commerce27.firebaseapp.com",
            projectId: "e-commerce27",
            storageBucket: "e-commerce27.firebasestorage.app",
            messagingSenderId: "1000564724466",
            appId: "1:1000564724466:web:55047ed3c820197733366b",
        };
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allProducts = [];
        let currentCategory = null;
        let filteredProducts = [];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializePage();
            });
        });

        function initializePage() {
            const params = new URLSearchParams(window.location.search);
            currentCategory = params.get('category');
            
            // Update page title and badge
            const categoryBadge = document.getElementById('category-badge');
            if (!currentCategory) {
                categoryBadge.textContent = "All Categories";
                document.getElementById('add-product-btn').onclick = () => window.location.href = 'product.html';
            } else {
                const decodedCategory = decodeURIComponent(currentCategory);
                categoryBadge.textContent = decodedCategory;
                document.getElementById('add-product-btn').onclick = () => window.location.href = `product.html?category=${encodeURIComponent(decodedCategory)}`;
            }

            setupEventListeners();
            loadAndRenderProducts();
        }

        function setupEventListeners() {
            // Search functionality
            document.getElementById('search-products').addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                if (searchTerm === '') {
                    renderProductsTable(allProducts);
                } else {
                    const filtered = allProducts.filter(product => 
                        product.name.toLowerCase().includes(searchTerm) ||
                        (product.category && product.category.toLowerCase().includes(searchTerm))
                    );
                    renderProductsTable(filtered);
                }
            });

            // Close dropdowns when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.menu-container')) {
                    document.querySelectorAll('.dropdown-menu').forEach(menu => {
                        menu.classList.remove('show');
                    });
                }
            });
        }

        async function loadAndRenderProducts() {
            try {
                const snapshot = await db.collection('products').orderBy('name').get();
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Filter by category if specified
                filteredProducts = allProducts;
                if (currentCategory) {
                    filteredProducts = allProducts.filter(p => p.category === decodeURIComponent(currentCategory));
                }
                
                renderProductsTable(filteredProducts);
            } catch (error) {
                console.error("Error loading products:", error);
                showToast("Failed to load products.", "error");
            }
        }

        function renderProductsTable(productsToRender) {
            const tableBody = document.getElementById('admin-products-table');
            
            if (productsToRender.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <h3>No Products Found</h3>
                                <p>${currentCategory ? `No products in "${decodeURIComponent(currentCategory)}" category` : 'Get started by creating your first product'}</p>
                                <button class="btn-primary" onclick="document.getElementById('add-product-btn').click()" style="margin-top: 1rem;">
                                    Add Product
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = productsToRender.map(product => {
                const imageUrl = (product.images && product.images.length > 0) ? product.images[0] : 'https://via.placeholder.com/50?text=No+Image';
                const colorsCount = product.colorVariants ? product.colorVariants.length : 0;
                const isAvailable = product.isAvailable !== false; // Default to true if not set
                
                return `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <img src="${imageUrl}" alt="${product.name}" class="product-image">
                            <div>
                                <div style="font-weight: 600; margin-bottom: 0.25rem;">${product.name}</div>
                                <div style="font-size: 0.875rem; color: var(--secondary-color);">${product.category || 'Uncategorized'}</div>
                            </div>
                        </div>
                    </td>
                    <td style="font-weight: 600; color: var(--dark-color);">$${(product.price || 0).toFixed(2)}</td>
                    <td>
                        <span class="colors-count">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 2a10 10 0 0 1 0 20"></path>
                            </svg>
                            ${colorsCount}
                        </span>
                    </td>
                    <td>
                        <label class="availability-badge ${isAvailable ? 'available' : 'unavailable'}">
                            <input type="checkbox" class="availability-toggle" data-id="${product.id}" ${isAvailable ? 'checked' : ''}>
                            ${isAvailable ? 'Available' : 'Out of Stock'}
                        </label>
                    </td>
                    <td>
                        <div class="table-actions">
                            <button class="btn-primary btn-sm" onclick="editProduct('${product.id}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.25rem;">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                                Edit
                            </button>
                            <div class="menu-container" style="position: relative;">
                                <button class="menu-button" onclick="event.stopPropagation(); toggleMenu('${product.id}')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                        <circle cx="12" cy="6" r="2"></circle>
                                        <circle cx="12" cy="12" r="2"></circle>
                                        <circle cx="12" cy="18" r="2"></circle>
                                    </svg>
                                </button>
                                <div class="dropdown-menu" id="menu-${product.id}">
                                    <button class="dropdown-item edit" onclick="editProduct('${product.id}')">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                        </svg>
                                        Edit
                                    </button>
                                    <button class="dropdown-item delete" onclick="deleteProduct('${product.id}')">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M3 6h18"></path>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        </svg>
                                        Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            // Add event listeners for availability toggles
            document.querySelectorAll('.availability-toggle').forEach(toggle => {
                toggle.addEventListener('change', async (e) => {
                    await updateProductAvailability(e.target.dataset.id, e.target.checked);
                });
            });
        }

        function toggleMenu(productId) {
            const menu = document.getElementById(`menu-${productId}`);
            const isVisible = menu.classList.contains('show');
            
            // Close all other menus
            document.querySelectorAll('.dropdown-menu').forEach(m => {
                m.classList.remove('show');
            });
            
            // Toggle current menu
            if (!isVisible) {
                menu.classList.add('show');
            }
        }
        
        async function updateProductAvailability(productId, isAvailable) {
            try {
                await db.collection('products').doc(productId).update({ isAvailable: isAvailable });
                const product = allProducts.find(p => p.id === productId);
                if(product) product.isAvailable = isAvailable;
                showToast('Availability updated!', 'success');
                
                // Re-render the table to update the badge
                renderProductsTable(filteredProducts);
            } catch (error) {
                console.error("Error updating availability:", error);
                showToast("Failed to update availability", "error");
            }
        }

        function editProduct(productId) {
            window.location.href = `product.html?id=${productId}`;
        }

        async function deleteProduct(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (product && confirm(`Are you sure you want to delete "${product.name}"?`)) {
                try {
                    await db.collection('products').doc(productId).delete();
                    showToast('Product deleted successfully!', 'success');
                    await loadAndRenderProducts();
                } catch(error) { 
                    console.error("Error deleting product:", error);
                    showToast("Error deleting product", "error"); 
                }
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
