<!-- manage-products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA; --primary-light: #eef2ff;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --warning-color: #F59E0B; --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        nav { background: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--box-shadow); position: sticky; top: 0; z-index: 1000; }
        .nav-left h1 { margin: 0; font-size: 1.75rem; color: var(--primary-color); cursor: pointer; }
        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background-color: #fff; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 2rem; }
        button { border: none; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; }
        .btn-primary { background-color: var(--primary-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: var(--secondary-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-danger { background-color: var(--danger-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        .search-container { position: relative; margin-bottom: 2rem; max-width: 400px; }
        .search-input { 
            padding: 0.75rem 1rem 0.75rem 2.5rem; 
            border: 1px solid #d1d5db; border-radius: var(--border-radius);
            width: 100%; font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
        }
        .search-input:focus {
            border-color: var(--primary-color); outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }
        .search-icon { 
            position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); 
            color: var(--secondary-color); pointer-events: none;
        }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--border-radius); overflow: hidden; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #e5e7eb; vertical-align: middle; }
        th { background-color: var(--light-color); font-size: 0.9rem; font-weight: 600; color: var(--dark-color); }
        tbody tr { transition: background-color 0.2s; }
        tbody tr:hover { background-color: var(--light-color); }
        .product-info { display: flex; align-items: center; gap: 1rem; }
        .product-image { width: 50px; height: 50px; border-radius: var(--border-radius); object-fit: cover; border: 1px solid #e5e7eb; }
        .product-details { flex: 1; }
        .product-name { font-weight: 600; color: var(--dark-color); margin: 0 0 0.25rem 0; }
        .product-category { font-size: 0.875rem; color: var(--secondary-color); margin: 0; }
        .price { font-weight: 600; color: var(--dark-color); }
        .colors-count { 
            background: var(--primary-color); color: white; padding: 0.25rem 0.75rem; 
            border-radius: 999px; font-size: 0.8rem; font-weight: 600; display: inline-block;
            text-align: center; min-width: 30px;
        }
        .status-badge { 
            padding: 0.375rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600;
            text-align: center; display: inline-block; min-width: 80px;
        }
        .status-available { background: #d1fae5; color: #065f46; }
        .status-unavailable { background: #fee2e2; color: #991b1b; }
        .table-actions { display: flex; gap: 0.5rem; }
        .table-actions button { padding: 0.5rem 1rem; font-size: 0.875rem; }
        .empty-state { 
            text-align: center; padding: 3rem; color: var(--secondary-color); 
            background: var(--light-color); border-radius: var(--border-radius); 
            border: 2px dashed #d1d5db;
        }
        .empty-state h3 { margin: 0 0 0.5rem 0; color: var(--dark-color); }
        .page-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; 
        }
        .category-badge { 
            background: var(--primary-light); color: var(--primary-color); 
            padding: 0.5rem 1rem; border-radius: var(--border-radius); 
            font-weight: 600; font-size: 0.9rem;
        }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <nav>
        <div class="nav-left"><h1 onclick="window.location.href='index.html'">ShopSphere</h1></div>
    </nav>

    <div class="container page">
        <div id="manage-products-container" class="card">
            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1 style="margin: 0 0 0.5rem 0;">Products</h1>
                    <div id="category-display" class="category-badge">
                        Loading category...
                    </div>
                </div>
                <button class="btn-primary" id="add-product-btn">+ Add Product</button>
            </div>

            <!-- Search Section -->
            <div class="search-container">
                <div class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                </div>
                <input type="text" id="search-products" class="search-input" placeholder="Search products...">
            </div>

            <!-- Products Table -->
            <div id="products-content">
                <div style="overflow-x:auto; border-radius: var(--border-radius);">
                    <table>
                        <thead>
                            <tr>
                                <th>Product Name</th>
                                <th>Price</th>
                                <th>Colors</th>
                                <th>Available</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-products-table">
                            <tr>
                                <td colspan="5" style="text-align:center; padding: 2rem;">
                                    Loading products...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzqYrP1qYSiiLLgKW3z3EcwMpiG4hyF6M",
            authDomain: "e-commerce27.firebaseapp.com",
            projectId: "e-commerce27",
            storageBucket: "e-commerce27.firebasestorage.app",
            messagingSenderId: "1000564724466",
            appId: "1:1000564724466:web:55047ed3c820197733366b",
        };
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allProducts = [];
        let currentCategory = null;
        let filteredProducts = [];

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializePage();
            });
        });

        function initializePage() {
            const params = new URLSearchParams(window.location.search);
            currentCategory = params.get('category');
            
            // Update category display
            const categoryDisplay = document.getElementById('category-display');
            if (!currentCategory) {
                categoryDisplay.textContent = "All Categories";
                categoryDisplay.style.background = 'var(--secondary-color)';
                categoryDisplay.style.color = 'white';
            } else {
                categoryDisplay.textContent = decodeURIComponent(currentCategory);
            }

            // Set up add product button
            document.getElementById('add-product-btn').onclick = () => {
                if (currentCategory) {
                    window.location.href = `product.html?category=${encodeURIComponent(currentCategory)}`;
                } else {
                    window.location.href = 'product.html';
                }
            };

            // Set up search
            document.getElementById('search-products').addEventListener('input', (e) => {
                filterProducts(e.target.value.toLowerCase().trim());
            });

            loadAndRenderProducts();
        }

        async function loadAndRenderProducts() {
            try {
                const snapshot = await db.collection('products').orderBy('name').get();
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                filteredProducts = allProducts;
                if (currentCategory) {
                    filteredProducts = allProducts.filter(p => p.category === decodeURIComponent(currentCategory));
                }
                
                renderProductsTable(filteredProducts);
            } catch (error) {
                console.error("Error loading products:", error);
                showToast("Failed to load products.", "error");
            }
        }

        function filterProducts(searchTerm) {
            if (searchTerm === '') {
                filteredProducts = currentCategory 
                    ? allProducts.filter(p => p.category === decodeURIComponent(currentCategory))
                    : allProducts;
            } else {
                filteredProducts = allProducts.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) ||
                    (p.category && p.category.toLowerCase().includes(searchTerm))
                );
                
                if (currentCategory) {
                    filteredProducts = filteredProducts.filter(p => p.category === decodeURIComponent(currentCategory));
                }
            }
            renderProductsTable(filteredProducts);
        }

        function renderProductsTable(productsToRender) {
            const tableBody = document.getElementById('admin-products-table');
            
            if (productsToRender.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <h3>No Products Found</h3>
                                <p>${currentCategory ? 'No products in this category yet.' : 'No products found matching your search.'}</p>
                                <button class="btn-primary" onclick="document.getElementById('add-product-btn').click()" style="margin-top: 1rem;">
                                    Add Your First Product
                                </button>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            tableBody.innerHTML = productsToRender.map(product => {
                const imageUrl = (product.images && product.images.length > 0) ? product.images[0] : 'https://via.placeholder.com/50?text=No+Image';
                const colorsCount = product.colorVariants ? product.colorVariants.length : 0;
                const isAvailable = product.isAvailable !== false; // Default to true if undefined
                
                return `
                <tr>
                    <td>
                        <div class="product-info">
                            <img src="${imageUrl}" alt="${product.name}" class="product-image" 
                                 onerror="this.src='https://via.placeholder.com/50?text=No+Image'">
                            <div class="product-details">
                                <div class="product-name">${product.name}</div>
                                <div class="product-category">${product.category || 'Uncategorized'}</div>
                            </div>
                        </div>
                    </td>
                    <td class="price">$${(product.price || 0).toFixed(2)}</td>
                    <td>
                        <span class="colors-count">${colorsCount}</span>
                    </td>
                    <td>
                        <span class="status-badge ${isAvailable ? 'status-available' : 'status-unavailable'}">
                            ${isAvailable ? 'Available' : 'Out of Stock'}
                        </span>
                    </td>
                    <td>
                        <div class="table-actions">
                            <button class="btn-primary btn-sm" onclick="editProduct('${product.id}')">
                                Edit
                            </button>
                            <button class="btn-danger btn-sm" onclick="deleteProduct('${product.id}', '${product.name}')">
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function editProduct(productId) {
            window.location.href = `product.html?id=${productId}`;
        }

        async function deleteProduct(productId, productName) {
            if (confirm(`Are you sure you want to delete "${productName}"? This action cannot be undone.`)) {
                try {
                    await db.collection('products').doc(productId).delete();
                    showToast('Product deleted successfully!', 'success');
                    await loadAndRenderProducts();
                } catch(error) { 
                    console.error("Error deleting product:", error);
                    showToast("Error deleting product", "error"); 
                }
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
