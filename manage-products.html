<!-- manage-products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - ShopSphere Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; --primary-hover: #4338CA; --primary-light: #eef2ff;
            --secondary-color: #6B7280; --success-color: #10B981; --danger-color: #EF4444;
            --warning-color: #F59E0B; --light-color: #F9FAFB; --dark-color: #1F2937;
            --bg-color: #F3F4F6; --font-family: 'Inter', sans-serif; --border-radius: 0.5rem;
            --box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; background-color: var(--bg-color); color: var(--dark-color); }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        nav { background: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--box-shadow); position: sticky; top: 0; z-index: 1000; }
        .nav-left h1 { margin: 0; font-size: 1.75rem; color: var(--primary-color); cursor: pointer; }
        .page { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background-color: #fff; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 2rem; }
        button { border: none; border-radius: var(--border-radius); cursor: pointer; font-family: var(--font-family); font-weight: 600; transition: all 0.2s ease-in-out; }
        .btn-primary { background-color: var(--primary-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success-color); color: white; padding: 0.75rem 1.5rem; }
        .btn-danger { background-color: var(--danger-color); color: white; padding: 0.5rem 1rem; font-size: 0.875rem; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--border-radius); overflow: hidden; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #e5e7eb; vertical-align: middle; }
        th { background-color: var(--light-color); font-size: 0.9rem; font-weight: 600; color: var(--dark-color); }
        tbody tr { transition: background-color 0.2s; }
        tbody tr:hover { background-color: var(--light-color); }
        .table-actions { display: flex; gap: 0.5rem; }
        .product-image { width: 50px; height: 50px; border-radius: var(--border-radius); object-fit: cover; border: 1px solid #e5e7eb; }
        .availability-badge { 
            display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.75rem; 
            border-radius: 999px; font-size: 0.875rem; font-weight: 500; 
        }
        .availability-badge.available { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .availability-badge.unavailable { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .availability-toggle { 
            appearance: none; width: 44px; height: 24px; background-color: #d1d5db; 
            border-radius: 999px; position: relative; cursor: pointer; transition: all 0.2s; 
        }
        .availability-toggle::before { 
            content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; 
            background-color: white; top: 2px; left: 2px; transition: transform 0.2s; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .availability-toggle:checked { background-color: var(--success-color); }
        .availability-toggle:checked::before { transform: translateX(20px); }
        .category-badge { 
            background: var(--primary-light); color: var(--primary-color); padding: 0.25rem 0.75rem; 
            border-radius: 999px; font-size: 0.8rem; font-weight: 600; 
        }
        .colors-count { 
            background: #fef3c7; color: #92400e; padding: 0.25rem 0.75rem; 
            border-radius: 999px; font-size: 0.8rem; font-weight: 600; text-align: center;
            min-width: 40px; display: inline-block;
        }
        .price { font-weight: 600; color: var(--dark-color); }
        .empty-state { 
            text-align: center; padding: 3rem; color: var(--secondary-color); 
            background: var(--light-color); border-radius: var(--border-radius); 
            border: 2px dashed #d1d5db;
        }
        .empty-state h3 { margin: 0 0 0.5rem 0; color: var(--dark-color); }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--border-radius); color: white; box-shadow: var(--box-shadow); animation: slideIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .page-title { margin: 0; color: var(--dark-color); }
        .back-button { 
            display: inline-flex; align-items: center; gap: 0.5rem; 
            background: none; border: 1px solid #d1d5db; color: var(--secondary-color);
            padding: 0.5rem 1rem; margin-bottom: 1rem; font-size: 0.9rem;
        }
        .back-button:hover { background: var(--light-color); color: var(--dark-color); }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <nav>
        <div class="nav-left"><h1 onclick="window.location.href='index.html'">ShopSphere</h1></div>
    </nav>

    <div class="container page">
        <button class="back-button" onclick="window.location.href='manage-category.html'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Categories
        </button>
        
        <div id="manage-products-container" class="card">
            <div class="page-header">
                <div>
                    <h1 class="page-title" id="products-page-title">Products</h1>
                    <p id="category-subtitle" style="margin: 0.25rem 0 0 0; color: var(--secondary-color); font-size: 0.95rem;"></p>
                </div>
                <button class="btn-success" id="add-product-btn">+ Add Product</button>
            </div>

            <div id="products-content">
                <div style="overflow-x:auto; border-radius: var(--border-radius); border: 1px solid #e5e7eb;">
                    <table>
                        <thead>
                            <tr>
                                <th>Product Name</th>
                                <th>Price</th>
                                <th>Colors</th>
                                <th>Available</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-products-table">
                            <tr><td colspan="5" style="text-align:center; padding: 2rem;">Loading products...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzqYrP1qYSiiLLgKW3z3EcwMpiG4hyF6M",
            authDomain: "e-commerce27.firebaseapp.com",
            projectId: "e-commerce27",
            storageBucket: "e-commerce27.firebasestorage.app",
            messagingSenderId: "1000564724466",
            appId: "1:1000564724466:web:55047ed3c820197733366b",
        };
        const ADMIN_EMAIL = "harshavardhanjw@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allProducts = [];
        let currentCategory = null;

        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                    sessionStorage.setItem('toastMessage', JSON.stringify({ message: 'Access Denied: Admin area.', type: 'error' }));
                    window.location.href = 'index.html';
                    return;
                }
                initializePage();
            });
        });

        function initializePage() {
            const params = new URLSearchParams(window.location.search);
            currentCategory = params.get('category');
            
            if (!currentCategory) {
                document.getElementById('products-page-title').textContent = "All Products";
                document.getElementById('category-subtitle').textContent = "Showing all products across all categories";
                document.getElementById('add-product-btn').onclick = () => window.location.href = 'product.html';
            } else {
                const decodedCategory = decodeURIComponent(currentCategory);
                document.getElementById('products-page-title').textContent = decodedCategory;
                document.getElementById('category-subtitle').textContent = `Products in ${decodedCategory} category`;
                document.getElementById('add-product-btn').onclick = () => window.location.href = `product.html?category=${encodeURIComponent(decodedCategory)}`;
            }

            loadAndRenderProducts();
        }

        async function loadAndRenderProducts() {
            try {
                const snapshot = await db.collection('products').orderBy('name').get();
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                let filteredProducts = allProducts;
                if (currentCategory) {
                    filteredProducts = allProducts.filter(p => p.category === decodeURIComponent(currentCategory));
                }
                renderProductsTable(filteredProducts);
            } catch (error) {
                console.error("Error loading products:", error);
                showToast("Failed to load products.", "error");
            }
        }

        function renderProductsTable(productsToRender) {
            const tableBody = document.getElementById('admin-products-table');
            if (productsToRender.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <h3>No Products Found</h3>
                                <p>${currentCategory ? `No products in ${decodeURIComponent(currentCategory)} category yet` : 'No products created yet'}</p>
                                <button class="btn-success" onclick="document.getElementById('add-product-btn').click()" style="margin-top: 1rem;">
                                    + Add Your First Product
                                </button>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            tableBody.innerHTML = productsToRender.map(product => {
                const imageUrl = (product.images && product.images.length > 0) ? product.images[0] : 'https://via.placeholder.com/50?text=No+Image';
                const colorsCount = product.colorVariants ? product.colorVariants.length : 0;
                const isAvailable = product.isAvailable !== false; // Default to true if not set
                
                return `
                <tr>
                    <td>
                        <div style="display:flex; align-items:center; gap:1rem;">
                            <img src="${imageUrl}" alt="${product.name}" class="product-image">
                            <div>
                                <div style="font-weight:600; margin-bottom:0.25rem;">${product.name}</div>
                                <div class="category-badge">${product.category || 'Uncategorized'}</div>
                            </div>
                        </div>
                    </td>
                    <td class="price">$${(product.price || 0).toFixed(2)}</td>
                    <td>
                        <span class="colors-count">${colorsCount}</span>
                    </td>
                    <td>
                        <label class="availability-badge ${isAvailable ? 'available' : 'unavailable'}">
                            <input type="checkbox" class="availability-toggle" data-id="${product.id}" ${isAvailable ? 'checked' : ''}>
                            ${isAvailable ? 'Available' : 'Unavailable'}
                        </label>
                    </td>
                    <td>
                        <div class="table-actions">
                            <button class="btn-primary btn-sm" onclick="editProduct('${product.id}')">Edit</button> 
                            <button class="btn-danger btn-sm" onclick="deleteProduct('${product.id}', '${product.name}')">Delete</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            // Add event listeners for availability toggles
            document.querySelectorAll('.availability-toggle').forEach(toggle => {
                toggle.addEventListener('change', async (e) => {
                    await updateProductAvailability(e.target.dataset.id, e.target.checked);
                });
            });
        }
        
        async function updateProductAvailability(productId, isAvailable) {
            try {
                await db.collection('products').doc(productId).update({ isAvailable: isAvailable });
                const product = allProducts.find(p => p.id === productId);
                if(product) product.isAvailable = isAvailable;
                showToast('Availability updated!', 'success');
                
                // Update the badge text
                const badge = document.querySelector(`.availability-toggle[data-id="${productId}"]`).closest('.availability-badge');
                badge.textContent = isAvailable ? 'Available' : 'Unavailable';
                badge.className = `availability-badge ${isAvailable ? 'available' : 'unavailable'}`;
                badge.prepend(document.querySelector(`.availability-toggle[data-id="${productId}"]`));
                
            } catch (error) {
                console.error("Error updating availability:", error);
                showToast("Failed to update availability", "error");
                // Revert the toggle
                const toggle = document.querySelector(`.availability-toggle[data-id="${productId}"]`);
                toggle.checked = !isAvailable;
            }
        }

        function editProduct(productId) {
            window.location.href = `product.html?id=${productId}`;
        }

        async function deleteProduct(productId, productName) {
            if (confirm(`Are you sure you want to delete "${productName}"? This action cannot be undone.`)) {
                try {
                    await db.collection('products').doc(productId).delete();
                    showToast('Product deleted successfully!', 'success');
                    await loadAndRenderProducts();
                } catch(error) { 
                    console.error("Error deleting product:", error);
                    showToast("Error deleting product", "error"); 
                }
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
